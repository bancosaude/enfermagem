<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESA Saúde — Banco de Questões</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f7fa;
  --bg-card: #ffffff;
  --sidebar-bg: #ffffff;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --green: #10b981;
  --green-light: #d1fae5;
  --red: #ef4444;
  --red-light: #fee2e2;
  --amber: #f59e0b;
  --amber-light: #fef3c7;
  --gray-light: #f1f5f9;
  --shadow: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: white;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 24px;
  box-shadow: var(--shadow);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo span { background: none; -webkit-text-fill-color: var(--primary); }

.nav-tabs {
  display: flex;
  gap: 8px;
  background: var(--gray-light);
  padding: 4px;
  border-radius: 40px;
}
.nav-tab {
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 32px;
  color: var(--text2);
  transition: all 0.2s;
}
.nav-tab:hover { color: var(--text); background: white; }
.nav-tab.active {
  background: var(--primary);
  color: white;
  box-shadow: var(--shadow);
}

.stats-header {
  display: flex;
  gap: 16px;
  align-items: center;
}
.stat-badge {
  font-size: 12px;
  padding: 4px 12px;
  background: var(--gray-light);
  border-radius: 20px;
  color: var(--text2);
}
.stat-badge strong { color: var(--text); font-weight: 600; }

.app {
  display: flex;
  min-height: calc(100vh - 61px);
}

.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
  flex-shrink: 0;
}

.filter-section {
  padding: 0 16px 20px;
  border-bottom: 1px solid var(--border);
}
.filter-section:last-child { border-bottom: none; }

.filter-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  margin-bottom: 12px;
}

.filter-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 280px;
  overflow-y: auto;
}

.filter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
}
.filter-item:hover { background: var(--gray-light); }
.filter-item.active {
  background: #eff6ff;
  color: var(--primary);
}
.filter-item .count {
  font-size: 11px;
  color: var(--text3);
  background: var(--gray-light);
  padding: 2px 6px;
  border-radius: 12px;
}
.filter-item.active .count {
  background: #dbeafe;
  color: var(--primary);
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-info {
  font-size: 14px;
  color: var(--text2);
}
.results-info strong { color: var(--text); }

.toolbar-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: white;
  color: var(--text2);
  transition: all 0.2s;
}
.btn:hover { background: var(--gray-light); border-color: var(--border2); color: var(--text); }
.btn-primary {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline {
  border-color: var(--border2);
  background: white;
}

.question-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 20px;
  overflow: hidden;
  transition: all 0.2s;
}
.question-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--gray-light);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}

.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  background: white;
  border: 1px solid var(--border);
}
.badge-banca { background: #eef2ff; border-color: #c7d2fe; color: #4338ca; }
.badge-materia { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
.badge-dificil { background: #fef3c7; border-color: #fde68a; color: #92400e; }
.badge-muito-dificil { background: #fee2e2; border-color: #fecaca; color: #991b1b; }

.card-actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  background: none;
  border: none;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  color: var(--text3);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--gray-light); color: var(--text); }
.icon-btn.fav.active { color: #f59e0b; }

.card-body {
  padding: 20px;
}

.question-text {
  font-size: 15px;
  line-height: 1.5;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--text);
}

.alternatives {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.alt-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.alt-item:hover:not(.disabled) { background: var(--gray-light); }
.alt-item.selected-correct {
  background: var(--green-light);
  border-color: var(--green);
}
.alt-item.selected-wrong {
  background: var(--red-light);
  border-color: var(--red);
}
.alt-item.correct-answer {
  background: var(--green-light);
  border-color: var(--green);
}
.alt-letter {
  font-weight: 700;
  min-width: 28px;
  color: var(--text2);
}
.alt-text { flex: 1; font-size: 14px; }

.resolution-box {
  margin-top: 16px;
  padding: 16px;
  background: var(--gray-light);
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--primary);
  display: none;
}
.resolution-box.show { display: block; }
.resolution-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.resolution-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}

.sim-config-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 24px;
  box-shadow: var(--shadow);
}
.sim-config-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
}
.sim-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.sim-label {
  width: 140px;
  font-size: 14px;
  color: var(--text2);
}
.sim-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: white;
  min-width: 200px;
}
.sim-progress {
  margin-bottom: 20px;
}
.progress-bar {
  height: 4px;
  background: var(--gray-light);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.3s;
}
.sim-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  gap: 12px;
}

.panel { display: none; }
.panel.active { display: block; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
}
.stat-label {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { padding: 16px; }
}

.search-input {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--text);
  width: 240px;
  outline: none;
}
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--text3); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">ESA <span>SAÚDE</span> · BANCO DE QUESTÕES</div>
    <div class="stats-header">
      <div class="stat-badge">📚 Total: <strong id="stat-total">0</strong></div>
      <div class="stat-badge">✅ Acertos: <strong id="stat-acertos">—</strong></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('questoes')">📋 Questões</button>
    <button class="nav-tab" onclick="showPanel('simulado')">🎯 Simulado</button>
    <button class="nav-tab" onclick="showPanel('estatisticas')">📊 Estatísticas</button>
    <button class="nav-tab" onclick="showPanel('erros')">❌ Meus Erros</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">📂 MATÉRIA</div>
      <div class="filter-list" id="filter-materias"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">🏛 BANCA</div>
      <div class="filter-list" id="filter-bancas"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">📅 ANO</div>
      <div class="filter-list" id="filter-anos"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">⭐ DIFICULDADE</div>
      <div class="filter-list" id="filter-dificuldades"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">⭐ ESPECIAIS</div>
      <div class="filter-list" id="filter-especiais"></div>
    </div>
  </aside>

  <main class="main-content">
    <div id="panel-questoes" class="panel active">
      <div class="toolbar">
        <div class="results-info"><strong id="result-count">0</strong> questões encontradas</div>
        <div class="toolbar-actions">
          <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar no enunciado..." oninput="renderizarQuestoes()">
          <button class="btn btn-outline" onclick="expandirTodas()">📖 Expandir tudo</button>
          <button class="btn btn-primary" onclick="iniciarSimuladoRapido()">🎯 Simulado rápido</button>
        </div>
      </div>
      <div id="questions-container"></div>
    </div>

    <div id="panel-simulado" class="panel">
      <div id="sim-setup">
        <div class="sim-config-card">
          <div class="sim-config-title">⚙️ Configurar Simulado</div>
          <div class="sim-row"><span class="sim-label">Quantidade:</span><select class="sim-select" id="sim-qtd"><option value="5">5 questões</option><option value="10" selected>10 questões</option><option value="20">20 questões</option><option value="30">30 questões</option><option value="50">50 questões</option></select></div>
          <div class="sim-row"><span class="sim-label">Matéria:</span><select class="sim-select" id="sim-materia"><option value="">Todas</option></select></div>
          <div class="sim-row"><span class="sim-label">Banca:</span><select class="sim-select" id="sim-banca"><option value="">Todas</option></select></div>
          <div class="sim-row"><span class="sim-label">Correção:</span><select class="sim-select" id="sim-modo"><option value="imediato">Imediata (na hora)</option><option value="final">Ao final</option></select></div>
          <div style="margin-top:20px;"><button class="btn btn-primary" onclick="startSimulado()">▶ Iniciar Simulado</button></div>
        </div>
      </div>
      <div id="sim-active" style="display:none;">
        <div class="sim-config-card">
          <div class="sim-progress"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span id="sim-counter">Questão 1 de 10</span></div><div class="progress-bar"><div class="progress-fill" id="sim-progress" style="width:10%"></div></div></div>
          <div id="sim-question"></div>
          <div class="sim-nav"><button class="btn btn-outline" onclick="simAnterior()" id="sim-prev">← Anterior</button><div><button class="btn btn-outline" onclick="simPular()">⏩ Pular</button><button class="btn btn-primary" onclick="simProximo()" id="sim-next">Próxima →</button><button class="btn btn-primary" onclick="simFinalizar()" id="sim-finish" style="display:none;">✅ Finalizar</button></div></div>
        </div>
      </div>
      <div id="sim-result" style="display:none;"></div>
    </div>

    <div id="panel-estatisticas" class="panel"><div id="stats-container"></div></div>
    <div id="panel-erros" class="panel"><div class="toolbar"><div class="results-info"><strong id="erros-count">0</strong> questões com erros</div><button class="btn btn-outline" onclick="limparHistorico()">🗑️ Limpar histórico</button></div><div id="erros-container"></div></div>
  </main>
</div>

<script>
// =====================================================
// BANCO DE DADOS - TODAS AS QUESTÕES DOS PDFs (SEM REPETIÇÃO)
// Total aproximado: 530 questões únicas
// =====================================================

const QUESTOES = [
  // === QUESTÕES DO PDF 1 (200 Questões Gabaritadas) ===
  {id:1,materia:"Diabetes",banca:"",ano:2021,dificuldade:2,enunciado:"Conforme o Caderno de Atenção Básica nº 36 (2013), a aplicação subcutânea da insulina pode ser realizada nos braços, abdômen, coxas e nádegas. Nesse contexto, a absorção ocorre em maior velocidade:",alternativas:["braços","abdômen","coxas","nádegas","antebraços"],correta:1,resolucao:"A absorção da insulina é mais rápida no abdômen devido à maior vascularização da região."},
  {id:2,materia:"Farmacologia",banca:"",ano:2021,dificuldade:2,enunciado:"Assinale a opção que apresenta a correspondência correta entre a classificação e o medicamento.",alternativas:["Coagulante - enoxaparina sódica","Antilipêmico - fenobarbital","Anticoagulante - vitamina K","Antitrombótico para IAM - estreptoquinase","Corticosteroide - tramadol"],correta:3,resolucao:"A estreptoquinase é um trombolítico utilizado no tratamento do infarto agudo do miocárdio."},
  {id:3,materia:"Clínica Médica",banca:"",ano:2021,dificuldade:3,enunciado:"Quando um paciente que se submete a hemodiálise é hospitalizado, é necessário tomar alguns cuidados para proteger o acesso vascular. Se o paciente tiver um cateter de hemodiálise, a enfermeira deve:",alternativas:["avaliar o frêmito diariamente","utilizar o cateter para coleta de sangue","realizar curativo compressivo e oclusivo","observar sinais de infecção no local","certificar-se que o cateter fica sem fixação"],correta:3,resolucao:"A principal complicação do cateter de hemodiálise é a infecção, portanto deve-se observar sinais flogísticos no local."},
  {id:4,materia:"Clínica Médica",banca:"",ano:2021,dificuldade:3,enunciado:"A encefalopatia hepática é uma complicação da doença hepática potencialmente fatal. São exemplos dos sinais e sintomas do estágio 2 dessa doença:",alternativas:["asterixe e aumento da sonolência","torpor e sialorreia","letargia e sudorese","euforia e hipotermia","edema e confusão"],correta:0,resolucao:"No estágio 2 da encefalopatia hepática, observa-se asterixe (flapping tremor) e sonolência."},
  {id:5,materia:"Materno-Infantil",banca:"",ano:2021,dificuldade:2,enunciado:"De acordo com o Manual AIDPI Neonatal (2014), a administração de vitamina K deve ser realizada de forma rotineira no recém-nascido, a fim de evitar:",alternativas:["doença hemorrágica do recém-nascido","icterícia neonatal","infecção neonatal","desnutrição","deficiência de biotinidase"],correta:0,resolucao:"A vitamina K é administrada ao RN para prevenir a doença hemorrágica do recém-nascido."},
  {id:6,materia:"Terminologia Técnica",banca:"",ano:2021,dificuldade:2,enunciado:"Assinale a opção cujo sufixo corresponde a definição correta.",alternativas:["ectomia = abertura","stomia = reparo","plastia = sutura","tomia = retirada","pexia = fixação"],correta:4,resolucao:"O sufixo -pexia significa fixação cirúrgica."},
  {id:7,materia:"Enfermagem",banca:"ANVISA",ano:2017,dificuldade:2,enunciado:"Sobre a seleção do cateter intravascular periférico e sítio de inserção, é correto afirmar que:",alternativas:["deve-se selecionar prioritariamente o cateter com base nas condições de acesso venoso","utilizar cateteres periféricos para infusão contínua de vesicantes","cateteres com menor calibre causam menos flebite","caso o adulto não caminhe, considerar veias dos pés","preferir região de flexão"],correta:2,resolucao:"Cateteres de menor calibre causam menos trauma vascular e menor incidência de flebite."},
  {id:8,materia:"Terminologia Técnica",banca:"",ano:2021,dificuldade:2,enunciado:"Assinale a opção correta sobre a criptorquidia:",alternativas:["Excesso de liquor intracraniano","Ausência de um ou ambos testículos na bolsa escrotal","Malformação da coluna vertebral","Obstrução do esôfago","Posição anormal da uretra"],correta:1,resolucao:"Criptorquidia é a falha na descida dos testículos para a bolsa escrotal."},
  {id:9,materia:"Cálculo de Medicamentos",banca:"",ano:2021,dificuldade:3,enunciado:"Foi prescrito soro fisiológico 0,9% 500 ml para ser infundido em 6 horas. Quantas gotas por minuto deverão ser infundidas?",alternativas:["30","29","28","26","25"],correta:2,resolucao:"Fórmula: (500 x 20) / (6 x 60) = 10000/360 = 27,7 ≈ 28 gotas/min."},
  {id:10,materia:"Animais Peçonhentos",banca:"",ano:2021,dificuldade:3,enunciado:"Acidentes causados por Latrodectus (Viúva Negra) podem causar queda anormal da pálpebra superior e dilatação constante das pupilas. Essas manifestações são denominadas:",alternativas:["ectrópio e miose","ptose e midríase","ptose e miose","miose e entrópio","midríase e ptose"],correta:1,resolucao:"Ptose palpebral (queda da pálpebra) e midríase (dilatação pupilar) são manifestações neurotóxicas."},
  {id:11,materia:"Enfermagem",banca:"",ano:2021,dificuldade:2,enunciado:"Durante o exame clínico das mamas, por meio da inspeção, pode ser observada a presença de:",alternativas:["nódulos","secreção serosa","linfonodos","temperatura da pele","assimetrias"],correta:4,resolucao:"A inspeção das mamas permite observar assimetrias, retrações, alterações na pele, etc."},
  {id:12,materia:"Enfermagem",banca:"",ano:2021,dificuldade:2,enunciado:"Com base na classificação das lesões por pressão: perda da espessura total do tecido; gordura subcutânea visível; osso, tendão e músculos não expostos. Esta é a categoria:",alternativas:["Não estadiável","Estágio I","Estágio IV","Estágio III","Estágio II"],correta:3,resolucao:"Estágio III: perda total da espessura da pele com exposição do tecido subcutâneo, sem exposição óssea."},
  {id:13,materia:"Animais Peçonhentos",banca:"",ano:2021,dificuldade:2,enunciado:"A rabdomiólise libera substâncias que serão excretadas pela urina. Essa excreção urinária denomina-se:",alternativas:["nictúria","piúria","hematúria","glicosúria","mioglobinúria"],correta:4,resolucao:"Mioglobinúria é a presença de mioglobina na urina, decorrente da necrose muscular."},
  {id:14,materia:"Diabetes",banca:"",ano:2021,dificuldade:2,enunciado:"Os 'quatro P's' sinais e sintomas característicos que levantam suspeita de Diabetes Mellitus são:",alternativas:["Piúria, polidipsia, polifagia e perda inexplicada de peso","Piúria, palidez, polifagia e perda de memória","Poliúria, palidez, prurido e perda de apetite","Piúria, polidipsia, polifagia e perda inexplicada de peso","Poliúria, polidipsia, polifagia e perda inexplicada de peso"],correta:4,resolucao:"Os 4 Ps do diabetes: Poliúria, Polidipsia, Polifagia e Perda de peso inexplicada."},
  {id:15,materia:"Urgência/Emergência",banca:"",ano:2021,dificuldade:3,enunciado:"Durante a passagem de plantão, qual paciente deverá ser avaliado primeiro?",alternativas:["Idosa 78 anos, pós-op quadril, FR 14, PA 138x88","Idoso 64 anos, AVC isquêmico, T 37,4°C, FC 80","Mulher 55 anos, pneumonia, FR 28, SpO2 88%","Homem 75 anos, úlceras venosas, FC 82, T 37,2°C","Idoso 85 anos, ITU e pneumonia, FR 16, PA 130x80, SpO2 96%"],correta:2,resolucao:"Paciente com saturação de O2 de 88% e taquipneia está em risco iminente de hipóxia."},
  {id:16,materia:"Obstetrícia",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre a dequitação é correto afirmar que:",alternativas:["inicia com dilatação completa, termina com expulsão do feto","primeira hora após expulsão da placenta","terceiro período do parto, da expulsão do feto até expulsão da placenta","primeiro período do parto","segunda hora após expulsão da placenta"],correta:2,resolucao:"Dequitação é o terceiro período do parto, compreendido entre a expulsão do feto e a expulsão da placenta."},
  {id:17,materia:"Cálculo de Medicamentos",banca:"",ano:2021,dificuldade:3,enunciado:"Prescrito cetoprofeno 100 mg diluído em 100 ml de SF para infundir em 20 minutos. Quantas gotas por minuto?",alternativas:["50","100","120","150","200"],correta:4,resolucao:"(100 x 20) / 20 = 2000/20 = 100? Revisão: 100ml em 20min = 5ml/min x 20 = 100 gotas/min. Correto: 100."},
  {id:18,materia:"Animais Peçonhentos",banca:"",ano:2021,dificuldade:2,enunciado:"Para picada de formiga, o tipo de compressa a ser utilizada no tratamento imediato:",alternativas:["compressas frias","compressas mornas","compressas quentes","compressa emoliente","compressa seca"],correta:0,resolucao:"Compressas frias ajudam a reduzir a dor e o edema local."},
  {id:19,materia:"Saúde Mental",banca:"",ano:2021,dificuldade:2,enunciado:"Alteração dos afetos, com perturbação do humor, onde se observam períodos que variam do excitado ao deprimido:",alternativas:["Esquizofrenia","Estresse pós-traumático","Somatização","Fobia","Distúrbio bipolar"],correta:4,resolucao:"O transtorno bipolar caracteriza-se por alternância entre episódios de mania e depressão."},
  {id:20,materia:"Animais Peçonhentos",banca:"",ano:2021,dificuldade:2,enunciado:"Assinale a opção que NÃO apresenta primeiros socorros para acidentes ofídicos:",alternativas:["Lavar o local com água e sabão","Manter paciente deitado e hidratado","Fazer torniquete","Levar o animal para identificação","Procurar serviço médico"],correta:2,resolucao:"Torniquete é contraindicado em acidentes ofídicos, pois pode agravar a necrose local."},
  {id:21,materia:"Animais Peçonhentos",banca:"",ano:2021,dificuldade:2,enunciado:"Via de administração da soroterapia antiofídica:",alternativas:["Intravenosa","Subcutânea","Intratecal","Intradérmica","Oral"],correta:0,resolucao:"O soro antiofídico deve ser administrado por via intravenosa."},
  {id:22,materia:"Enfermagem",banca:"ANVISA",ano:2017,dificuldade:2,enunciado:"O uso de cateter urinário é indicação para:",alternativas:["pacientes com micção espontânea","paciente com úlcera por pressão grau IV","gravidez de alto risco","paciente com risco de queda","paciente estável com necessidade de monitorização de débito urinário"],correta:4,resolucao:"Indicação correta para SVD: monitorização rigorosa do débito urinário em pacientes críticos."},
  {id:23,materia:"Obstetrícia",banca:"",ano:2021,dificuldade:2,enunciado:"Estado patológico decorrente da incompatibilidade entre o fator Rh materno e o fetal:",alternativas:["Eritroblastose fetal","Anemia falciforme","Deficiência de Biotinidase","Fenilcetonúria","Icterícia"],correta:0,resolucao:"Eritroblastose fetal é a doença hemolítica do recém-nascido por incompatibilidade Rh."},
  {id:24,materia:"Farmacologia",banca:"",ano:2021,dificuldade:2,enunciado:"Que medicamento NÃO deve ser administrado quando o pulso do paciente apresentar FC menor que 60 bpm?",alternativas:["Dimeticona","Hidrocortisona","Digoxina","Dimenidrato","Sinvastatina"],correta:2,resolucao:"Digoxina é um cardiotônico que reduz a frequência cardíaca, contraindicado em bradicardia."},
  {id:25,materia:"Enfermagem",banca:"",ano:2021,dificuldade:3,enunciado:"Paciente em pré-operatório com disúria, temperatura 38°C. O profissional deverá:",alternativas:["administrar sedativo","administrar anti-hipertensivo e antecipar cirurgia","administrar antitérmico e encaminhar para cirurgia","administrar antitérmico e antecipar cirurgia","administrar antitérmico e suspender cirurgia"],correta:4,resolucao:"Febre no pré-operatório pode indicar infecção, sendo recomendada a suspensão da cirurgia eletiva."},
  {id:26,materia:"Enfermagem",banca:"ANVISA",ano:2017,dificuldade:2,enunciado:"Medidas específicas para prevenção de pneumonia associada à ventilação mecânica, EXCETO:",alternativas:["manter decúbito elevado 30-45°","aspirar secreção subglótica","higiene oral com antissépticos","preferir ventilação não invasiva","preferir intubação nasotraqueal"],correta:4,resolucao:"A intubação nasotraqueal está associada a maior risco de sinusite e pneumonia."},
  {id:27,materia:"Hipertensão",banca:"",ano:2021,dificuldade:2,enunciado:"Fatores de risco para a hipertensão arterial:",alternativas:["Dieta hipossódica, exercício, aumento de peso","Redução de álcool, dieta hiperssódica, abandono do tabagismo","Dieta hiperssódica, controle de peso, sedentarismo","Dieta hiperssódica, aumento de peso, sedentarismo","Dieta hipossódica, controle de peso, sedentarismo"],correta:3,resolucao:"Dieta rica em sódio, obesidade e sedentarismo são fatores de risco para HAS."},
  {id:28,materia:"Enfermagem",banca:"",ano:2021,dificuldade:2,enunciado:"Infecção de pele causada por estafilococo ou estreptococo, comum em crianças na face:",alternativas:["Impetigo","Monilíase","Pediculose","Escabiose","Hipospádia"],correta:0,resolucao:"Impetigo é infecção bacteriana superficial da pele, comum em crianças."},
  {id:29,materia:"Diabetes",banca:"",ano:2021,dificuldade:2,enunciado:"As insulinas disponíveis no Brasil têm concentração de:",alternativas:["50 UI/ml","60 UI/ml","80 UI/ml","100 UI/ml","200 UI/ml"],correta:3,resolucao:"Todas as insulinas no Brasil são U-100 (100 UI/ml)."},
  {id:30,materia:"Obstetrícia",banca:"",ano:2021,dificuldade:2,enunciado:"Gestante com 30 semanas, o intervalo de agendamento da consulta de pré-natal deverá ser:",alternativas:["semanal","mensal","quinzenal","a cada 10 dias","a cada 25 dias"],correta:2,resolucao:"A partir da 28ª semana, as consultas de pré-natal devem ser quinzenais."},
  {id:31,materia:"Ética",banca:"",ano:2021,dificuldade:2,enunciado:"Dever do profissional de enfermagem, segundo o código de ética:",alternativas:["Recusar-se a exercer atividades fora de sua competência","Abster-se de revelar informações confidenciais","Comunicar ao Coren fatos que infrinjam a ética","Registrar ações que não executou","Ter acesso a informações necessárias ao exercício profissional"],correta:0,resolucao:"É dever do profissional recusar atividades que não sejam de sua competência técnica."},
  {id:32,materia:"Terminologia Técnica",banca:"",ano:2021,dificuldade:2,enunciado:"Prefixos cirúrgicos e suas definições:",alternativas:["espleno = fígado","cole = vesícula biliar","blefaro = olho","adeno = amígdala","entero = baço"],correta:1,resolucao:"Cole- refere-se à vesícula biliar (ex: colecistectomia)."},

  // === QUESTÕES DO PDF 2 (100 Questões ESA - Provas Anteriores) ===
  {id:33,materia:"Cálculo de Medicamentos",banca:"ESA",ano:2011,dificuldade:3,enunciado:"Prescrito soro de 1000 ml com 1 ampola de 10 ml de KCl para correr em 6 horas. Quantas gotas por minuto?",alternativas:["56","40","61","66","50"],correta:0,resolucao:"(1000 x 20) / (6 x 60) = 20000/360 = 55,5 ≈ 56 gotas/min."},
  {id:34,materia:"Enfermagem",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Para punção venosa periférica, posição do bisel e ângulo corretos:",alternativas:["Bisel para cima, 90°","Bisel para cima, 45°","Bisel lateralizado, 15°","Bisel para baixo, 45°","Bisel para cima, 15°"],correta:4,resolucao:"O bisel da agulha deve ficar para cima, com ângulo de aproximadamente 15° para punção venosa."},
  {id:35,materia:"Sinais Vitais",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Ausculta do ápice cardíaco no 5º EIC linha hemiclavicular esquerda verifica qual pulso?",alternativas:["Femoral","Pedioso","Radial","Carotídeo","Apical"],correta:4,resolucao:"O pulso apical é auscultado no ápice cardíaco."},
  {id:36,materia:"Tuberculose",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Exame prioritário para diagnóstico da tuberculose pulmonar:",alternativas:["Prova tuberculínica","Baciloscopia direta do escarro","Raio X simples","Baciloscopia de lavado brônquico","Cultura de escarro"],correta:1,resolucao:"A baciloscopia direta do escarro é o exame padrão para diagnóstico da tuberculose pulmonar."},
  {id:37,materia:"Farmacologia",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Dose de manutenção é:",alternativas:["dose necessária para manter níveis desejáveis do medicamento","maior quantidade capaz de produzir efeito terapêutico","quantidade capaz de causar sequelas","quantidade que ultrapassa a dose terapêutica","metade da dose do adulto"],correta:0,resolucao:"Dose de manutenção mantém os níveis terapêuticos do medicamento."},
  {id:38,materia:"Imunização",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Sobre o Calendário Básico de Vacinação da Criança, é correto afirmar:",alternativas:["Hepatite B: nascer, 1º mês, 6º mês e reforço a cada 10 anos","BCG: preferencialmente ao nascer, dose única","Tríplice viral: sarampo, difteria e rubéola","Febre amarela antes dos 2 meses não precisa de reforço","Rotavírus não faz parte do calendário"],correta:1,resolucao:"A BCG é administrada ao nascer, em dose única."},
  {id:39,materia:"Urgência/Emergência",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Atribuição do técnico de enfermagem no APH móvel, EXCETO:",alternativas:["assistir ao enfermeiro no planejamento","prestar cuidados diretos a pacientes graves","participar de programas de treinamento","realizar manobras de extração manual","supervisionar e avaliar ações de enfermagem"],correta:4,resolucao:"A supervisão e avaliação das ações de enfermagem é atribuição privativa do enfermeiro."},
  {id:40,materia:"Sondagem",banca:"ESA",ano:2011,dificuldade:3,enunciado:"Na remoção de sonda nasogástrica, é incorreto afirmar que:",alternativas:["pode ser clampeada por 24h","lavar com 10ml de SF","puxar delicadamente, interrompendo ao sinal de resistência","antes da retirada, introduzir mais 15cm","é indispensável uso de EPI"],correta:3,resolucao:"Não se deve introduzir a sonda antes da retirada; isso pode causar traumatismo."},
  {id:41,materia:"Epidemiologia",banca:"ESA",ano:2011,dificuldade:2,enunciado:"População 1.200.000, 600 casos de meningite, 120 mortes. Percentual de letalidade:",alternativas:["20%","0,5%","2%","0,02%","5%"],correta:0,resolucao:"Letalidade = (120/600) x 100 = 20%."},
  {id:42,materia:"Enfermagem",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Cuidado contraindicado em apendicectomia:",alternativas:["Administração de enema no pré-operatório","Infusão intravenosa","Antibioticoterapia","Passagem de SNG se íleo paralítico","Posição semi-Fowler pós-cirurgia"],correta:0,resolucao:"Enema no pré-operatório de apendicite pode provocar perfuração do apêndice."},
  {id:43,materia:"Imunização",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Vacina tríplice viral previne:",alternativas:["Tuberculose, pneumococos, influenza","Sarampo, caxumba, rubéola","Difteria, tétano, sarampo","Influenza, pneumococos, tétano","Tuberculose, difteria, tétano"],correta:1,resolucao:"A tríplice viral protege contra sarampo, caxumba e rubéola."},
  {id:44,materia:"Enfermagem",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Materiais utilizados no cateterismo vesical, EXCETO:",alternativas:["Pinça Kocher","Biombo","Seringa de 20cc","Bolsa pressurizadora","Xilocaína gel"],correta:3,resolucao:"Bolsa pressurizadora não é utilizada em cateterismo vesical; é usada para transfusão sob pressão."},
  {id:45,materia:"Sinais Vitais",banca:"ESA",ano:2011,dificuldade:2,enunciado:"O que é uma ortopnéia?",alternativas:["FR abaixo do normal","FR acima do normal","Respiração facilitada na posição vertical","Parada respiratória","Respiração ruidosa"],correta:2,resolucao:"Ortopneia é a dificuldade respiratória que melhora com a posição sentada ou em pé."},
  {id:46,materia:"Dengue",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Não são sinais de alarme da dengue hemorrágica:",alternativas:["dor abdominal intensa","hipotensão postural","hemorragias importantes","aumento da diurese e aumento repentino da temperatura","aumento do hematócrito e queda de plaquetas"],correta:3,resolucao:"Aumento da diurese não é sinal de alarme; é esperado na fase de recuperação."},
  {id:47,materia:"Cálculo de Medicamentos",banca:"ESA",ano:2011,dificuldade:4,enunciado:"Prescrito glicose 20% 10ml, disponível glicose 50% 20ml e água destilada. Volumes para obter a prescrição:",alternativas:["1ml glicose 50% + 9ml AD","4ml glicose 50% + 6ml AD","3ml glicose 50% + 7ml AD","2ml glicose 50% + 8ml AD","5ml glicose 50% + 5ml AD"],correta:1,resolucao:"Para obter 10ml de glicose 20%: 4ml de glicose 50% (2g de glicose) + 6ml de AD."},
  {id:48,materia:"Hanseníase",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Sinais e sintomas da hanseníase, EXCETO:",alternativas:["manchas com alteração de sensibilidade","pápulas e nódulos","diminuição ou queda de pelos","falta de sudorese no local","tosse persistente >3 semanas"],correta:4,resolucao:"Tosse persistente não é sinal de hanseníase; é característico de tuberculose."},
  {id:49,materia:"Diabetes",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Sintomas clássicos do diabetes mellitus tipo 2:",alternativas:["poliúria, polidipsia, polifagia e perda involuntária de peso","polidipsia, fadiga, balanopostite e mialgia","retinopatia, neuropatia, letargia e mialgia","poliúria, polifagia, mialgia e letargia","letargia, polifagia, infecções de repetição e neuropatia"],correta:0,resolucao:"Os sintomas clássicos do diabetes são poliúria, polidipsia, polifagia e perda de peso."},
  {id:50,materia:"DST",banca:"ESA",ano:2012,dificuldade:2,enunciado:"A Organização Mundial de Saúde estima 1 milhão de casos de sífilis por ano entre as gestantes. Assinale a alternativa correta sobre sífilis:",alternativas:["causada por Mycobacterium sífilosis","causada por Treponema pallidum, espiroqueta gram-negativa","transmissão horizontal é a principal preocupação","transmissão predominante é por aerossol","a bactéria não atravessa a barreira placentária"],correta:1,resolucao:"A sífilis é causada pelo Treponema pallidum, uma espiroqueta gram-negativa."},

  // === MAIS QUESTÕES DO PDF 2 (continuação) ===
  {id:51,materia:"Urgência/Emergência",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Drogas utilizadas em RCP, é incorreto afirmar que:",alternativas:["epinefrina: efeito vasoconstritor e cronotrópico positivo","vasopressina: influi na contração cardíaca","bicarbonato de sódio: corrige acidose respiratória","atropina: aumenta automaticidade do nó SA","lidocaína: não é antiarrítmica"],correta:4,resolucao:"A lidocaína é sim uma droga antiarrítmica (classe IB)."},
  {id:52,materia:"Infecção Hospitalar",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Uma infecção hospitalar acresce ao período de internação, em média:",alternativas:["1-3 dias","11-15 dias","11-20 dias","15-30 dias","5-10 dias"],correta:4,resolucao:"A infecção hospitalar prolonga a internação em média de 5 a 10 dias."},
  {id:53,materia:"Hipertensão",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Condições padronizadas pelo Ministério da Saúde para aferição da PA:",alternativas:["repouso de 15 minutos","manguito cobre 1/3 do braço","palpar pulso radial e inflar até 30mmHg acima","PAS = primeiro ruído de Korotkoff","arredondar valores"],correta:3,resolucao:"A pressão sistólica corresponde ao primeiro ruído de Korotkoff."},
  {id:54,materia:"Sinais Vitais",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Situações constatadas a partir da aferição de sinais vitais:",alternativas:["Pulso arrítmico, Ortopneia, Normotensão, Pirexia","Taquisfigmia, Hipertensão, Hipoglicemia, Apneia","Respiração sibilante, Refluxo mitral, Hipotensão, Hipotermia","Pulso dicrótico, Febre, Taquipneia, Desnutrição","Hipertensão, Pielonefrite, Bradipneia, Hipotermia"],correta:2,resolucao:"A ausculta respiratória pode identificar sibilos (asma/DPOC), e sinais vitais podem mostrar hipotensão/hipotermia."},
  {id:55,materia:"Obstetrícia",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Evento prioritário no pré-natal:",alternativas:["Vacinação da gestante","Realização de exames preconizados","Início do pré-natal até 12ª semana","Garantia de acesso à unidade de referência","Visita prévia ao serviço de parto"],correta:2,resolucao:"A captação precoce do pré-natal (até 12ª semana) é fundamental."},
  {id:56,materia:"Imunização",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Vacinação de rotina para gestantes:",alternativas:["Tétano","Ébola","Hanseníase","AIDS","Dengue"],correta:0,resolucao:"A vacina dupla adulto (dT) é recomendada para gestantes."},
  {id:57,materia:"Neonatologia",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Será considerada taquipneia quando a FR se mantiver a partir de:",alternativas:["30 irpm","40 irpm","50 irpm","60 irpm","70 irpm"],correta:3,resolucao:"Taquipneia em RN é considerada quando FR > 60 irpm."},
  {id:58,materia:"Imunização",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Dose de reforço da vacina dupla bacteriana:",alternativas:["5/5 anos até cura","2/2 anos por toda vida","5/5 anos por toda vida","10/10 anos por toda vida","10/10 anos até cura"],correta:3,resolucao:"O reforço da dT deve ser aplicado a cada 10 anos por toda a vida."},
  {id:59,materia:"Animais Peçonhentos",banca:"ESA",ano:2012,dificuldade:2,enunciado:"São considerados animais peçonhentos:",alternativas:["morcego e tatu","girino e barata","ariranha e cachorro","serpente e aranha","gato e onça"],correta:3,resolucao:"Serpentes e aranhas são animais peçonhentos."},
  {id:60,materia:"Parasitologia",banca:"ESA",ano:2012,dificuldade:2,enunciado:"São parasitoses intestinais:",alternativas:["Teníase, Ascaridíase e Linfogranuloma","AIDS, Cancro Mole e Ancilostomíase","Ancilostomíase, Teníase e Gonorréia","AIDS, Ascaridíase e Linfogranuloma","Teníase, Ascaridíase e Ancilostomíase"],correta:4,resolucao:"Teníase, ascaridíase e ancilostomíase são parasitoses intestinais."},
  {id:61,materia:"Cateterismo",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Atitude mais indicada para prevenir infecção no cateterismo vesical:",alternativas:["trocar cateter a cada 7 dias","usar luva ao abrir sistema","substituir drenagem a cada 24h","lavar as mãos sempre","colher urocultura"],correta:3,resolucao:"Higienização das mãos é a medida mais eficaz para prevenir infecções."},
  {id:62,materia:"Cálculo de Medicamentos",banca:"ESA",ano:2012,dificuldade:4,enunciado:"Frasco de 500ml SG 5%, injetado KCl 20% 10ml e NaCl 10% 20ml. Infundido de 8 às 10h a 8 gotas/min. Volume administrado:",alternativas:["26ml","37ml","48ml","59ml","76ml"],correta:1,resolucao:"2 horas = 120 minutos. 8 gotas/min x 120 = 960 gotas. 960/20 = 48ml."},
  {id:63,materia:"Procedimentos",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Finalidade da punção lombar:",alternativas:["diminuir hipertermia","restabelecer movimentos respiratórios","diminuir opressão precordial","aliviar edema de MMII","obter material para exame"],correta:4,resolucao:"A punção lombar é realizada para coleta de líquor para análise."},
  {id:64,materia:"Saúde Mental",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Transtorno Bipolar Tipo I:",alternativas:["numerosos episódios hipomaníacos","surtos em pequena quantidade, episódios depressivos","numerosos episódios alternando hipomaníacos e depressivos leves","surtos em pequena quantidade, episódios mistos","episódios maníacos ou mistos alternados com depressivos maiores"],correta:4,resolucao:"Transtorno Bipolar I caracteriza-se por episódios maníacos completos."},
  {id:65,materia:"Saúde do Trabalhador",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Além da asbestose, a exposição ao asbesto está relacionada com:",alternativas:["alterações pleurais benignas, câncer de pulmão e mesoteliomas","câncer de pulmão, insuficiência pulmonar aguda","insuficiência pulmonar aguda e alterações pleurais","insuficiência pulmonar aguda, alterações pleurais e mesoteliomas","mesoteliomas e insuficiência pulmonar aguda"],correta:0,resolucao:"O asbesto causa asbestose, câncer de pulmão e mesotelioma."},
  {id:66,materia:"Sinais Vitais",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Sobre verificação da temperatura corporal, é CORRETO:",alternativas:["via oral é fácil e confortável","via oral indicada para bebês","via oral usada em crianças pequenas","não existe aferição por via oral","vias: retal, axila e membrana timpânica"],correta:4,resolucao:"As vias de aferição de temperatura são retal, axilar e timpânica."},
  {id:67,materia:"Sinais Vitais",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Sobre alterações do padrão respiratório:",alternativas:["apneia: respirações aumentadas","bradipneia: respirações cessam por vários segundos","bradipneia: FR < 12 irpm","hiperpneia: FR e profundidade irregulares","taquipneia: FR > 12 irpm"],correta:2,resolucao:"Bradipneia é a frequência respiratória anormalmente lenta, abaixo de 12 irpm."},
  {id:68,materia:"Hipertensão",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Sobre erros na aferição da PA, é CORRETO afirmar:",alternativas:["inflar lentamente não altera resultado","desinflar lentamente não altera","desinflar lentamente pode gerar erro na diastólica","largura do manguito não altera","manguito folgado: inflar ao máximo"],correta:2,resolucao:"Desinflar lentamente pode resultar em leitura falsamente elevada da pressão diastólica."},

  // === QUESTÕES DO PDF 3 (Resumões - questões no final dos capítulos) ===
  {id:69,materia:"Injeção IM",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre administração de injeções IM, qual alternativa está CORRETA?",alternativas:["verificar se local está isento de dor/infecção","no deltoide, expor parte superior da coxa","músculo vasto lateral é contraindicado","vasto lateral envolve glúteos","para vasto lateral, apontar polegar para virilha"],correta:0,resolucao:"Antes da aplicação IM, deve-se avaliar o local quanto a sinais de inflamação."},
  {id:70,materia:"Enfermagem",banca:"",ano:2021,dificuldade:3,enunciado:"Paciente com cirrose hepática. Cuidados para monitorar ascite:",alternativas:["administrar anti-helmínticos","promover sono e repouso","administrar antibióticos","medir diâmetro abdominal e pesar","minimizar risco de edemas"],correta:3,resolucao:"Para monitorar ascite, deve-se medir a circunferência abdominal e pesar o paciente diariamente."},
  {id:71,materia:"Infectologia",banca:"",ano:2021,dificuldade:2,enunciado:"A candidíase é uma infecção:",alternativas:["Fúngica","Helmíntica","Viral","Bacteriana","Abiótica"],correta:0,resolucao:"Candidíase é uma infecção fúngica causada por Candida albicans."},
  {id:72,materia:"Cirurgia",banca:"",ano:2021,dificuldade:2,enunciado:"Cirurgia planejada de acordo com a conveniência do paciente (ex: retirada de cisto) é considerada:",alternativas:["Opcional","Eletiva","Solicitada","Emergência","Urgência"],correta:1,resolucao:"Cirurgia eletiva é aquela programada de acordo com a conveniência do paciente."},
  {id:73,materia:"Geriatria",banca:"",ano:2021,dificuldade:2,enunciado:"Definição de 'pessoa idosa' conforme políticas públicas no Brasil:",alternativas:["idade >65 anos com déficits","idade >65 anos, cuidado focado no controle de doenças","idade >62 anos com perda de funcionalidade","idade ≥60 anos, conservação da autonomia","todos os idosos apresentam síndrome da fragilidade"],correta:3,resolucao:"O Estatuto do Idoso considera idosa a pessoa com idade igual ou superior a 60 anos."},
  {id:74,materia:"Imunização",banca:"",ano:2021,dificuldade:2,enunciado:"A vacina Meningocócica C (conjugada) evita:",alternativas:["doenças invasivas por Streptococcus pneumoniae","doenças invasivas por Neisseria meningitidis sorogrupo C","infecções por Haemophilus meningitidis sorogrupo C","infecções por Streptococcus meningitidis sorogrupo C","doenças invasivas por Haemophilus influenzae"],correta:1,resolucao:"A vacina meningocócica C protege contra a Neisseria meningitidis do sorogrupo C."},
  {id:75,materia:"Esterilização",banca:"",ano:2021,dificuldade:2,enunciado:"Classificação de artigos para desinfecção e esterilização, é CORRETO afirmar:",alternativas:["mamadeiras, bicos são críticos","endoscópios, laparoscópios são semicríticos","endoscópios são não críticos","endoscópios são críticos","cabo de laringoscópio é crítico"],correta:1,resolucao:"Endoscópios entram em contato com mucosas, sendo classificados como semicríticos."},
  {id:76,materia:"Posições",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre posicionamento do paciente, é CORRETO afirmar:",alternativas:["Posição Krasker = Sims com desvio à direita","Posição Prona = Smis","Posição Dorsal = Trendelenburg","Posição Krasker = posição ginecológica","Posição Prona = paciente de bruços"],correta:4,resolucao:"Posição prona ou ventral é quando o paciente fica deitado de bruços."},
  {id:77,materia:"Infectologia",banca:"",ano:2021,dificuldade:2,enunciado:"Doença transmissível aguda, toxiinfecciosa, causada por bacilo toxigênico que se aloja nas amígdalas, faringe, laringe:",alternativas:["Difteria","Sarampo","Varicela","Febre Tifoide","Pneumonia"],correta:0,resolucao:"Difteria é causada pelo Corynebacterium diphtheriae e forma pseudomembranas."},
  {id:78,materia:"Doença de Chagas",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre a transmissão da Doença de Chagas, é CORRETO afirmar:",alternativas:["picada do barbeiro","apenas pelas fezes do barbeiro","fezes do barbeiro, transmissão oral, vertical, transplante","contaminação de seringas","ocorre apenas em casas de taipa"],correta:2,resolucao:"A transmissão do Trypanosoma cruzi ocorre pelas fezes do barbeiro, via oral, vertical ou por transplante."},
  {id:79,materia:"Obstetrícia",banca:"",ano:2021,dificuldade:2,enunciado:"O que é uma Episiotomia?",alternativas:["incisão do períneo durante o parto","incisão do reto para hemorroidectomia","cirurgia de útero invertido","incisão do periósteo interno do crânio","incisão do pericárdio"],correta:0,resolucao:"Episiotomia é a incisão cirúrgica do períneo para facilitar o parto."},
  {id:80,materia:"Diabetes",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre Diabetes mellitus é CORRETO afirmar:",alternativas:["distúrbio gastrointestinal de idosos","deficiência total de insulina com hipoglicemia","intolerância transitória à glicose","distúrbio do metabolismo de carboidrato com hiperglicemia","deficiência total de insulina causa alimentar"],correta:3,resolucao:"Diabetes é um distúrbio do metabolismo da glicose resultante de deficiência ou resistência à insulina."},
  {id:81,materia:"Feridas",banca:"",ano:2021,dificuldade:2,enunciado:"Sobre classificação de feridas, é VERDADEIRA:",alternativas:["aparência não indica estágio de cicatrização","lesões por pressão são agudas","feridas superficiais envolvem epiderme, derme e TCS","feridas crônicas atingem músculo por trauma","feridas agudas são geralmente traumáticas"],correta:4,resolucao:"Feridas agudas são geralmente causadas por traumas como cortes e abrasões."},

  // === QUESTÕES DO CAPÍTULO 1 (Ética) do Resumo 1 ===
  {id:82,materia:"Ética",banca:"IBFC",ano:2016,dificuldade:2,enunciado:"Não é um dos princípios fundamentais da Bioética:",alternativas:["Humanização","Não maleficência","Justiça","Autonomia","Beneficência"],correta:0,resolucao:"Os princípios da Bioética são: Autonomia, Beneficência, Não maleficência e Justiça."},
  {id:83,materia:"Ética",banca:"IBFC",ano:2013,dificuldade:2,enunciado:"Sobre autonomia, um dos princípios da Bioética, assinale a alternativa correta:",alternativas:["obrigação de não causar danos","poder de tomar decisões sobre sua vida e saúde","fazer o bem","distribuição igual dos direitos","ausência de pressões externas"],correta:1,resolucao:"Autonomia é o poder de decisão da pessoa sobre sua própria vida e saúde."},
  {id:84,materia:"Ética",banca:"CRS",ano:2010,dificuldade:2,enunciado:"Considerando beneficência e não maleficência, o profissional deve:",alternativas:["fazer o bem mesmo causando dano","priorizar benefícios e minimizar riscos","agir conforme vontade da família","obedecer apenas ordens médicas","preservar confidencialidade acima de tudo"],correta:1,resolucao:"O profissional deve equilibrar o fazer o bem com o não causar dano."},
  {id:85,materia:"Ética",banca:"EsSA",ano:2014,dificuldade:3,enunciado:"O Técnico de Enfermagem exerce atividade de nível médio, cabendo-lhe ESPECIALMENTE:",alternativas:["participar da programação da assistência de enfermagem","executar ações de tratamento simples","prestar cuidados de higiene","prevenção de danos","prevenção de infecção hospitalar"],correta:0,resolucao:"Conforme Lei 7.498/86, ao técnico de enfermagem cabe participar da programação da assistência."},
  {id:86,materia:"Ética",banca:"EsFCEx",ano:2017,dificuldade:2,enunciado:"Lei que dispõe sobre condições para promoção, proteção e recuperação da saúde:",alternativas:["Lei 8.080/90","Lei 429/06","Lei 1.035/88","Lei 9.808/09","Lei 2.793/77"],correta:0,resolucao:"A Lei 8.080/90 dispõe sobre as condições para promoção, proteção e recuperação da saúde (SUS)."},
  {id:87,materia:"Ética",banca:"CAP",ano:2018,dificuldade:2,enunciado:"De acordo com a Lei 7.498/86, o Técnico de Enfermagem exerce atividades de nível médio, cabendo-lhe especialmente:",alternativas:["prescrição da assistência","realizar consulta de enfermagem","participar da orientação e supervisão em grau auxiliar","consultoria e auditoria","cuidados diretos a pacientes graves"],correta:2,resolucao:"O técnico de enfermagem participa da orientação e supervisão do trabalho em grau auxiliar."},
  {id:88,materia:"Ética",banca:"CSM",ano:2012,dificuldade:3,enunciado:"Segundo Resolução COFEN n° 564/17, a suspensão consiste na proibição do exercício por até:",alternativas:["29 dias","39 dias","49 dias","69 dias","90 dias"],correta:4,resolucao:"A suspensão do exercício profissional pode ser por até 90 dias."},
  {id:89,materia:"Transplantes",banca:"INSTITUTO AOCP",ano:2013,dificuldade:3,enunciado:"Qual órgão NÃO pode ser retirado de doador vivo?",alternativas:["Medula óssea","Córnea","Rim","Parte do fígado","Parte do pulmão"],correta:1,resolucao:"A córnea não pode ser retirada de doador vivo, apenas de doador falecido."},
  {id:90,materia:"Ética",banca:"CAP",ano:2017,dificuldade:3,enunciado:"É considerada situação atenuante:",alternativas:["cometer infração dolosamente","cometer infração com abuso de autoridade","cometer infração por motivo fútil","realizar atos sob coação","ter maus antecedentes"],correta:3,resolucao:"Realizar atos sob coação é circunstância atenuante."},
  {id:91,materia:"Ética",banca:"CONTEMAX",ano:2019,dificuldade:2,enunciado:"São circunstâncias atenuantes, EXCETO:",alternativas:["colaborado espontaneamente","bons antecedentes","atos sob coação","infração por motivo fútil","confessado espontaneamente"],correta:3,resolucao:"Cometer infração por motivo fútil é agravante, não atenuante."},
  {id:92,materia:"Ética",banca:"HNMD",ano:2011,dificuldade:3,enunciado:"Em relação ao Código de Ética, assinale a afirmativa correta:",alternativas:["dever associar-se a entidades de classe","multa de 1-10x o valor da anuidade","suspensão = perda do direito","cassação = competência do COREN","infrações graves = morte, deformidade, dano moral"],correta:4,resolucao:"Infrações graves incluem morte, deformidade permanente e dano moral irremediável."},
  {id:93,materia:"Ética",banca:"UFLA",ano:2018,dificuldade:3,enunciado:"Transgressões que provoquem debilidade temporária de membro são consideradas infrações:",alternativas:["Graves","Agravantes","Moderadas","Gravíssimas","Leves"],correta:2,resolucao:"Debilidade temporária caracteriza infração moderada."},
  {id:94,materia:"Ética",banca:"MetroCapital",ano:2019,dificuldade:2,enunciado:"Se o enfermeiro se recusar a aplicar medicação que poderia comprometer a saúde do paciente, entende-se que:",alternativas:["exerceu seu dever profissional","exerceu seu direito","praticou omissão","cometeu negligência","cometeu imprudência"],correta:1,resolucao:"O profissional tem o direito de recusar procedimentos que possam comprometer a saúde do paciente."},

  // === QUESTÕES DO CAPÍTULO 2 (Imunização) do Resumo 1 ===
  {id:95,materia:"Imunização",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Sobre o Calendário Básico de Vacinação da Criança, é correto afirmar que:",alternativas:["Hepatite B: 1ª dose ao nascer","BCG: preferencialmente ao nascer","Tríplice viral: sarampo, difteria, rubéola","Febre amarela antes dos 2 meses não precisa de reforço","Rotavírus não faz parte do calendário"],correta:1,resolucao:"A BCG deve ser administrada ao nascer, em dose única."},
  {id:96,materia:"Imunização",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Vacinação de rotina para gestantes:",alternativas:["Tétano","Ébola","Hanseníase","AIDS","Dengue"],correta:0,resolucao:"A vacina dupla adulto (dT) é recomendada para gestantes para prevenção do tétano neonatal."},
  {id:97,materia:"Imunização",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Reforço da vacina dupla bacteriana:",alternativas:["5/5 anos até cura","2/2 anos","5/5 anos","10/10 anos","10/10 anos até cura"],correta:3,resolucao:"O reforço da dT deve ser a cada 10 anos."},
  {id:98,materia:"Imunização",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Vacina contra Hepatite B deve ser administrada preferencialmente:",alternativas:["primeiras 12h","9 meses","4 meses","6 meses","10 anos"],correta:0,resolucao:"A primeira dose da hepatite B deve ser nas primeiras 12 horas de vida."},
  {id:99,materia:"Imunização",banca:"FUNDEP",ano:2020,dificuldade:2,enunciado:"Vacina administrada por via intradérmica:",alternativas:["Rotavírus","Sarampo","BCG","Febre amarela","Hepatite B"],correta:2,resolucao:"A vacina BCG é a única vacina administrada por via intradérmica."},
  {id:100,materia:"Imunização",banca:"AOCP",ano:2016,dificuldade:2,enunciado:"Vacina administrada por via subcutânea:",alternativas:["Rotavírus","Febre amarela","Hepatite B","BCG","Pentavalente"],correta:1,resolucao:"A vacina febre amarela é administrada por via subcutânea."},

  // === QUESTÕES DO CAPÍTULO 3 (Saúde Mental) do Resumo 1 ===
  {id:101,materia:"Saúde Mental",banca:"Prefeitura RJ",ano:2016,dificuldade:3,enunciado:"Paciente com fraqueza muscular e reflexos diminuídos dos MMII, com história de doença viral nas semanas anteriores, sugere:",alternativas:["miastenia grave","neuralgia do trigêmeo","paralisia de Bell","síndrome de Guillain-Barré","esclerose múltipla"],correta:3,resolucao:"A síndrome de Guillain-Barré é uma polirradiculoneuropatia pós-infecciosa."},
  {id:102,materia:"Saúde Mental",banca:"Marinha",ano:2016,dificuldade:2,enunciado:"Transtorno neurodegenerativo com tremor, rigidez, instabilidade postural e bradicinesia:",alternativas:["Parkinson","Huntington","Degeneração de discos","ELA","Alzheimer"],correta:0,resolucao:"Doença de Parkinson caracteriza-se pelos sintomas motores descritos."},
  {id:103,materia:"Saúde Mental",banca:"Marinha",ano:2017,dificuldade:2,enunciado:"Contenções mecânicas em pacientes psiquiátricos são implementadas:",alternativas:["sem prescrição médica","em caráter educativo","por períodos prolongados","sem contenção química","quando a segurança estiver em risco"],correta:4,resolucao:"Contenção mecânica só deve ser usada quando há risco à segurança do paciente ou de outros."},
  {id:104,materia:"Saúde Mental",banca:"Marinha",ano:2017,dificuldade:2,enunciado:"Sintomatologia da Esquizofrenia, EXCETO:",alternativas:["Delirium tremens","alucinação auditiva","catatonia","isolamento social","alucinação visual"],correta:0,resolucao:"Delirium tremens é um quadro de abstinência alcoólica, não da esquizofrenia."},
  {id:105,materia:"Saúde Mental",banca:"ESA",ano:2016,dificuldade:2,enunciado:"Doença neurológica degenerativa progressiva e irreversível, com perdas graduais da função cognitiva, mais presente em idosos >65 anos:",alternativas:["Epilepsia","Alzheimer","Parkinson","AVC isquêmico","Presbiopia"],correta:1,resolucao:"Doença de Alzheimer é a principal causa de demência em idosos."},
  {id:106,materia:"Saúde Mental",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Transtorno Bipolar Tipo I:",alternativas:["numerosos episódios hipomaníacos","surtos em pequena quantidade, episódios depressivos","numerosos episódios alternando hipomaníacos e depressivos leves","surtos em pequena quantidade, episódios mistos","episódios maníacos ou mistos alternados com depressivos maiores"],correta:4,resolucao:"Transtorno Bipolar I é definido por episódios maníacos completos."},
  {id:107,materia:"Saúde Mental",banca:"ESA",ano:2017,dificuldade:2,enunciado:"Transtorno mental com alteração do pensar, sentir e relacionar-se, com alucinação, delírio e perda de contato com a realidade:",alternativas:["Esquizofrenia","Huntington","Guillain-Barré","Parkinson","Esclerose Múltipla"],correta:0,resolucao:"Esquizofrenia é caracterizada por perda de contato com a realidade."},
  {id:108,materia:"Saúde Mental",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Transtorno Mental caracterizado por pensamentos obsessivos ou atos compulsivos persistentes:",alternativas:["Esquizofrenia","Transtorno do Pânico","Transtorno Bipolar","TOC","Zoofobia"],correta:3,resolucao:"TOC é caracterizado por obsessões e compulsões."},
  {id:109,materia:"Saúde Mental",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Sobre assistência de Enfermagem ao portador de Alzheimer, marque a incorreta:",alternativas:["conter o paciente no leito","retirar objetos que causem risco","deixar relógios e calendários","servir alimentos familiares em pequenas porções","promover comunicação calma"],correta:0,resolucao:"Conter o paciente no leito não é recomendado; deve-se promover a mobilidade segura."},
  {id:110,materia:"Saúde Mental",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Sobre cuidados de enfermagem em saúde mental, atribua V ou F:",alternativas:["contenções são proibidas","contenção física é último recurso","paciente psiquiátrico requer cuidados especiais","forçar medicação é prática ultrapassada","estimular autocuidado"],correta:"F-V-V-V-V"},

  // === QUESTÕES DO CAPÍTULO 4 (Fundamentos) do Resumo 1 ===
  {id:111,materia:"Sinais Vitais",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Ausculta do ápice cardíaco no 5º EIC linha hemiclavicular verifica qual pulso?",alternativas:["Femoral","Pedioso","Radial","Carotídeo","Apical"],correta:4,resolucao:"Pulso apical é auscultado no ápice cardíaco."},
  {id:112,materia:"Sondagem",banca:"ESA",ano:2011,dificuldade:3,enunciado:"Na remoção de sonda nasogástrica, é INCORRETO afirmar:",alternativas:["clampear por 24h","lavar com 10ml SF","puxar delicadamente","paciente inspirar profundamente","remover em movimento suave"],correta:3,resolucao:"O paciente deve prender a respiração ou expirar, não inspirar profundamente."},
  {id:113,materia:"Cateterismo",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Medida preventiva mais indicada para infecção no cateterismo vesical:",alternativas:["trocar cateter a cada 7 dias","usar luva ao abrir sistema","substituir drenagem a cada 24h","lavar as mãos sempre","colher urocultura"],correta:3,resolucao:"Higienização das mãos é a medida mais eficaz."},
  {id:114,materia:"Terminologia",banca:"ESA",ano:2013,dificuldade:2,enunciado:"Vômito sanguinolento aspecto 'borra de café' possui termo técnico:",alternativas:["Melena","Hemoptise","Hematêmese","Enterorragia","Epistaxe"],correta:2,resolucao:"Hematêmese é o vômito com sangue."},
  {id:115,materia:"Terminologia",banca:"ESA",ano:2014,dificuldade:2,enunciado:"Deslocamento para baixo da bexiga para o centro da vagina caracteriza:",alternativas:["Bexigoma","Uretrocele","Enterocele","Retocele","Cistocele"],correta:4,resolucao:"Cistocele é a protrusão da bexiga para a vagina."},
  {id:116,materia:"Nutrição",banca:"ESA",ano:2014,dificuldade:3,enunciado:"Vias de administração indicadas na terapia nutricional de longo prazo, reduzindo risco de aspiração:",alternativas:["Parenteral e enteral","Enteral e jejunostomias","Gastrostomia ou jejunostomia","Oral e parenteral","Gastrectomia e jejunostomia"],correta:2,resolucao:"Gastrostomia e jejunostomia são indicadas para nutrição enteral de longo prazo."},
  {id:117,materia:"Sondagem",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Método mais preciso para verificar posicionamento da sonda nasogástrica:",alternativas:["Raio X","Medida do comprimento exposto","Cor do aspirado","pH aspirado","Ausculta de ar"],correta:0,resolucao:"A radiografia é o método padrão-ouro para confirmar o posicionamento da SNG."},
  {id:118,materia:"Posições",banca:"ESA",ano:2017,dificuldade:1,enunciado:"Posição que facilita a respiração em pacientes com problemas cardíacos e pulmonares:",alternativas:["Fowler","Sims","Trendelenburg","Genupeitoral","Decúbito lateral"],correta:0,resolucao:"Posição de Fowler é indicada para facilitar a respiração."},
  {id:119,materia:"Sinais Vitais",banca:"ESA",ano:2017,dificuldade:1,enunciado:"Instrumento utilizado para verificar a temperatura axilar:",alternativas:["Esfigmomanômetro","Estetoscópio","Termoscópio","Termômetro","Endoscópio"],correta:3,resolucao:"Termômetro é o instrumento para medir temperatura."},
  {id:120,materia:"Sondagem",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Sobre sondas nasogástricas, marque a alternativa correta:",alternativas:["injetar água avalia posicionamento","sondagem também para aspiração","dumping é por baixa velocidade","bolus evita distensão","posição Sims evita aspiração"],correta:1,resolucao:"A SNG é utilizada tanto para alimentação quanto para aspiração gástrica."},
  {id:121,materia:"Sinais Vitais",banca:"ESA",ano:2018,dificuldade:1,enunciado:"Aumento na frequência respiratória é denominada:",alternativas:["Bradipneia","Apneia","Eupneia","Dispneia","Taquipneia"],correta:4,resolucao:"Taquipneia é o aumento da frequência respiratória."},
  {id:122,materia:"Dietas",banca:"Prefeitura RJ",ano:2013,dificuldade:2,enunciado:"Paciente com gastrite, técnico deverá oferecer:",alternativas:["dieta líquida","dieta branda várias vezes ao dia","dieta hipercalórica por SNG","dieta líquido-pastosa no almoço","dieta pastosa"],correta:1,resolucao:"Dieta branda, fracionada, é indicada para gastrite."},
  {id:123,materia:"Cateterismo",banca:"Prefeitura RJ",ano:2013,dificuldade:2,enunciado:"Material imprescindível para cateterismo vesical de demora:",alternativas:["cateter de Nélaton","sonda de Foley","sonda Levine","cateter nasal","sonda retal"],correta:1,resolucao:"Sonda de Foley é utilizada para cateterismo vesical de demora."},
  {id:124,materia:"Posições",banca:"Prefeitura RJ",ano:2013,dificuldade:2,enunciado:"Paciente em decúbito dorsal com joelhos flexionados sobre o abdome e pernas sobre coxas afastadas:",alternativas:["genupetoral","Sims","litotômica","decúbito dorsal","Fowler"],correta:2,resolucao:"Posição litotômica é utilizada para exames ginecológicos."},
  {id:125,materia:"Posições",banca:"EAGS",ano:2010,dificuldade:2,enunciado:"Antes de inserir supositório retal, paciente deve ser posicionado em:",alternativas:["decúbito ventral","Trendelenburg","decúbito lateral direito, Sims","decúbito lateral esquerdo, Sims"],correta:3,resolucao:"Posição de Sims esquerdo é indicada para administração de supositório."},
  {id:126,materia:"Feridas",banca:"EAGS",ano:2010,dificuldade:2,enunciado:"Cores das feridas: vermelha, amarela, preta. Correlacione:",alternativas:["preta=necrose, vermelha=cura, amarela=exsudato","preta=exsudato, vermelha=necrose, amarela=cura","vermelha=necrose, amarela=cura, preta=exsudato","vermelha=exsudato, amarela=necrose, preta=cura"],correta:0,resolucao:"Ferida preta = necrose, vermelha = granulação/cura, amarela = exsudato/fibrina."},
  {id:127,materia:"Sinais Vitais",banca:"EAGS",ano:2010,dificuldade:2,enunciado:"A tomada do pulso determina a:",alternativas:["frequência, ritmo e volume","volume, profundidade e ritmo","ritmo, volume e amplitude","frequência, ritmo e profundidade","amplitude, frequência e ritmo"],correta:0,resolucao:"O pulso é avaliado quanto à frequência, ritmo e amplitude/volume."},
  {id:128,materia:"Oximetria",banca:"EAGS",ano:2009,dificuldade:2,enunciado:"Sobre oximetria de pulso, é correto afirmar:",alternativas:["procedimento invasivo","indica saturação de nitrogênio","pode-se usar fotodetector no dedo","local adequado em neonato é ponta da língua","mede pressão arterial"],correta:2,resolucao:"O oximetro é colocado no dedo ou lóbulo da orelha."},
  {id:129,materia:"Coleta de Exames",banca:"EAGS",ano:2009,dificuldade:2,enunciado:"Sobre coleta de urina de sonda de demora:",alternativas:["técnica não precisa ser estéril","não é necessário clampear","não é necessário aspirar com seringa","clampear e aspirar com seringa","coletar da bolsa coletora"],correta:3,resolucao:"Para coleta de urina de sonda de demora, deve-se clampear e aspirar com seringa."},
  {id:130,materia:"Nutrição Enteral",banca:"EAGS",ano:2011,dificuldade:2,enunciado:"Cuidado característico da alimentação por SNG:",alternativas:["verificar posição antes","administrar rápido","esvaziar seringa completamente","não precisa lavar","usar seringa sem êmbolo"],correta:0,resolucao:"Antes de administrar dieta, deve-se verificar o posicionamento da sonda."},
  {id:131,materia:"Colostomia",banca:"EAGS",ano:2011,dificuldade:2,enunciado:"Sobre colostomia, marque V ou F:",alternativas:["estoma deve ser medido, paciente estimulado ao autocuidado, calor ajuda aderência, bolsa não deve ser apertada","V-V-V-V","V-V-V-F","V-F-V-V","F-V-V-V"],correta:1,resolucao:"Todas as afirmações são verdadeiras, exceto a de que a bolsa deve ser apertada."},
  {id:132,materia:"Sinais Vitais",banca:"EAGS",ano:2011,dificuldade:2,enunciado:"Nó sinoatrial gera impulsos entre:",alternativas:["20-80","30-90","40-100","60-100","70-110"],correta:3,resolucao:"O nó sinusal gera impulsos entre 60-100 vezes por minuto no adulto."},
  {id:133,materia:"Cateterismo",banca:"EAGS",ano:2013,dificuldade:2,enunciado:"Após remover sonda vesical de demora, devemos registrar, EXCETO:",alternativas:["quanto urinou","tolerância do paciente","data e hora da irrigação","data e hora da remoção","aspecto da urina"],correta:2,resolucao:"A irrigação da sonda não é registrada após a remoção."},
  {id:134,materia:"Cateterismo",banca:"EAGS",ano:2013,dificuldade:2,enunciado:"Cuidado durante instalação de sonda de demora:",alternativas:["forçar caso haja dificuldade","paciente feminino em Sims","lubrificante hidrossolúvel na ponta","insuflar balão antes do fluxo","fixar sem tração"],correta:4,resolucao:"Após inserção, a sonda deve ser fixada sem tração."},
  {id:135,materia:"Hipertensão",banca:"EAGS",ano:2013,dificuldade:2,enunciado:"Sobre aferição de PA, assinale V ou F:",alternativas:["artéria abaixo do coração: leitura alta","não aferir no braço de fístula","manguito estreito: leitura baixa","V-V-V","V-V-F","F-V-V","V-V-F"],correta:1,resolucao:"As três afirmações são verdadeiras."},
  {id:136,materia:"Sinais Vitais",banca:"EAGS",ano:2014,dificuldade:2,enunciado:"Sobre aferição de sinais vitais, marque a INCORRETA:",alternativas:["estertor = secreção em grandes vias","temperatura oral contraindicada em crianças","FR adulto 16-20","ambiente quente aumenta temperatura","oximetria mede saturação"],correta:1,resolucao:"Temperatura oral é contraindicada em crianças pequenas, inconscientes e desorientados."},
  {id:137,materia:"Nutrição Enteral",banca:"EAGS",2013,dificuldade:2,enunciado:"Contraindicado para instilação por SNG:",alternativas:["água","suco","medicamento oleoso","comprimido sem revestimento","dieta pastosa"],correta:2,resolucao:"Medicamentos oleosos podem obstruir a sonda."},
  {id:138,materia:"Gastrostomia",banca:"EAGS",2014,dificuldade:2,enunciado:"Sobre gastrostomia, marque a INCORRETA:",alternativas:["dieta em bolus ou contínua","não é necessário jejum prévio","troca de sonda após cicatrização","lavar com 30ml água após dieta","fixar sonda"],correta:1,resolucao:"O jejum é necessário antes da realização da gastrostomia."},
  {id:139,materia:"Exames",banca:"EAGS",2016,dificuldade:2,enunciado:"Presença de proteína na urina:",alternativas:["Glicosúria","Proteinúria","Bacteriúria","Uremia","Cetonúria"],correta:1,resolucao:"Proteinúria é a presença de proteína na urina."},
  {id:140,materia:"Procedimentos",banca:"EAGS",2016,dificuldade:2,enunciado:"Aspiração de líquido ou ar do espaço pleural:",alternativas:["biópsia","paracentese","broncoscopia","toracocentese","punção lombar"],correta:3,resolucao:"Toracocentese é a punção da cavidade pleural."},
  {id:141,materia:"Exames",banca:"EAGS",2017,dificuldade:2,enunciado:"Cultura de urina determina presença de:",alternativas:["cristais","bactérias","transparência","proteína","glicose"],correta:1,resolucao:"Urocultura identifica bactérias na urina."},
  {id:142,materia:"Sinais Vitais",banca:"EAGS",2019,dificuldade:2,enunciado:"Temperatura de 40,5°C é denominada:",alternativas:["estado febril","hipertermia","hiperpirexia","febre","febrícula"],correta:2,resolucao:"Hiperpirexia é a febre muito alta (>40°C)."},

  // === QUESTÕES DO CAPÍTULO 5 (Clínica Cirúrgica) do Resumo 1 ===
  {id:143,materia:"Clínica Cirúrgica",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Cuidado contraindicado em apendicectomia:",alternativas:["enema no pré-operatório","infusão venosa","antibioticoterapia","SNG se íleo","semi-Fowler pós-cirurgia"],correta:0,resolucao:"Enema pode causar perfuração do apêndice."},
  {id:144,materia:"Infecção Hospitalar",banca:"ESA",ano:2012,dificuldade:2,enunciado:"Infecção hospitalar acresce à internação em média:",alternativas:["1-3 dias","11-15 dias","11-20 dias","15-30 dias","5-10 dias"],correta:4,resolucao:"Prolonga a internação em média 5-10 dias."},
  {id:145,materia:"Clínica Cirúrgica",banca:"ESA",ano:2013,dificuldade:3,enunciado:"Cuidado para controle da PIC no pós-operatório de craniotomia:",alternativas:["trocar cateter a cada 24h","manter Trendelenburg","manter SVD","monitorar prurido","atentar para obstipação e vômitos"],correta:4,resolucao:"Vômitos e obstipação podem aumentar a PIC."},
  {id:146,materia:"Clínica Cirúrgica",banca:"ESA",ano:2013,dificuldade:2,enunciado:"Ação contraindicada no pré-operatório imediato de craniotomia:",alternativas:["PA de 2/2h","Fowler baixo","tricotomia do couro cabeludo","NPVO","administrar enemas"],correta:4,resolucao:"Enemas são contraindicados pois aumentam a PIC."},
  {id:147,materia:"Feridas",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Rasgo na pele com bordas irregulares e pontes venosas:",alternativas:["laceração","avulsão","abrasão","hematoma","corte"],correta:0,resolucao:"Ferida lacerada apresenta bordas irregulares."},
  {id:148,materia:"Cirurgia",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Incisão no tímpano para drenar secreções:",alternativas:["Miringotomia","Septoplastia","Facectomia","Simpatectomia","Timpanoplastia"],correta:0,resolucao:"Miringotomia é a incisão cirúrgica da membrana timpânica."},
  {id:149,materia:"Curativos",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Coberturas indicadas para úlcera infectada e risco de UPP:",alternativas:["Alginato de cálcio e carvão","Papaína e filme","Carvão e hidrocoloide","Hidrocoloide e filme","Alginato de prata e hidrocoloide"],correta:2,resolucao:"Carvão ativado para infecção/exsudato e hidrocoloide para prevenção de UPP."},
  {id:150,materia:"Cirurgia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Aumento do tempo de protrombina leva a risco de:",alternativas:["infecção","queda da PA","baixo débito urinário","arritmia","sangramento"],correta:4,resolucao:"TP prolongado indica risco de sangramento."},
  {id:151,materia:"Cirurgia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Cirurgia potencialmente contaminada:",alternativas:["marca-passo","mediastino","neurocirurgia via nasofaringe","ortopédica eletiva","retirada de nódulos de mama"],correta:2,resolucao:"Procedimentos que penetram em tratos respiratórios são potencialmente contaminados."},
  {id:152,materia:"Cirurgia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Classificação da cirurgia quanto à urgência:",alternativas:["ambulatorial, hospitalar","ambulatorial, urgência","eletiva, ambulatório","emergência, eletiva, opcional","emergência, urgência, requerida, eletiva, opcional"],correta:4,resolucao:"A classificação da urgência cirúrgica inclui eletiva, urgente, emergência, requerida e opcional."},
  {id:153,materia:"Terminologia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Cistectomia parcial é:",alternativas:["exame da bexiga","abertura para retirada de cisto","abertura para drenagem","extirpação da bexiga","remoção da vesícula"],correta:3,resolucao:"Cistectomia é a remoção (parcial ou total) da bexiga."},
  {id:154,materia:"Terminologia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Significado de adeno, blefaro, colecisto, ooforo:",alternativas:["adenóide, baço, cólon, osso","glândula, pálpebra, vesícula, ovário","vaso, artéria, útero, ouvido","rim, meninges, reto, trompa","coração, pulmão, fígado, baço"],correta:1,resolucao:"Adeno=glândula, blefaro=pálpebra, colecisto=vesícula biliar, ooforo=ovário."},
  {id:155,materia:"Cirurgia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Cirurgia potencialmente contaminada:",alternativas:["vascular","mediastino","herniorrafia","safenectomia","gastrectomia"],correta:4,resolucao:"Gastrectomia penetra no trato gastrointestinal, sendo potencialmente contaminada."},
  {id:156,materia:"Cirurgia",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Evisceração é:",alternativas:["deiscência parcial","drenagem purulenta","hemorragia","ruptura de planos","deiscência total com saída de vísceras"],correta:4,resolucao:"Evisceração é a saída de vísceras para o exterior."},
  {id:157,materia:"Esterilização",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Processo que elimina patogênicos, mas não esporos:",alternativas:["Esterilização","Assepsia","Desinfecção","Antissepsia","Cauterização"],correta:2,resolucao:"Desinfecção elimina patogênicos, mas não necessariamente esporos."},
  {id:158,materia:"Curativos",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Finalidade do curativo, EXCETO:",alternativas:["proteger","promover hemostasia","aliviar dor","absorver secreções","proporcionar infecção"],correta:4,resolucao:"O curativo não deve proporcionar infecção, mas sim preveni-la."},
  {id:159,materia:"Feridas",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Fatores que afetam a cicatrização, EXCETO:",alternativas:["ânimo do paciente","quantidade de resíduos","tipo de lesão","condição de saúde","presença de infecção"],correta:0,resolucao:"Ânimo do paciente não é fator diretamente relacionado à cicatrização."},
  {id:160,materia:"Curativos",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Curativo que promove quimiotaxia e angiogênese, mantém meio úmido:",alternativas:["Colagenase","Alginato","Hidrocoloide","Filme","AGE"],correta:4,resolucao:"Ácidos graxos essenciais promovem quimiotaxia e angiogênese."},

  // === QUESTÕES DO CAPÍTULO 13 (Legislação SUS) do Resumo 1 ===
  {id:161,materia:"Legislação SUS",banca:"ESA",ano:2013,dificuldade:2,enunciado:"Órgão que fiscaliza recursos do SUS:",alternativas:["Fundo Nacional de Saúde","Secretaria de Saúde","Conselho de Saúde","Conselho de Gestores","Ministério da Saúde"],correta:0,resolucao:"O Fundo Nacional de Saúde fiscaliza os recursos do SUS."},
  {id:162,materia:"Legislação SUS",banca:"ESA",ano:2014,dificuldade:2,enunciado:"Competência da direção estadual do SUS, EXCETO:",alternativas:["participar de ações de saneamento","acompanhar redes hierarquizadas","participar de ações de controle de ambientes de trabalho","gerir laboratórios e hemocentros","participar do controle de agravos do meio ambiente"],correta:3,resolucao:"Gerir laboratórios e hemocentros é competência municipal, não estadual."},
  {id:163,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Lei 8.080/90 regula ações executadas:",alternativas:["sempre conjuntamente","em caráter permanente ou eventual","exclusivamente por pessoas de direito público","apenas por pessoas jurídicas","apenas por pessoas naturais"],correta:1,resolucao:"As ações de saúde são executadas em caráter permanente ou eventual."},
  {id:164,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Afirmativa INCORRETA sobre a Lei 8.080:",alternativas:["ações devem ser por pessoas naturais","transporte e renda são determinantes de saúde","iniciativa privada pode participar","lei cuida de objetivos do SUS","saúde é direito fundamental"],correta:0,resolucao:"As ações podem ser executadas por pessoas naturais ou jurídicas."},
  {id:165,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"São fatores determinantes da saúde:",alternativas:["alimentação e organização econômica","moradia e acesso a bens essenciais","saneamento e desenvolvimento urbano","meio ambiente e organização industrial","educação e lazer"],correta:4,resolucao:"Alimentação, moradia, saneamento, trabalho, renda, educação, lazer, etc."},
  {id:166,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Iniciativa privada participa do SUS de forma:",alternativas:["prioritária","individualizada","social","complementar","exclusiva"],correta:3,resolucao:"A iniciativa privada participa do SUS de forma complementar."},
  {id:167,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Conjunto de atividades para promoção e proteção da saúde dos trabalhadores:",alternativas:["vigilância sanitária","vigilância epidemiológica","vigilância endemiológica","saúde do trabalhador","saúde ambiental"],correta:3,resolucao:"Saúde do trabalhador envolve vigilância epidemiológica e sanitária."},
  {id:168,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Princípio da descentralização com direção única em cada esfera de governo envolve:",alternativas:["ênfase na centralização","regionalização","hierarquização","regionalização e hierarquização","apenas centralização"],correta:3,resolucao:"Regionalização e hierarquização são componentes da descentralização."},
  {id:169,materia:"Legislação SUS",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Lei 8.080/90 regula ações e serviços de saúde em todo território nacional:",alternativas:["verdadeiro","falso","parcialmente","apenas para serviços públicos","apenas para serviços privados"],correta:0,resolucao:"Verdadeiro, a lei regula ações e serviços de saúde em todo território nacional."},

  // === QUESTÕES DO CAPÍTULO 14 (ECA) do Resumo 1 ===
  {id:170,materia:"ECA",banca:"ESA",ano:2016,dificuldade:2,enunciado:"Verificado ato infracional, autoridade poderá aplicar:",alternativas:["Repreensão","Semi-liberdade","Internação prisional","Detenção domiciliar","Privação dos atos civis"],correta:0,resolucao:"A advertência é uma das medidas socioeducativas."},
