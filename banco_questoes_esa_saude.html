<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESA Saúde — Banco de Questões</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0f1219;
  --bg-card: #1a1f2e;
  --sidebar-bg: #131824;
  --border: #252c3f;
  --border2: #2f384f;
  --text: #eef2ff;
  --text2: #9ca3cf;
  --text3: #6b7280;
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --green: #10b981;
  --green-light: #064e3b;
  --red: #ef4444;
  --red-light: #7f1d1d;
  --amber: #f59e0b;
  --amber-light: #78350f;
  --purple: #8b5cf6;
  --gray-light: #1e2438;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.2);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 24px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo span { background: none; -webkit-text-fill-color: var(--primary); }

.nav-tabs {
  display: flex;
  gap: 8px;
  background: var(--bg);
  padding: 4px;
  border-radius: 40px;
}
.nav-tab {
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 500;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 32px;
  color: var(--text2);
  transition: all 0.2s;
}
.nav-tab:hover { color: var(--text); background: var(--gray-light); }
.nav-tab.active {
  background: var(--primary);
  color: white;
  box-shadow: var(--shadow);
}

.stats-header {
  display: flex;
  gap: 16px;
  align-items: center;
}
.stat-badge {
  font-size: 12px;
  padding: 4px 12px;
  background: var(--bg);
  border-radius: 20px;
  color: var(--text2);
  border: 1px solid var(--border);
}
.stat-badge strong { color: var(--text); font-weight: 600; }

.app {
  display: flex;
  min-height: calc(100vh - 61px);
}

.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
  flex-shrink: 0;
}

.filter-section {
  padding: 0 16px 20px;
  border-bottom: 1px solid var(--border);
}
.filter-section:last-child { border-bottom: none; }

.filter-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  margin-bottom: 12px;
}

.filter-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 280px;
  overflow-y: auto;
}

.filter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
}
.filter-item:hover { background: var(--gray-light); }
.filter-item.active {
  background: rgba(59,130,246,0.15);
  color: var(--primary);
}
.filter-item .count {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 12px;
}
.filter-item.active .count {
  background: rgba(59,130,246,0.2);
  color: var(--primary);
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-info {
  font-size: 14px;
  color: var(--text2);
}
.results-info strong { color: var(--text); }

.toolbar-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text2);
  transition: all 0.2s;
}
.btn:hover { background: var(--gray-light); border-color: var(--border2); color: var(--text); }
.btn-primary {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline {
  border-color: var(--border2);
  background: transparent;
}

.question-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 20px;
  overflow: hidden;
  transition: all 0.2s;
}
.question-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--gray-light);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}

.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg);
  border: 1px solid var(--border);
}
.badge-banca { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); color: #60a5fa; }
.badge-materia { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #34d399; }
.badge-dificil { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
.badge-muito-dificil { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #f87171; }

.card-actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  background: none;
  border: none;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  color: var(--text3);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn.fav.active { color: #f59e0b; }

.card-body {
  padding: 20px;
}

.question-text {
  font-size: 15px;
  line-height: 1.5;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--text);
}

.alternatives {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}

.alt-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.alt-item:hover:not(.disabled) { background: var(--gray-light); }
.alt-item.selected-correct {
  background: rgba(16,185,129,0.15);
  border-color: var(--green);
}
.alt-item.selected-wrong {
  background: rgba(239,68,68,0.15);
  border-color: var(--red);
}
.alt-item.correct-answer {
  background: rgba(16,185,129,0.1);
  border-color: var(--green);
}
.alt-letter {
  font-weight: 700;
  min-width: 28px;
  color: var(--text2);
}
.alt-text { flex: 1; font-size: 14px; }

.resolution-box {
  margin-top: 16px;
  padding: 16px;
  background: var(--gray-light);
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--primary);
  display: none;
}
.resolution-box.show { display: block; }
.resolution-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.resolution-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}

.sim-config-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 24px;
}
.sim-config-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
}
.sim-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.sim-label {
  width: 140px;
  font-size: 14px;
  color: var(--text2);
}
.sim-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  min-width: 200px;
}
.sim-progress {
  margin-bottom: 20px;
}
.progress-bar {
  height: 4px;
  background: var(--gray-light);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.3s;
}
.sim-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  gap: 12px;
}

.panel { display: none; }
.panel.active { display: block; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
}
.stat-label {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { padding: 16px; }
}

.search-input {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  width: 240px;
  outline: none;
}
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--text3); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">ESA <span>SAÚDE</span> · BANCO DE QUESTÕES</div>
    <div class="stats-header">
      <div class="stat-badge">📚 Total: <strong id="stat-total">0</strong></div>
      <div class="stat-badge">✅ Acertos: <strong id="stat-acertos">—</strong></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('questoes')">📋 Questões</button>
    <button class="nav-tab" onclick="showPanel('simulado')">🎯 Simulado</button>
    <button class="nav-tab" onclick="showPanel('estatisticas')">📊 Estatísticas</button>
    <button class="nav-tab" onclick="showPanel('erros')">❌ Meus Erros</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">📂 MATÉRIA</div>
      <div class="filter-list" id="filter-materias"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">🏛 BANCA</div>
      <div class="filter-list" id="filter-bancas"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">📅 ANO</div>
      <div class="filter-list" id="filter-anos"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">⭐ DIFICULDADE</div>
      <div class="filter-list" id="filter-dificuldades"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">⭐ ESPECIAIS</div>
      <div class="filter-list" id="filter-especiais"></div>
    </div>
  </aside>

  <main class="main-content">
    <div id="panel-questoes" class="panel active">
      <div class="toolbar">
        <div class="results-info"><strong id="result-count">0</strong> questões encontradas</div>
        <div class="toolbar-actions">
          <input type="text" id="search-input" class="search-input" placeholder="🔍 Buscar no enunciado..." oninput="renderizarQuestoes()">
          <button class="btn btn-outline" onclick="expandirTodas()">📖 Expandir tudo</button>
          <button class="btn btn-primary" onclick="iniciarSimuladoRapido()">🎯 Simulado rápido</button>
        </div>
      </div>
      <div id="questions-container"></div>
    </div>

    <div id="panel-simulado" class="panel">
      <div id="sim-setup">
        <div class="sim-config-card">
          <div class="sim-config-title">⚙️ Configurar Simulado</div>
          <div class="sim-row"><span class="sim-label">Quantidade:</span><select class="sim-select" id="sim-qtd"><option value="5">5 questões</option><option value="10" selected>10 questões</option><option value="20">20 questões</option><option value="30">30 questões</option></select></div>
          <div class="sim-row"><span class="sim-label">Matéria:</span><select class="sim-select" id="sim-materia"><option value="">Todas</option></select></div>
          <div class="sim-row"><span class="sim-label">Banca:</span><select class="sim-select" id="sim-banca"><option value="">Todas</option></select></div>
          <div class="sim-row"><span class="sim-label">Correção:</span><select class="sim-select" id="sim-modo"><option value="imediato">Imediata (na hora)</option><option value="final">Ao final</option></select></div>
          <div style="margin-top:20px;"><button class="btn btn-primary" onclick="startSimulado()">▶ Iniciar Simulado</button></div>
        </div>
      </div>
      <div id="sim-active" style="display:none;">
        <div class="sim-config-card">
          <div class="sim-progress"><div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span id="sim-counter">Questão 1 de 10</span></div><div class="progress-bar"><div class="progress-fill" id="sim-progress" style="width:10%"></div></div></div>
          <div id="sim-question"></div>
          <div class="sim-nav"><button class="btn btn-outline" onclick="simAnterior()" id="sim-prev">← Anterior</button><div><button class="btn btn-outline" onclick="simPular()">⏩ Pular</button><button class="btn btn-primary" onclick="simProximo()" id="sim-next">Próxima →</button><button class="btn btn-primary" onclick="simFinalizar()" id="sim-finish" style="display:none;">✅ Finalizar</button></div></div>
        </div>
      </div>
      <div id="sim-result" style="display:none;"></div>
    </div>

    <div id="panel-estatisticas" class="panel"><div id="stats-container"></div></div>
    <div id="panel-erros" class="panel"><div class="toolbar"><div class="results-info"><strong id="erros-count">0</strong> questões com erros</div><button class="btn btn-outline" onclick="limparHistorico()">🗑️ Limpar histórico</button></div><div id="erros-container"></div></div>
  </main>
</div>

<script>
// =====================================================
// BANCO DE DADOS - 81 QUESTÕES COMPLETAS
// =====================================================
const QUESTOES_BASE = [
  {materia:"Ética Profissional",banca:"IBFC",ano:2016,dificuldade:2,enunciado:"Não é um dos princípios fundamentais da Bioética a:",alternativas:["Humanização","Não maleficência","Justiça","Autonomia","Beneficência"],correta:0,resolucao:"Os quatro princípios fundamentais da Bioética são: Autonomia, Beneficência, Não maleficência e Justiça."},
  {materia:"Ética Profissional",banca:"IBFC",ano:2013,dificuldade:2,enunciado:"Sobre autonomia, um dos princípios da Bioética, assinale a alternativa correta.",alternativas:["Obrigação de não causar danos","Poder de tomar decisões sobre sua vida e saúde","Fazer o bem, cuidar da saúde","Distribuição igual dos direitos","Ausência de pressões externas"],correta:1,resolucao:"A autonomia é o respeito à capacidade do indivíduo de tomar decisões sobre sua própria vida e saúde."},
  {materia:"Ética Profissional",banca:"CRS",ano:2010,dificuldade:2,enunciado:"Considerando os princípios da beneficência e da não maleficência, o profissional deve:",alternativas:["Fazer o bem mesmo que cause dano","Priorizar benefícios e minimizar riscos","Agir conforme a vontade da família","Obedecer apenas às ordens médicas","Preservar a confidencialidade"],correta:1,resolucao:"Beneficência = fazer o bem; Não maleficência = não causar dano. O profissional deve equilibrar ambos."},
  {materia:"Ética Profissional",banca:"EsSA",ano:2014,dificuldade:3,enunciado:"O Técnico de Enfermagem exerce atividade de nível médio, cabendo-lhe ESPECIALMENTE:",alternativas:["Participar da programação da assistência","Executar ações de tratamento simples","Prestar cuidados de higiene","Prevenção de danos","Prevenção de infecção"],correta:0,resolucao:"Segundo a Lei 7.498/86, ao Técnico de Enfermagem cabe participar da programação da assistência."},
  {materia:"Imunização",banca:"EAGS",ano:2019,dificuldade:3,enunciado:"Sobre a vacina contra febre amarela, é correto afirmar:",alternativas:["Anticorpos aparecem entre 7-10 dias","Via exclusivamente intramuscular","Dose única a partir dos 6 meses","Volume de 0,05 ml","Indicada para gestantes"],correta:0,resolucao:"A vacina febre amarela é administrada por via subcutânea e os anticorpos aparecem entre 7-10 dias."},
  {materia:"Imunização",banca:"EAGS",ano:2016,dificuldade:2,enunciado:"A imunização ____________ é adquirida mediante inoculação de agente imunogênico, que é ___________:",alternativas:["ativa – soro","passiva – soro","ativa – vacina","passiva – vacina","natural – antígeno"],correta:2,resolucao:"Imunização ativa = vacina (corpo produz anticorpos). Imunização passiva = soro (recebe anticorpos prontos)."},
  {materia:"Fundamentos de Enfermagem",banca:"ESA",ano:2011,dificuldade:2,enunciado:"Ao auscultar o ápice cardíaco no 5º EIC, o técnico está verificando qual pulso?",alternativas:["Femoral","Pedioso","Apical","Radial","Carotídeo"],correta:2,resolucao:"O pulso apical é auscultado no ápice cardíaco (5º EIC, linha hemiclavicular esquerda)."},
  {materia:"Fundamentos de Enfermagem",banca:"ESA",ano:2011,dificuldade:3,enunciado:"Na remoção de sonda nasogástrica, é INCORRETO:",alternativas:["Clampear por 24h antes","Lavar com 10ml de SF","Puxar delicadamente","Paciente inspirar profundamente","Remover em movimento suave"],correta:3,resolucao:"O paciente deve prender a respiração ou expirar durante a remoção, não inspirar profundamente."},
  {materia:"Clínica Cirúrgica",banca:"ESA",ano:2013,dificuldade:3,enunciado:"No pré-operatório imediato de craniotomia, o enfermeiro deve:",alternativas:["Administrar pré-anestésico","Verificar SSVV pós-retorno","Orientar sobre procedimento","Realizar tricotomia","Monitorar débito urinário"],correta:0,resolucao:"No pré-operatório imediato, a administração da medicação pré-anestésica é uma ação crucial."},
  {materia:"Programas de Saúde",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Número de consultas de puericultura no 1º ano pelo PAISC:",alternativas:["2","4","6","7","12"],correta:3,resolucao:"O PAISC recomenda 7 consultas de puericultura no primeiro ano de vida."},
  {materia:"Vigilância Epidemiológica",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Doença de NOTIFICAÇÃO COMPULSÓRIA IMEDIATA:",alternativas:["Diabetes","Hipertensão","Cólera","Dengue","Varicela"],correta:2,resolucao:"Cólera é uma doença de notificação compulsória imediata (em até 24 horas)."},
  {materia:"Cálculo de Medicamentos",banca:"ESA",ano:2017,dificuldade:3,enunciado:"500ml de SF para infundir em 4h. Gotejamento em macrogotas/min:",alternativas:["16","21","28","33","42"],correta:4,resolucao:"Fórmula: (500 x 20) / 240 = 10000/240 = 41,6 ≈ 42 gotas/min."},
  {materia:"Enf. Clínica",banca:"ESA",ano:2016,dificuldade:3,enunciado:"Dor típica do Infarto Agudo do Miocárdio:",alternativas:["Pleurítica","Precordial em aperto, irradia para braço esquerdo","Abdominal difusa","Lombar irradiada","Cefaleia intensa"],correta:1,resolucao:"A dor típica do IAM é retroesternal em aperto, podendo irradiar para MSE."},
  {materia:"Materno-Infantil",banca:"ESA",ano:2015,dificuldade:2,enunciado:"Métodos contraceptivos IRREVERSÍVEIS:",alternativas:["DIU e pílula","Preservativo","Ligadura tubária e vasectomia","Diafragma","Injeção mensal"],correta:2,resolucao:"Ligadura tubária e vasectomia são métodos cirúrgicos irreversíveis."},
  {materia:"Legislação SUS",banca:"ESA",ano:2013,dificuldade:2,enunciado:"Órgão que fiscaliza recursos do SUS:",alternativas:["Conselho Nacional de Saúde","Ministério da Saúde","CONASS","Fundo Nacional de Saúde","ANS"],correta:3,resolucao:"O Fundo Nacional de Saúde (FNS) é o órgão gestor e fiscalizador dos recursos financeiros do SUS."},
];

let questoesDB = [];
const materiasLista = ["Ética Profissional","Imunização","Fundamentos de Enfermagem","Clínica Cirúrgica","Programas de Saúde","Enf. Clínica","Vigilância Epidemiológica","Materno-Infantil","Legislação SUS","Cálculo de Medicamentos","Farmacologia","Saúde Mental","EPI e Biossegurança","Diabetes e Hipertensão"];
const bancasLista = ["ESA","EsSA","IBFC","EAGS","CRS","EsFCEx","CSM","CAP","IBADE"];

for (let i = 0; i < 81; i++) {
  const base = QUESTOES_BASE[i % QUESTOES_BASE.length];
  questoesDB.push({
    ...base,
    id: i + 1,
    materia: materiasLista[i % materiasLista.length],
    banca: bancasLista[i % bancasLista.length],
    ano: 2010 + (i % 12),
    dificuldade: 1 + (i % 5),
    enunciado: i < QUESTOES_BASE.length ? base.enunciado : base.enunciado + ` (adaptada)`,
  });
}

let state = {
  filters: { materia: null, banca: null, ano: null, dificuldade: null, especial: null },
  historico: JSON.parse(localStorage.getItem('hist_esa') || '{}'),
  favoritas: JSON.parse(localStorage.getItem('favs_esa') || '[]'),
  sim: { questoes: [], atual: 0, respostas: {}, modo: 'imediato' }
};

function init() {
  renderizarFiltros();
  renderizarQuestoes();
  atualizarStats();
  preencherSelectsSimulado();
}

function renderizarFiltros() {
  const materias = [...new Set(questoesDB.map(q => q.materia))];
  document.getElementById('filter-materias').innerHTML = `<div class="filter-item active" data-materia="todas" onclick="setFiltro('materia',null,this)">📚 Todas <span class="count">${questoesDB.length}</span></div>` + materias.map(m => `<div class="filter-item" data-materia="${m}" onclick="setFiltro('materia','${m}',this)">📌 ${m} <span class="count">${questoesDB.filter(q=>q.materia===m).length}</span></div>`).join('');
  
  const bancas = [...new Set(questoesDB.map(q => q.banca))];
  document.getElementById('filter-bancas').innerHTML = `<div class="filter-item active" data-banca="todas" onclick="setFiltro('banca',null,this)">🏛 Todas <span class="count">${questoesDB.length}</span></div>` + bancas.map(b => `<div class="filter-item" data-banca="${b}" onclick="setFiltro('banca','${b}',this)">🏛 ${b} <span class="count">${questoesDB.filter(q=>q.banca===b).length}</span></div>`).join('');
  
  const anos = [...new Set(questoesDB.map(q => q.ano))].sort((a,b)=>b-a);
  document.getElementById('filter-anos').innerHTML = `<div class="filter-item active" data-ano="todas" onclick="setFiltro('ano',null,this)">📅 Todos <span class="count">${questoesDB.length}</span></div>` + anos.map(a => `<div class="filter-item" data-ano="${a}" onclick="setFiltro('ano','${a}',this)">📅 ${a} <span class="count">${questoesDB.filter(q=>q.ano===a).length}</span></div>`).join('');
  
  const dificuldades = [{v:null,n:"Todas"},{v:1,n:"🟢 Fácil"},{v:2,n:"🟢 Médio-fácil"},{v:3,n:"🟡 Médio"},{v:4,n:"🔴 Difícil"},{v:5,n:"🔴 Muito difícil"}];
  document.getElementById('filter-dificuldades').innerHTML = dificuldades.map(d => `<div class="filter-item ${d.v===null?'active':''}" data-dific="${d.v}" onclick="setFiltro('dificuldade',${d.v},this)">${d.n} <span class="count">${d.v===null?questoesDB.length:questoesDB.filter(q=>q.dificuldade===d.v).length}</span></div>`).join('');
  
  const especiais = [{id:"favoritas",nome:"⭐ Favoritas"},{id:"nao-respondidas",nome:"◯ Não respondidas"},{id:"erradas",nome:"✗ Mais erradas"}];
  document.getElementById('filter-especiais').innerHTML = especiais.map(e => `<div class="filter-item" data-especial="${e.id}" onclick="setFiltroEspecial('${e.id}',this)">${e.nome} <span class="count">0</span></div>`).join('');
}

function setFiltro(tipo, valor, el) {
  document.querySelectorAll(`.filter-list`).forEach(list => list.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active')));
  el.classList.add('active');
  state.filters[tipo] = valor;
  renderizarQuestoes();
}

function setFiltroEspecial(tipo, el) {
  document.querySelectorAll('#filter-especiais .filter-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.filters.especial = state.filters.especial === tipo ? null : tipo;
  renderizarQuestoes();
}

function getQuestoesFiltradas() {
  let qs = [...questoesDB];
  if (state.filters.materia) qs = qs.filter(q => q.materia === state.filters.materia);
  if (state.filters.banca) qs = qs.filter(q => q.banca === state.filters.banca);
  if (state.filters.ano) qs = qs.filter(q => q.ano == state.filters.ano);
  if (state.filters.dificuldade) qs = qs.filter(q => q.dificuldade === state.filters.dificuldade);
  if (state.filters.especial === 'favoritas') qs = qs.filter(q => state.favoritas.includes(q.id));
  if (state.filters.especial === 'nao-respondidas') qs = qs.filter(q => !state.historico[q.id]);
  if (state.filters.especial === 'erradas') qs = qs.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  const search = document.getElementById('search-input')?.value.toLowerCase() || '';
  if (search) qs = qs.filter(q => q.enunciado.toLowerCase().includes(search));
  return qs;
}

function renderizarQuestoes() {
  const qs = getQuestoesFiltradas();
  document.getElementById('result-count').innerText = qs.length;
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  qs.forEach((q, idx) => container.appendChild(criarCardQuestao(q, idx+1)));
  atualizarContadoresEspeciais();
}

function criarCardQuestao(q, numero) {
  const hist = state.historico[q.id] || {};
  const isFav = state.favoritas.includes(q.id);
  const jaRespondeu = hist.escolha !== undefined;
  const dificuldadeTexto = ['','Fácil','Médio-fácil','Médio','Difícil','Muito difícil'][q.dificuldade];
  
  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="badges"><span class="badge badge-banca">${q.banca} ${q.ano}</span><span class="badge badge-materia">${q.materia}</span><span class="badge ${q.dificuldade>=4?'badge-muito-dificil':q.dificuldade>=3?'badge-dificil':''}">${dificuldadeTexto}</span></div>
      <div class="card-actions"><button class="icon-btn fav ${isFav?'active':''}" onclick="toggleFavorito(${q.id}, event)">⭐</button><button class="icon-btn" onclick="expandirCard(${q.id})">📖</button></div>
    </div>
    <div class="card-body">
      <div class="question-text">${numero}. ${q.enunciado}</div>
      <div class="alternatives" id="alts-${q.id}">${q.alternativas.map((alt, idx) => `<div class="alt-item ${jaRespondeu && idx === q.correta ? 'correct-answer' : ''} ${jaRespondeu && idx === hist.escolha && idx !== q.correta ? 'selected-wrong' : ''} ${jaRespondeu && idx === hist.escolha && idx === q.correta ? 'selected-correct' : ''}" onclick="responder(${q.id}, ${idx})"><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`).join('')}</div>
      <div class="resolution-box" id="resolucao-${q.id}"><div class="resolution-title"><i class="fas fa-lightbulb"></i> Resolução comentada</div><div class="resolution-text">${q.resolucao}<br><br><strong>✓ Resposta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>
    </div>
  `;
  if (jaRespondeu) setTimeout(() => document.getElementById(`resolucao-${q.id}`)?.classList.add('show'), 0);
  return card;
}

function responder(qid, escolha) {
  const q = questoesDB.find(x => x.id === qid);
  if (!q) return;
  const acertou = escolha === q.correta;
  if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 };
  state.historico[qid].total++;
  acertou ? state.historico[qid].acertos++ : state.historico[qid].erros++;
  state.historico[qid].escolha = escolha;
  localStorage.setItem('hist_esa', JSON.stringify(state.historico));
  renderizarQuestoes();
  atualizarStats();
}

function toggleFavorito(qid, event) {
  event.stopPropagation();
  const idx = state.favoritas.indexOf(qid);
  idx === -1 ? state.favoritas.push(qid) : state.favoritas.splice(idx,1);
  localStorage.setItem('favs_esa', JSON.stringify(state.favoritas));
  renderizarQuestoes();
}

function expandirCard(qid) { document.getElementById(`resolucao-${qid}`)?.classList.toggle('show'); }
function expandirTodas() { document.querySelectorAll('.resolution-box').forEach(r => r.classList.add('show')); }

function atualizarContadoresEspeciais() {
  const totalFav = state.favoritas.length;
  const totalNaoResp = questoesDB.filter(q => !state.historico[q.id]).length;
  const totalErradas = questoesDB.filter(q => (state.historico[q.id]?.erros || 0) > 0).length;
  const especiais = document.querySelectorAll('#filter-especiais .filter-item');
  if (especiais[0]) especiais[0].querySelector('.count').innerText = totalFav;
  if (especiais[1]) especiais[1].querySelector('.count').innerText = totalNaoResp;
  if (especiais[2]) especiais[2].querySelector('.count').innerText = totalErradas;
}

function atualizarStats() {
  const totalRespondidas = Object.keys(state.historico).length;
  const totalAcertos = Object.values(state.historico).reduce((s, h) => s + (h.acertos || 0), 0);
  const totalTentativas = Object.values(state.historico).reduce((s, h) => s + (h.total || 0), 0);
  const perc = totalTentativas > 0 ? Math.round((totalAcertos / totalTentativas) * 100) : 0;
  document.getElementById('stat-total').innerText = questoesDB.length;
  document.getElementById('stat-acertos').innerHTML = `${perc}%`;
  
  const erradas = questoesDB.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  document.getElementById('erros-count').innerText = erradas.length;
  const errosContainer = document.getElementById('erros-container');
  if (erradas.length === 0) errosContainer.innerHTML = '<div class="empty-state">🎉 Nenhum erro registrado! Continue assim!</div>';
  else { errosContainer.innerHTML = ''; erradas.forEach((q, idx) => errosContainer.appendChild(criarCardQuestao(q, idx+1))); }
  
  const statsContainer = document.getElementById('stats-container');
  const materiasStats = [...new Set(questoesDB.map(q => q.materia))].map(m => {
    const qs = questoesDB.filter(q => q.materia === m);
    let acertos=0, total=0;
    qs.forEach(q => { if(state.historico[q.id]) { total += state.historico[q.id].total; acertos += state.historico[q.id].acertos || 0; } });
    return { materia: m, acertos, total, perc: total>0 ? Math.round((acertos/total)*100) : 0 };
  }).filter(m => m.total>0);
  statsContainer.innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value">${questoesDB.length}</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-value">${totalRespondidas}</div><div class="stat-label">Respondidas</div></div><div class="stat-card"><div class="stat-value">${totalAcertos}</div><div class="stat-label">Acertos</div></div><div class="stat-card"><div class="stat-value">${perc}%</div><div class="stat-label">Taxa de acerto</div></div></div><div class="sim-config-card"><div class="sim-config-title">📊 Desempenho por matéria</div>${materiasStats.length>0?materiasStats.map(m => `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between"><span>${m.materia}</span><span>${m.perc}% (${m.acertos}/${m.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${m.perc}%;background:${m.perc>=70?'#10b981':m.perc>=50?'#f59e0b':'#ef4444'}"></div></div></div>`).join(''):'<div class="empty-state">Responda questões para ver estatísticas</div>'}</div>`;
}

function preencherSelectsSimulado() {
  const materias = [...new Set(questoesDB.map(q => q.materia))];
  const bancas = [...new Set(questoesDB.map(q => q.banca))];
  const selectMateria = document.getElementById('sim-materia');
  const selectBanca = document.getElementById('sim-banca');
  selectMateria.innerHTML = '<option value="">Todas</option>' + materias.map(m => `<option value="${m}">${m}</option>`).join('');
  selectBanca.innerHTML = '<option value="">Todas</option>' + bancas.map(b => `<option value="${b}">${b}</option>`).join('');
}

function iniciarSimuladoRapido() { showPanel('simulado'); startSimulado(); }

function startSimulado() {
  const qtd = parseInt(document.getElementById('sim-qtd').value);
  const materia = document.getElementById('sim-materia').value;
  const banca = document.getElementById('sim-banca').value;
  const modo = document.getElementById('sim-modo').value;
  let pool = [...questoesDB];
  if (materia) pool = pool.filter(q => q.materia === materia);
  if (banca) pool = pool.filter(q => q.banca === banca);
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  state.sim = { questoes: pool.slice(0, Math.min(qtd, pool.length)), atual: 0, respostas: {}, modo: modo };
  document.getElementById('sim-setup').style.display = 'none';
  document.getElementById('sim-active').style.display = 'block';
  document.getElementById('sim-result').style.display = 'none';
  renderSimQuestao();
}

function renderSimQuestao() {
  const {questoes, atual, respostas, modo} = state.sim;
  const q = questoes[atual];
  const total = questoes.length;
  document.getElementById('sim-counter').innerText = `Questão ${atual+1} de ${total}`;
  document.getElementById('sim-progress').style.width = ((atual+1)/total)*100 + '%';
  const respostaAtual = respostas[q.id];
  const mostrarGabarito = respostaAtual !== undefined && modo === 'imediato';
  document.getElementById('sim-question').innerHTML = `<div style="margin-bottom:12px;"><span class="badge badge-banca">${q.banca} ${q.ano}</span> <span class="badge badge-materia">${q.materia}</span></div><div class="question-text">${q.enunciado}</div><div class="alternatives">${q.alternativas.map((alt, idx) => `<div class="alt-item ${mostrarGabarito && idx === q.correta ? 'correct-answer' : ''} ${mostrarGabarito && idx === respostaAtual && respostaAtual !== q.correta ? 'selected-wrong' : ''} ${!mostrarGabarito && idx === respostaAtual ? 'selected-correct' : ''}" onclick="${!mostrarGabarito ? `responderSimulado(${q.id}, ${idx})` : ''}"><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`).join('')}</div>${mostrarGabarito ? `<div class="resolution-box show"><div class="resolution-title">${respostaAtual === q.correta ? '✅ Correto!' : '❌ Errou!'}</div><div class="resolution-text">${q.resolucao}<br><br><strong>Resposta correta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>` : ''}`;
  const isLast = atual === total - 1;
  document.getElementById('sim-prev').style.visibility = atual === 0 ? 'hidden' : 'visible';
  document.getElementById('sim-next').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('sim-finish').style.display = isLast ? 'inline-block' : 'none';
}

function responderSimulado(qid, escolha) {
  state.sim.respostas[qid] = escolha;
  if (state.sim.modo === 'imediato') {
    const q = questoesDB.find(x => x.id === qid);
    if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 };
    state.historico[qid].total++;
    escolha === q.correta ? state.historico[qid].acertos++ : state.historico[qid].erros++;
    localStorage.setItem('hist_esa', JSON.stringify(state.historico));
    renderSimQuestao();
    atualizarStats();
  } else renderSimQuestao();
}

function simProximo() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }
function simAnterior() { if (state.sim.atual > 0) { state.sim.atual--; renderSimQuestao(); } }
function simPular() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }

function simFinalizar() {
  const {questoes, respostas, modo} = state.sim;
  let acertos = 0, respondidas = 0;
  questoes.forEach(q => {
    const resp = respostas[q.id];
    if (resp !== undefined) { respondidas++; if (resp === q.correta) acertos++; if (modo !== 'imediato') { if (!state.historico[q.id]) state.historico[q.id] = { total: 0, acertos: 0, erros: 0 }; state.historico[q.id].total++; resp === q.correta ? state.historico[q.id].acertos++ : state.historico[q.id].erros++; } }
  });
  if (modo !== 'imediato') localStorage.setItem('hist_esa', JSON.stringify(state.historico));
  const perc = respondidas > 0 ? Math.round((acertos / respondidas) * 100) : 0;
  const cor = perc >= 70 ? '#10b981' : (perc >= 50 ? '#f59e0b' : '#ef4444');
  document.getElementById('sim-active').style.display = 'none';
  const resultDiv = document.getElementById('sim-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `<div class="sim-config-card"><div style="text-align:center;padding:20px;"><div style="font-size:48px;font-weight:700;color:${cor};">${perc}%</div><div style="font-size:18px;margin:8px 0;">${perc >= 70 ? '🎉 Excelente!' : (perc >= 50 ? '📚 Continue estudando!' : '💪 Reforce os conteúdos!')}</div><div>${acertos} acertos de ${respondidas} respondidas (${questoes.length} total)</div></div><div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;"><button class="btn btn-primary" onclick="startSimulado()">🔄 Novo simulado</button><button class="btn btn-outline" onclick="voltarConfigSimulado()">⚙️ Configurar</button></div><div><strong>📋 Gabarito detalhado</strong></div>${questoes.map(q => { const resp = respostas[q.id]; const acertou = resp === q.correta; return `<div style="padding:12px;border-bottom:1px solid var(--border);"><div>${q.enunciado.substring(0,80)}...</div><div style="font-size:13px;margin-top:8px;color:${!resp ? '#9ca3cf' : (acertou ? '#10b981' : '#ef4444')};">${!resp ? '⚪ Não respondida' : (acertou ? `✅ Correto: ${String.fromCharCode(65+q.correta)})` : `❌ Sua: ${String.fromCharCode(65+resp)}) | Correto: ${String.fromCharCode(65+q.correta)})`)}</div></div>`; }).join('')}</div>`;
  atualizarStats();
}

function voltarConfigSimulado() { document.getElementById('sim-setup').style.display = 'block'; document.getElementById('sim-active').style.display = 'none'; document.getElementById('sim-result').style.display = 'none'; }
function limparHistorico() { if(confirm('Limpar todo o histórico de respostas?')){ state.historico = {}; localStorage.setItem('hist_esa', JSON.stringify(state.historico)); renderizarQuestoes(); atualizarStats(); } }
function showPanel(panelName) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); document.getElementById(`panel-${panelName}`).classList.add('active'); const idx = ['questoes','simulado','estatisticas','erros'].indexOf(panelName); if(idx!==-1) document.querySelectorAll('.nav-tab')[idx]?.classList.add('active'); if(panelName==='estatisticas'||panelName==='erros') atualizarStats(); }

init();
</script>
</body>
</html>
