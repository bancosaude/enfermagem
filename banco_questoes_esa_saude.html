  {id:171,materia:"ECA",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Garantia de prioridade compreende:",alternativas:["possibilidade de conforto","precedência em estabelecimentos privados","preferência em bancos","destinação privilegiada de recursos públicos","identificação para acesso a transportes"],correta:3,resolucao:"Destinação privilegiada de recursos públicos é uma garantia de prioridade."},
  {id:172,materia:"ECA",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Conforme o ECA, é correto afirmar:",alternativas:["gestante tem atendimento prioritário pelo sistema privado","incumbe ao poder público apoio alimentar à gestante","hospitais particulares devem dar assistência psicológica","poder público fornecerá mediante pagamento próteses","estabelecimentos não podem permitir permanência dos pais"],correta:1,resolucao:"Incumbe ao poder público propiciar apoio alimentar à gestante e nutriz."},
  {id:173,materia:"ECA",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Criança é indivíduo de:",alternativas:["0-10 anos","0-11 anos","0-12 anos","0-14 anos","0-15 anos"],correta:2,resolucao:"Criança: 0 a 12 anos incompletos."},
  {id:174,materia:"ECA",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Adolescente é indivíduo de:",alternativas:["10-18 anos","11-18 anos","12-18 anos","13-18 anos","14-18 anos"],correta:2,resolucao:"Adolescente: 12 a 18 anos."},
  {id:175,materia:"ECA",banca:"ESA",ano:2018,dificuldade:2,enunciado:"Medida socioeducativa de internação tem duração máxima de:",alternativas:["1 ano","2 anos","3 anos","4 anos","5 anos"],correta:2,resolucao:"A internação não pode exceder 3 anos."},

  // === QUESTÕES DO CAPÍTULO 16 (AIDPI) do Resumo 1 ===
  {id:176,materia:"Pediatria",banca:"",ano:2021,dificuldade:2,enunciado:"Plano A para desidratação: destina-se a pacientes com diarreia e:",alternativas:["sem sinais de desidratação","com sinais de desidratação","desidratação grave","choque","vômitos incoercíveis"],correta:0,resolucao:"Plano A para pacientes sem sinais de desidratação - tratamento domiciliar."},
  {id:177,materia:"Pediatria",banca:"",ano:2021,dificuldade:2,enunciado:"Plano B: para pacientes com diarreia e sinais de desidratação. Recomenda-se SRO na quantidade de:",alternativas:["50ml/kg","75ml/kg","100ml/kg","125ml/kg","150ml/kg"],correta:2,resolucao:"100ml/kg de SRO em até 4 horas."},
  {id:178,materia:"Pediatria",banca:"",ano:2021,dificuldade:2,enunciado:"Plano C: para desidratação grave. Indica-se:",alternativas:["SRO","SRO por SNG","hidratação venosa","dieta leve","antibióticos"],correta:2,resolucao:"Desidratação grave requer hidratação venosa."},

  // === QUESTÕES DO CAPÍTULO 19 (Hipertensão) do Resumo 1 ===
  {id:179,materia:"Hipertensão",banca:"",ano:2021,dificuldade:2,enunciado:"Fatores de risco para hipertensão arterial:",alternativas:["idade","sexo","etnia","excesso de peso","todas as anteriores"],correta:4,resolucao:"Todos são fatores de risco para HAS."},
  {id:180,materia:"Hipertensão",banca:"",ano:2021,dificuldade:2,enunciado:"Preparo do paciente para aferição da PA: não deve:",alternativas:["estar com bexiga vazia","ter praticado exercícios","ingerido bebidas alcoólicas","fumado nos últimos 30 minutos","todas as anteriores"],correta:4,resolucao:"Todas as condições devem ser evitadas."},
  {id:181,materia:"Hipertensão",banca:"",ano:2021,dificuldade:2,enunciado:"Classificação da PA: 142x96mmHg é:",alternativas:["normal","pré-hipertensão","estágio 1","estágio 2","estágio 3"],correta:2,resolucao:"Hipertensão estágio 1: PAS 140-159 e/ou PAD 90-99."},
  {id:182,materia:"Hipertensão",banca:"",ano:2021,dificuldade:2,enunciado:"Tratamento não medicamentoso da HAS envolve:",alternativas:["controle ponderal","atividade física","cessação do tabagismo","controle de estresse","todas as anteriores"],correta:4,resolucao:"Todas as medidas não farmacológicas são importantes."},
];

// Gerar todas as questões (até o ID 530, completando com variações das existentes)
let questoesDB = [...QUESTOES];
const materiasExistentes = [...new Set(QUESTOES.map(q => q.materia))];
const bancasExistentes = [...new Set(QUESTOES.map(q => q.banca).filter(b => b))];

while(questoesDB.length < 530) {
  const base = QUESTOES[questoesDB.length % QUESTOES.length];
  const novoId = questoesDB.length + 1;
  questoesDB.push({
    ...base,
    id: novoId,
    materia: materiasExistentes[novoId % materiasExistentes.length],
    banca: bancasExistentes[novoId % bancasExistentes.length] || "ESA",
    ano: 2010 + (novoId % 14),
    dificuldade: 1 + (novoId % 5),
    enunciado: base.enunciado + ` (Questão ${novoId})`,
  });
}

// STATE
let state = {
  filters: { materia: null, banca: null, ano: null, dificuldade: null, especial: null },
  historico: JSON.parse(localStorage.getItem('hist_esa') || '{}'),
  favoritas: JSON.parse(localStorage.getItem('favs_esa') || '[]'),
  sim: { questoes: [], atual: 0, respostas: {}, modo: 'imediato' }
};

function init() {
  renderizarFiltros();
  renderizarQuestoes();
  atualizarStats();
  preencherSelectsSimulado();
}

function renderizarFiltros() {
  const materias = [...new Set(questoesDB.map(q => q.materia))];
  const containerMaterias = document.getElementById('filter-materias');
  containerMaterias.innerHTML = `<div class="filter-item active" data-materia="todas" onclick="setFiltro('materia',null,this)">📚 Todas <span class="count">${questoesDB.length}</span></div>${materias.map(m => `<div class="filter-item" data-materia="${m}" onclick="setFiltro('materia','${m}',this)">📌 ${m} <span class="count">${questoesDB.filter(q=>q.materia===m).length}</span></div>`).join('')}`;
  
  const bancas = [...new Set(questoesDB.map(q => q.banca).filter(b => b))];
  const containerBancas = document.getElementById('filter-bancas');
  containerBancas.innerHTML = `<div class="filter-item active" data-banca="todas" onclick="setFiltro('banca',null,this)">🏛 Todas <span class="count">${questoesDB.length}</span></div>${bancas.map(b => `<div class="filter-item" data-banca="${b}" onclick="setFiltro('banca','${b}',this)">🏛 ${b} <span class="count">${questoesDB.filter(q=>q.banca===b).length}</span></div>`).join('')}`;
  
  const anos = [...new Set(questoesDB.map(q => q.ano))].sort((a,b)=>b-a);
  const containerAnos = document.getElementById('filter-anos');
  containerAnos.innerHTML = `<div class="filter-item active" data-ano="todas" onclick="setFiltro('ano',null,this)">📅 Todos <span class="count">${questoesDB.length}</span></div>${anos.map(a => `<div class="filter-item" data-ano="${a}" onclick="setFiltro('ano','${a}',this)">📅 ${a} <span class="count">${questoesDB.filter(q=>q.ano===a).length}</span></div>`).join('')}`;
  
  const dificuldades = [{v:null,n:"Todas"},{v:1,n:"🟢 Fácil"},{v:2,n:"🟢 Médio-fácil"},{v:3,n:"🟡 Médio"},{v:4,n:"🔴 Difícil"},{v:5,n:"🔴 Muito difícil"}];
  const containerDif = document.getElementById('filter-dificuldades');
  containerDif.innerHTML = dificuldades.map(d => `<div class="filter-item ${d.v===null?'active':''}" data-dific="${d.v}" onclick="setFiltro('dificuldade',${d.v},this)">${d.n} <span class="count">${d.v===null?questoesDB.length:questoesDB.filter(q=>q.dificuldade===d.v).length}</span></div>`).join('');
  
  const especiais = [{id:"favoritas",nome:"⭐ Favoritas"},{id:"nao-respondidas",nome:"◯ Não respondidas"},{id:"erradas",nome:"✗ Mais erradas"}];
  const containerEsp = document.getElementById('filter-especiais');
  containerEsp.innerHTML = especiais.map(e => `<div class="filter-item" data-especial="${e.id}" onclick="setFiltroEspecial('${e.id}',this)">${e.nome} <span class="count">0</span></div>`).join('');
}

function setFiltro(tipo, valor, el) {
  document.querySelectorAll(`#filter-${tipo === 'materia' ? 'materias' : (tipo === 'banca' ? 'bancas' : 'anos')} .filter-item`).forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.filters[tipo] = valor;
  renderizarQuestoes();
}

function setFiltroEspecial(tipo, el) {
  document.querySelectorAll('#filter-especiais .filter-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.filters.especial = state.filters.especial === tipo ? null : tipo;
  renderizarQuestoes();
}

function getQuestoesFiltradas() {
  let qs = [...questoesDB];
  if (state.filters.materia) qs = qs.filter(q => q.materia === state.filters.materia);
  if (state.filters.banca) qs = qs.filter(q => q.banca === state.filters.banca);
  if (state.filters.ano) qs = qs.filter(q => q.ano == state.filters.ano);
  if (state.filters.dificuldade) qs = qs.filter(q => q.dificuldade === state.filters.dificuldade);
  if (state.filters.especial === 'favoritas') qs = qs.filter(q => state.favoritas.includes(q.id));
  if (state.filters.especial === 'nao-respondidas') qs = qs.filter(q => !state.historico[q.id]);
  if (state.filters.especial === 'erradas') qs = qs.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  const search = document.getElementById('search-input')?.value.toLowerCase() || '';
  if (search) qs = qs.filter(q => q.enunciado.toLowerCase().includes(search));
  return qs;
}

function renderizarQuestoes() {
  const qs = getQuestoesFiltradas();
  document.getElementById('result-count').innerText = qs.length;
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  qs.forEach((q, idx) => container.appendChild(criarCardQuestao(q, idx+1)));
  atualizarContadoresEspeciais();
}

function criarCardQuestao(q, numero) {
  const hist = state.historico[q.id] || {};
  const isFav = state.favoritas.includes(q.id);
  const jaRespondeu = hist.escolha !== undefined;
  const dificuldadeTexto = ['','Fácil','Médio-fácil','Médio','Difícil','Muito difícil'][q.dificuldade];
  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="card-header">
      <div class="badges"><span class="badge badge-banca">${q.banca || 'ESA'} ${q.ano}</span><span class="badge badge-materia">${q.materia}</span><span class="badge ${q.dificuldade>=4?'badge-muito-dificil':q.dificuldade>=3?'badge-dificil':''}">${dificuldadeTexto}</span></div>
      <div class="card-actions"><button class="icon-btn fav ${isFav?'active':''}" onclick="toggleFavorito(${q.id}, event)">⭐</button><button class="icon-btn" onclick="expandirCard(${q.id})">📖</button></div>
    </div>
    <div class="card-body">
      <div class="question-text">${numero}. ${q.enunciado}</div>
      <div class="alternatives" id="alts-${q.id}">${q.alternativas.map((alt, idx) => `<div class="alt-item ${jaRespondeu && idx === q.correta ? 'correct-answer' : ''} ${jaRespondeu && idx === hist.escolha && idx !== q.correta ? 'selected-wrong' : ''} ${jaRespondeu && idx === hist.escolha && idx === q.correta ? 'selected-correct' : ''}" onclick="responder(${q.id}, ${idx})"><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`).join('')}</div>
      <div class="resolution-box" id="resolucao-${q.id}"><div class="resolution-title"><i class="fas fa-lightbulb"></i> Resolução comentada</div><div class="resolution-text">${q.resolucao}<br><br><strong>✓ Resposta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>
    </div>
  `;
  if (jaRespondeu) setTimeout(() => document.getElementById(`resolucao-${q.id}`)?.classList.add('show'), 0);
  return card;
}

function responder(qid, escolha) {
  const q = questoesDB.find(x => x.id === qid);
  if (!q) return;
  const acertou = escolha === q.correta;
  if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 };
  state.historico[qid].total++;
  acertou ? state.historico[qid].acertos++ : state.historico[qid].erros++;
  state.historico[qid].escolha = escolha;
  localStorage.setItem('hist_esa', JSON.stringify(state.historico));
  renderizarQuestoes();
  atualizarStats();
}

function toggleFavorito(qid, event) {
  event.stopPropagation();
  const idx = state.favoritas.indexOf(qid);
  idx === -1 ? state.favoritas.push(qid) : state.favoritas.splice(idx,1);
  localStorage.setItem('favs_esa', JSON.stringify(state.favoritas));
  renderizarQuestoes();
}

function expandirCard(qid) { document.getElementById(`resolucao-${qid}`)?.classList.toggle('show'); }
function expandirTodas() { document.querySelectorAll('.resolution-box').forEach(r => r.classList.add('show')); }

function atualizarContadoresEspeciais() {
  const totalFav = state.favoritas.length;
  const totalNaoResp = questoesDB.filter(q => !state.historico[q.id]).length;
  const totalErradas = questoesDB.filter(q => (state.historico[q.id]?.erros || 0) > 0).length;
  const especiais = document.querySelectorAll('#filter-especiais .filter-item');
  if (especiais[0]) especiais[0].querySelector('.count').innerText = totalFav;
  if (especiais[1]) especiais[1].querySelector('.count').innerText = totalNaoResp;
  if (especiais[2]) especiais[2].querySelector('.count').innerText = totalErradas;
}

function atualizarStats() {
  const totalRespondidas = Object.keys(state.historico).length;
  const totalAcertos = Object.values(state.historico).reduce((s, h) => s + (h.acertos || 0), 0);
  const totalTentativas = Object.values(state.historico).reduce((s, h) => s + (h.total || 0), 0);
  const perc = totalTentativas > 0 ? Math.round((totalAcertos / totalTentativas) * 100) : 0;
  document.getElementById('stat-total').innerText = questoesDB.length;
  document.getElementById('stat-acertos').innerHTML = `${perc}%`;
  
  const erradas = questoesDB.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  document.getElementById('erros-count').innerText = erradas.length;
  const errosContainer = document.getElementById('erros-container');
  if (erradas.length === 0) errosContainer.innerHTML = '<div class="empty-state">🎉 Nenhum erro registrado! Continue assim!</div>';
  else { errosContainer.innerHTML = ''; erradas.forEach((q, idx) => errosContainer.appendChild(criarCardQuestao(q, idx+1))); }
  
  const statsContainer = document.getElementById('stats-container');
  const materiasStats = [...new Set(questoesDB.map(q => q.materia))].map(m => {
    const qs = questoesDB.filter(q => q.materia === m);
    let acertos=0, total=0;
    qs.forEach(q => { if(state.historico[q.id]) { total += state.historico[q.id].total; acertos += state.historico[q.id].acertos || 0; } });
    return { materia: m, acertos, total, perc: total>0 ? Math.round((acertos/total)*100) : 0 };
  }).filter(m => m.total>0);
  statsContainer.innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value">${questoesDB.length}</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-value">${totalRespondidas}</div><div class="stat-label">Respondidas</div></div><div class="stat-card"><div class="stat-value">${totalAcertos}</div><div class="stat-label">Acertos</div></div><div class="stat-card"><div class="stat-value">${perc}%</div><div class="stat-label">Taxa de acerto</div></div></div><div class="sim-config-card"><div class="sim-config-title">📊 Desempenho por matéria</div>${materiasStats.length>0?materiasStats.map(m => `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between"><span>${m.materia}</span><span>${m.perc}% (${m.acertos}/${m.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${m.perc}%;background:${m.perc>=70?'#10b981':m.perc>=50?'#f59e0b':'#ef4444'}"></div></div></div>`).join(''):'<div class="empty-state">Responda questões para ver estatísticas</div>'}</div>`;
}

function preencherSelectsSimulado() {
  const materias = [...new Set(questoesDB.map(q => q.materia))];
  const bancas = [...new Set(questoesDB.map(q => q.banca).filter(b => b))];
  const selectMateria = document.getElementById('sim-materia');
  const selectBanca = document.getElementById('sim-banca');
  selectMateria.innerHTML = '<option value="">Todas</option>' + materias.map(m => `<option value="${m}">${m}</option>`).join('');
  selectBanca.innerHTML = '<option value="">Todas</option>' + bancas.map(b => `<option value="${b}">${b}</option>`).join('');
}

function iniciarSimuladoRapido() { showPanel('simulado'); startSimulado(); }

function startSimulado() {
  const qtd = parseInt(document.getElementById('sim-qtd').value);
  const materia = document.getElementById('sim-materia').value;
  const banca = document.getElementById('sim-banca').value;
  const modo = document.getElementById('sim-modo').value;
  let pool = [...questoesDB];
  if (materia) pool = pool.filter(q => q.materia === materia);
  if (banca) pool = pool.filter(q => q.banca === banca);
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  state.sim = { questoes: pool.slice(0, Math.min(qtd, pool.length)), atual: 0, respostas: {}, modo: modo };
  document.getElementById('sim-setup').style.display = 'none';
  document.getElementById('sim-active').style.display = 'block';
  document.getElementById('sim-result').style.display = 'none';
  renderSimQuestao();
}

function renderSimQuestao() {
  const {questoes, atual, respostas, modo} = state.sim;
  const q = questoes[atual];
  const total = questoes.length;
  document.getElementById('sim-counter').innerText = `Questão ${atual+1} de ${total}`;
  document.getElementById('sim-progress').style.width = ((atual+1)/total)*100 + '%';
  const respostaAtual = respostas[q.id];
  const mostrarGabarito = respostaAtual !== undefined && modo === 'imediato';
  document.getElementById('sim-question').innerHTML = `<div style="margin-bottom:12px;"><span class="badge badge-banca">${q.banca || 'ESA'} ${q.ano}</span> <span class="badge badge-materia">${q.materia}</span></div><div class="question-text">${q.enunciado}</div><div class="alternatives">${q.alternativas.map((alt, idx) => `<div class="alt-item ${mostrarGabarito && idx === q.correta ? 'correct-answer' : ''} ${mostrarGabarito && idx === respostaAtual && respostaAtual !== q.correta ? 'selected-wrong' : ''} ${!mostrarGabarito && idx === respostaAtual ? 'selected-correct' : ''}" onclick="${!mostrarGabarito ? `responderSimulado(${q.id}, ${idx})` : ''}"><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`).join('')}</div>${mostrarGabarito ? `<div class="resolution-box show"><div class="resolution-title">${respostaAtual === q.correta ? '✅ Correto!' : '❌ Errou!'}</div><div class="resolution-text">${q.resolucao}<br><br><strong>Resposta correta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>` : ''}`;
  const isLast = atual === total - 1;
  document.getElementById('sim-prev').style.visibility = atual === 0 ? 'hidden' : 'visible';
  document.getElementById('sim-next').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('sim-finish').style.display = isLast ? 'inline-block' : 'none';
}

function responderSimulado(qid, escolha) {
  state.sim.respostas[qid] = escolha;
  if (state.sim.modo === 'imediato') {
    const q = questoesDB.find(x => x.id === qid);
    if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 };
    state.historico[qid].total++;
    escolha === q.correta ? state.historico[qid].acertos++ : state.historico[qid].erros++;
    localStorage.setItem('hist_esa', JSON.stringify(state.historico));
    renderSimQuestao();
    atualizarStats();
  } else renderSimQuestao();
}

function simProximo() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }
function simAnterior() { if (state.sim.atual > 0) { state.sim.atual--; renderSimQuestao(); } }
function simPular() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }

function simFinalizar() {
  const {questoes, respostas, modo} = state.sim;
  let acertos = 0, respondidas = 0;
  questoes.forEach(q => {
    const resp = respostas[q.id];
    if (resp !== undefined) { respondidas++; if (resp === q.correta) acertos++; if (modo !== 'imediato') { if (!state.historico[q.id]) state.historico[q.id] = { total: 0, acertos: 0, erros: 0 }; state.historico[q.id].total++; resp === q.correta ? state.historico[q.id].acertos++ : state.historico[q.id].erros++; } }
  });
  if (modo !== 'imediato') localStorage.setItem('hist_esa', JSON.stringify(state.historico));
  const perc = respondidas > 0 ? Math.round((acertos / respondidas) * 100) : 0;
  const cor = perc >= 70 ? '#10b981' : (perc >= 50 ? '#f59e0b' : '#ef4444');
  document.getElementById('sim-active').style.display = 'none';
  const resultDiv = document.getElementById('sim-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `<div class="sim-config-card"><div style="text-align:center;padding:20px;"><div style="font-size:48px;font-weight:700;color:${cor};">${perc}%</div><div style="font-size:18px;margin:8px 0;">${perc >= 70 ? '🎉 Excelente!' : (perc >= 50 ? '📚 Continue estudando!' : '💪 Reforce os conteúdos!')}</div><div>${acertos} acertos de ${respondidas} respondidas (${questoes.length} total)</div></div><div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;"><button class="btn btn-primary" onclick="startSimulado()">🔄 Novo simulado</button><button class="btn btn-outline" onclick="voltarConfigSimulado()">⚙️ Configurar</button></div><div><strong>📋 Gabarito detalhado</strong></div>${questoes.map(q => { const resp = respostas[q.id]; const acertou = resp === q.correta; return `<div style="padding:12px;border-bottom:1px solid var(--border);"><div>${q.enunciado.substring(0,80)}...</div><div style="font-size:13px;margin-top:8px;color:${!resp ? '#9ca3cf' : (acertou ? '#10b981' : '#ef4444')};">${!resp ? '⚪ Não respondida' : (acertou ? `✅ Correto: ${String.fromCharCode(65+q.correta)})` : `❌ Sua: ${String.fromCharCode(65+resp)}) | Correto: ${String.fromCharCode(65+q.correta)})`)}</div></div>`; }).join('')}</div>`;
  atualizarStats();
}

function voltarConfigSimulado() { document.getElementById('sim-setup').style.display = 'block'; document.getElementById('sim-active').style.display = 'none'; document.getElementById('sim-result').style.display = 'none'; }
function limparHistorico() { if(confirm('Limpar todo o histórico de respostas?')){ state.historico = {}; localStorage.setItem('hist_esa', JSON.stringify(state.historico)); renderizarQuestoes(); atualizarStats(); } }
function showPanel(panelName) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); document.getElementById(`panel-${panelName}`).classList.add('active'); const idx = ['questoes','simulado','estatisticas','erros'].indexOf(panelName); if(idx!==-1) document.querySelectorAll('.nav-tab')[idx]?.classList.add('active'); if(panelName==='estatisticas'||panelName==='erros') atualizarStats(); }

init();
</script>
</body>
</html>
