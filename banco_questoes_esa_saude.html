<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Questões — ESA Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #111318;
  --bg3: #181c24;
  --bg4: #1e2330;
  --border: #2a3040;
  --border2: #3a4255;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #5a6275;
  --accent: #4f9cf9;
  --accent2: #3b82f6;
  --green: #34d399;
  --green2: #10b981;
  --red: #f87171;
  --red2: #ef4444;
  --amber: #fbbf24;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --r: 8px;
  --r2: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOP NAV */
#topnav {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  height: 52px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-right: 32px;
  white-space: nowrap;
}
.logo span { color: var(--accent); }

.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  border-radius: var(--r);
  transition: all 0.15s;
  font-family: var(--font);
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { color: var(--accent); background: rgba(79,156,249,0.1); }

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.stat-pill {
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.stat-pill b { color: var(--text); font-weight: 600; }

/* MAIN LAYOUT */
#app { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.sidebar-section { padding: 0 12px 12px; }
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 4px 6px;
}

.filter-group { display: flex; flex-direction: column; gap: 2px; }
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: var(--r);
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  transition: all 0.12s;
}
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: rgba(79,156,249,0.12); color: var(--accent); }
.filter-btn .count {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  background: var(--bg3);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 24px;
  text-align: center;
}
.filter-btn.active .count { background: rgba(79,156,249,0.2); color: var(--accent); }

.sidebar-divider { height: 1px; background: var(--border); margin: 4px 12px 8px; }

/* MAIN CONTENT */
#main { flex: 1; overflow-y: auto; }

/* PANEL: BROWSE */
#panel-browse {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
#search-input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text3); }

.select-filter {
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text2);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  outline: none;
}
.select-filter:focus { border-color: var(--accent); }
.select-filter option { background: var(--bg3); }

.btn {
  padding: 7px 14px;
  border-radius: var(--r);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.btn-ghost { background: none; color: var(--text2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-green { background: var(--green2); border-color: var(--green2); color: #fff; }
.btn-green:hover { background: #059669; }

#results-info {
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

#questions-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* QUESTION CARD */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.q-card:hover { border-color: var(--border2); background: var(--bg3); }
.q-card.expanded { border-color: var(--accent); }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.q-num {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 2px;
  min-width: 38px;
}

.q-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.tag-banca { background: rgba(79,156,249,0.15); color: var(--accent); border: 1px solid rgba(79,156,249,0.3); }
.tag-ano { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.tag-materia { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
.tag-modulo { background: rgba(167, 139, 250, 0.12); color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.25); }
.tag-dif-1, .tag-dif-2 { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.tag-dif-3 { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.tag-dif-4, .tag-dif-5 { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

.q-actions { display: flex; gap: 4px; flex-shrink: 0; }
.q-action-btn {
  padding: 3px 7px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  border-radius: 4px;
  transition: background 0.12s;
  color: var(--text3);
}
.q-action-btn:hover { background: var(--bg4); color: var(--text); }
.q-action-btn.fav.active { color: var(--amber); }
.q-action-btn.errada.active { color: var(--red); }

.q-enunciado {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 0;
}

.q-alternativas {
  display: none;
  margin-top: 14px;
  flex-direction: column;
  gap: 6px;
}
.q-card.expanded .q-alternativas { display: flex; }

.alt-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  transition: all 0.15s;
  width: 100%;
}
.alt-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.alt-btn.selected-correct { background: rgba(52,211,153,0.1); border-color: var(--green); color: var(--green); }
.alt-btn.selected-wrong { background: rgba(248,113,113,0.1); border-color: var(--red); color: var(--red); }
.alt-btn.show-correct { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.4); color: var(--green); }
.alt-btn:disabled { cursor: default; }

.alt-letra {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  width: 18px;
  flex-shrink: 0;
  margin-top: 1px;
}

.q-gabarito {
  display: none;
  margin-top: 12px;
  padding: 14px;
  background: rgba(30, 41, 59, 0.7);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}
.q-card.revealed .q-gabarito { display: block; }

.gab-headline {
  color: var(--green);
  font-weight: 600;
  font-family: var(--mono);
  margin-bottom: 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gab-resolucao {
  border-top: 1px solid var(--border);
  margin-top: 8px;
  padding-top: 8px;
  color: var(--text2);
}
.gab-resolucao strong { color: var(--text); }

/* PANEL: SIMULADO */
#panel-simulado {
  padding: 24px;
  max-width: 800px;
}

.sim-config {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 24px;
  margin-bottom: 20px;
}

.sim-config h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
.sim-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.sim-label { font-size: 13px; color: var(--text2); min-width: 120px; }

.sim-active { display: flex; flex-direction: column; gap: 12px; }
.sim-progress-bar {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}
.sim-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.sim-counter { font-size: 12px; font-family: var(--mono); color: var(--text3); }
.sim-q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 20px;
}
.sim-q-enunciado { font-size: 15px; line-height: 1.65; margin-bottom: 16px; }
.sim-nav { display: flex; gap: 10px; margin-top: 16px; justify-content: space-between; align-items: center; }

/* PANEL: STATS */
#panel-stats { padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
}
.stat-card .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.stat-card .stat-value { font-size: 28px; font-weight: 600; font-family: var(--mono); color: var(--text); }
.stat-card .stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

.materia-stats { display: flex; flex-direction: column; gap: 8px; }
.materia-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; }
.materia-row-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
.materia-name { font-size: 13px; font-weight: 500; }
.materia-pct { font-family: var(--mono); font-size: 13px; }
.materia-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.materia-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* PANEL: ERROS */
#panel-erros { display: flex; flex-direction: column; height: 100%; }

/* EMPTY STATE */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  text-align: center;
  gap: 8px;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 680px) {
  #sidebar { display: none; }
  .toolbar { padding: 10px 12px; }
  #questions-list { padding: 10px 12px; }
}

/* Animations */
.q-card { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.panel { display: none; }
.panel.active { display: block; }
#panel-browse.active { display: flex; }
#panel-erros.active { display: flex; }
</style>
</head>
<body>

<nav id="topnav">
  <div class="logo">ESA <span>SAÚDE</span> · BANCO</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('browse')">Questões</button>
    <button class="nav-tab" onclick="showPanel('simulado')">Simulado</button>
    <button class="nav-tab" onclick="showPanel('erros')">Meus Erros</button>
    <button class="nav-tab" onclick="showPanel('stats')">Estatísticas</button>
  </div>
  <div class="nav-right">
    <div class="stat-pill" id="pill-total">Total: <b>0</b></div>
    <div class="stat-pill" id="pill-acerto" style="color: var(--green2)">Acertos: <b id="pct-acerto">—</b></div>
  </div>
</nav>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Módulo / Tópico</div>
      <div class="filter-group" id="filter-modulo">
        <button class="filter-btn active" data-modulo="" onclick="setFilter('modulo','',this)">
          Todos <span class="count" id="cnt-mod-all">0</span>
        </button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Matéria</div>
      <div class="filter-group" id="filter-materia">
        <button class="filter-btn active" data-materia="" onclick="setFilter('materia','',this)">
          Todas <span class="count" id="cnt-all">0</span>
        </button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Banca</div>
      <div class="filter-group" id="filter-banca">
        <button class="filter-btn active" data-banca="" onclick="setFilter('banca','',this)">
          Todas <span class="count">—</span>
        </button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Dificuldade</div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setFilter('dific','',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('dific','1',this)">⬤ Fácil</button>
        <button class="filter-btn" onclick="setFilter('dific','2',this)">⬤ Médio-fácil</button>
        <button class="filter-btn" onclick="setFilter('dific','3',this)">⬤ Médio</button>
        <button class="filter-btn" onclick="setFilter('dific','4',this)">⬤ Difícil</button>
        <button class="filter-btn" onclick="setFilter('dific','5',this)">⬤ Muito difícil</button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Coleções</div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setFilter('especial','favoritas',this)">⭐ Favoritas</button>
        <button class="filter-btn" onclick="setFilter('especial','erradas',this)">✗ Mais erradas</button>
        <button class="filter-btn" onclick="setFilter('especial','naorespond',this)">◯ Não respondidas</button>
      </div>
    </div>
  </div>

  <div id="main">

    <div id="panel-browse" class="panel active">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Buscar no enunciado, módulo ou tags..." oninput="renderList()">
        </div>
        <select class="select-filter" id="sort-select" onchange="renderList()">
          <option value="default">Ordem padrão</option>
          <option value="banca">Por banca</option>
          <option value="ano">Mais recentes</option>
          <option value="dific">Por dificuldade</option>
          <option value="erros">Mais erradas</option>
        </select>
        <button class="btn btn-ghost" onclick="expandAll()">Expandir tudo</button>
        <button class="btn btn-green" onclick="startSimuladoRapido()">▶ Simulado rápido</button>
      </div>
      <div id="results-info">0 questões</div>
      <div id="questions-list"></div>
    </div>

    <div id="panel-simulado" class="panel">
      <div id="sim-setup">
        <div class="sim-config">
          <h2>⚡ Configurar Simulado</h2>
          <div class="sim-row">
            <span class="sim-label">Qtd. questões</span>
            <select class="select-filter" id="sim-qtd">
              <option value="5">5 questões</option>
              <option value="10" selected>10 questões</option>
              <option value="20">20 questões</option>
              <option value="30">30 questões</option>
              <option value="999">Todas</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Módulo</span>
            <select class="select-filter" id="sim-modulo">
              <option value="">Todos os módulos</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Matéria</span>
            <select class="select-filter" id="sim-materia">
              <option value="">Todas as matérias</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Banca</span>
            <select class="select-filter" id="sim-banca">
              <option value="">Todas as bancas</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Modo</span>
            <select class="select-filter" id="sim-modo">
              <option value="normal">Normal (gabarito ao final)</option>
              <option value="imediato">Imediato (corrige e mostra resolução na hora)</option>
            </select>
          </div>
          <div class="sim-row" style="margin-top:16px;">
            <button class="btn btn-primary" onclick="startSimulado()" style="padding: 10px 24px; font-size: 14px;">Iniciar Simulado</button>
          </div>
        </div>
      </div>
      <div id="sim-running" style="display:none;" class="sim-active">
        <div class="sim-config" style="padding:16px;">
          <div class="sim-counter" id="sim-counter-text">Questão 1 de 10</div>
          <div class="sim-progress-bar" style="margin-top:8px;">
            <div class="sim-progress-fill" id="sim-progress-fill" style="width:10%"></div>
          </div>
        </div>
        <div class="sim-q-card" id="sim-q-display"></div>
        <div style="display:flex; gap:10px; padding: 0;">
          <button class="btn btn-ghost" onclick="simAnterior()" id="sim-btn-ant">← Anterior</button>
          <div style="flex:1;display:flex;gap:10px;justify-content:flex-end;">
            <button class="btn btn-ghost" onclick="simPularQ()" id="sim-btn-pular">Pular →</button>
            <button class="btn btn-primary" onclick="simProximo()" id="sim-btn-prox">Próxima →</button>
            <button class="btn btn-green" onclick="simFinalizar()" id="sim-btn-fin" style="display:none">Finalizar</button>
          </div>
        </div>
      </div>
      <div id="sim-resultado" style="display:none;"></div>
    </div>

    <div id="panel-erros" class="panel">
      <div class="toolbar">
        <span style="font-size:14px; color:var(--text2);">Questões que você mais erra</span>
        <button class="btn btn-ghost" style="margin-left:auto" onclick="clearHistory()">Limpar histórico</button>

   enunciado:"Com base nas técnicas de higienização das mãos, assinale a alternativa CORRETA:",
   alts:{a:"Os adornos devem ser retirados antes, exceto as alianças lisas.",b:"As mãos não devem secar sozinhas no álcool em gel, devendo usar papel toalha logo após passar o gel.",c:"A fricção com água e sabão antisséptico deve durar apenas 10 segundos.",d:"As mãos dos profissionais podem adquirir microrganismos multirresistentes por contato com o paciente e superfícies próximas.",e:"As formulações alcoólicas são a escolha ideal mesmo se houver sujidade visível nas mãos."},gabarito:"d",
   resolucao:"O ambiente e superfícies próximas ao leito formam reservatórios de contaminação cruzada. Adornos devem ser removidos *todos* (A), álcool gel deve secar por fricção espontânea (B), e sujidade visível exige água e sabão obrigatoriamente (E).",
   tags:["biosseguranca"],fav:false},

  {id:"fun015",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Sondagem Nasogástrica",banca:"UNIRIO",ano:2014,dific:2,tipo:"procedimento",
   enunciado:"Antes de alimentarmos um paciente por sonda nasogástrica, deve-se obrigatoriamente:",
   alts:{a:"Observar e registrar o balanço hídrico.",b:"Aspirar com uma seringa, verificando o posicionamento e resíduo gástrico.",c:"Introduzir 100 ml de soro fisiológico para abrir caminho.",d:"Proceder à sifonagem contínua do conteúdo.",e:"Trocar a sonda preventivamente."},gabarito:"b",
   resolucao:"A aspiração com seringa para checar resíduo e teste de pH/ausculta protege o paciente contra riscos graves de broncoaspiração caso a sonda tenha se deslocado para a via aérea.",
   tags:["sondagem"],fav:false},

  {id:"fun016",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Sondagem",banca:"UNIRIO",ano:2014,dific:2,tipo:"memorização",
   enunciado:"A sonda gástrica comum de lúmen único utilizada para lavagem ou aspiração é conhecida como sonda de:",
   alts:{a:"Dobb-Hoff.",b:"Foley.",c:"Levin.",d:"Penrose.",e:"Kehr."},gabarito:"c",
   resolucao:"A sonda de Levin é a sonda nasogástrica de poliuretano ou PVC usada para drenagem ou alimentação curta. Dobb-Hoff é enteral (A), Foley é vesical (B), Penrose e Kehr são drenos cirúrgicos.",
   tags:["sondagem"],fav:false},

  {id:"fun017",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Cateterismo Vesical",banca:"UPENET",ano:2019,dific:3,tipo:"clínico",
   enunciado:"Sobre o cateterismo vesical (intermitente e de demora), analise as afirmativas:\nI. O intermitente (alívio) é indicado para aliviar o desconforto da retenção urinária aguda.\nII. O de demora de curto prazo serve para mensurar débito urinário rigoroso em pacientes críticos.\nIII. O de demora de longo prazo é o ideal para avaliar rotineiramente urina residual pós-micção.",
   alts:{a:"I, II e III.",b:"I e II, apenas.",c:"II e III, apenas.",d:"I e III, apenas.",e:"II apenas."},gabarito:"b",
   resolucao:"A afirmativa III está errada porque o cateterismo de *alívio* (intermitente) é o indicado para esvaziar e medir resíduo pós-micção, evitando manter um cateter permanente apenas para isso.",
   tags:["cateterismo"],fav:false},

  {id:"fun018",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Sonda Enteral",banca:"IADES",ano:2014,dific:2,tipo:"procedimento",
   enunciado:"Para evitar a obstrução de uma sonda de nutrição enteral, a principal medida preventiva da equipe de enfermagem é:",
   alts:{a:"Manter a sonda sempre na mesma fixação cutânea.",b:"Manter a sonda fechada se o paciente tossir.",c:"Lavar a sonda com água destilada/morna antes e após a administração de dietas e medicações.",d:"Puxar rapidamente a sonda em caso de refluxo.",e:"Medir apenas o volume total ao final do plantão."},gabarito:"c",
   resolucao:"O cuidado padrão ouro para impedir a obstrução por resíduos aderidos na parede interna das sondas enterais é a lavagem ativa com água sob pressão de seringa pós-dietas e drogas.",
   tags:["sondagem"],fav:false},

  {id:"fun019",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Sondagem Parâmetros",banca:"CONTEMAX",ano:2014,dific:3,tipo:"conceitual",
   enunciado:"Sobre sondas, classifique (V) ou (F):\n() A sonda nasogástrica serve apenas para aspiração.\n() A sonda nasoenteral tem melhor absorção de nutrientes no lúmen intestinal.\n() O Raio-X é o método confirmatório mais seguro pois a sonda enteral possui ogiva rádio-opaca.",
   alts:{a:"V - V - V",b:"F - V - V",c:"F - F - V",d:"V - V - F"},gabarito:"b",
   resolucao:"A sonda nasogástrica também pode ser usada para infusão curta de dietas (falsa 1). O Raio-X é o padrão ouro de confirmação posicional devido à linha rádio-opaca da sonda enteral.",
   tags:["sondagem"],fav:false},

  {id:"fun020",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Cateterismo Masculino",banca:"COSEAC",ano:2015,dific:2,tipo:"procedimento",
   enunciado:"No cateterismo vesical de demora em pacientes do sexo masculino, a fixação externa correta da sonda deve ser feita na:",
   alts:{a:"Face interna da coxa esquerda.",b:"Face interna da coxa direita.",c:"Região hipogástrica (abdômen inferior) ou coxa alta sem tração.",d:"Região perineal.",e:"Bolsa escrotal."},gabarito:"c",
   resolucao:"No homem, a fixação deve ser no abdômen inferior (hipogástrio) ou na coxa alta para retificar o ângulo penoescrotal e evitar fístulas ou lesões por pressão na uretra.",
   tags:["cateterismo"],fav:false},

  {id:"fun021",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Cateterismo Alívio",banca:"VUNESP",ano:2020,dific:1,tipo:"memorização",
   enunciado:"Um dos objetivos principais para a indicação do cateterismo vesical intermitente (alívio) é:",
   alts:{a:"Mensuração contínua do débito urinário de 24h.",b:"Verificação da taxa de hidratação interna.",c:"Esvaziamento imediato em caso de retenção urinária aguda.",d:"Prevenção ativa de desidratação clínica.",e:"Interromper o reflexo miccional espontâneo."},gabarito:"c",
   resolucao:"O cateterismo de alívio serve para esvaziamento imediato e pontual da bexiga (ex: retenção urinária pós-parto ou pós-anestésica), retirando-se o cateter logo em seguida.",
   tags:["cateterismo"],fav:false},

  {id:"fun022",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Materiais Cateterismo",banca:"INSTITUTO AOCP",ano:2015,dific:2,tipo:"procedimento",
   enunciado:"Em caso de solicitação de cateterismo vesical de demora, quais são os materiais corretos para montar a bandeja estéril completa?",
   alts:{a:"Luva de procedimento, antisséptico e gazes simples.",b:"Luva estéril, antisséptico degermante/aquoso, gazes estéreis, água destilada, seringa, campo fenestrado estéril, lubrificante estéril (lidocaína gel), sonda de Foley e coletor sistema fechado.",c:"Luva estéril, água e sabão comum, sonda uretral simples de alívio.",d:"Luva de procedimento, lubrificante comum e frasco de coleta aberta."},gabarito:"b",
   resolucao:"O cateterismo de demora exige técnica estritamente asséptica e sistema fechado de drenagem, além da sonda de Foley (com balão) e água destilada para inflá-lo.",
   tags:["cateterismo"],fav:false},

  {id:"fun023",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Oxigenoterapia",banca:"FUNRIO",ano:2016,dific:2,tipo:"conceitual",
   enunciado:"Sobre os dispositivos de administração de oxigênio, indique a alternativa INCORRETA:",
   alts:{a:"Uma vantagem da cânula nasal é permitir que o paciente fale e coma.",b:"A máscara de Venturi interfere na fala e na alimentação ordinária.",c:"A máscara com reservatório não causa pontos de pressão facial.",d:"Uma vantagem da máscara facial simples é permitir a entrada de ar ambiente pelas frestas laterais.",e:"O cateter tipo óculos facilita a deambulação do paciente."},gabarito:"c",
   resolucao:"Qualquer máscara facial plástica mantida por períodos prolongados sob tirantes elásticos exerce compressão sobre a ponte nasal e bochechas, podendo gerar lesões por pressão.",
   tags:["oxigenoterapia"],fav:false},

  {id:"fun024",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Coleta de Urina",banca:"IADES",ano:2017,dific:2,tipo:"procedimento",
   enunciado:"Orientar higiene íntima com água e sabão, desprezar o primeiro jato da micção e coletar o jato médio em frasco estéril. Essas ações servem para qual exame?",
   alts:{a:"Proteinúria de 24 horas.",b:"Urinografia dinâmica.",c:"Exame Sumário (EAS) ou Urocultura padrão.",d:"Pesquisa de cetonúria isolada."},gabarito:"c",
   resolucao:"Desprezar o primeiro jato serve para eliminar a microbiota comensal presente na uretra distal, garantindo que a amostra do jato médio represente fielmente a urina da bexiga.",
   tags:["procedimentos"],fav:false},

  {id:"fun025",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Estomas",banca:"NUCEPE",ano:2015,dific:3,tipo:"clínico",
   enunciado:"No cuidado ao paciente portador de colostomia, o técnico atua no autocuidado. Assinale a conduta ou orientação INCORRETA:",
   alts:{a:"Informar que qualquer vermelhidão ou leve ardor no peristoma é normal e esperado.",b:"Orientar que o estoma saudável deve ser rosa ou vermelho vívido e brilhante.",c:"Trocar a bolsa em média a cada 5 a 7 dias ou se houver sinais de descolamento/vazamento.",d:"Encorajar a deambulação precoce pós-operatória.",e:"Esvaziar a bolsa coletora quando atingir de 1/3 a metade da capacidade."},gabarito:"a",
   resolucao:"Vermelhidão (eritema) e dor/ardor na pele periostomal indicam complicação (dermatite irritativa por vazamento de efluente), exigindo intervenção protetora, e nunca normalidade.",
   tags:["estomas"],fav:false},

  {id:"fun026",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Punção Venosa",banca:"OBJETIVA",ano:2021,dific:2,tipo:"procedimento",
   enunciado:"Em relação à técnica de punção venosa periférica, é CORRETO afirmar que:",
   alts:{a:"Membros com fístula arteriovenosa ativa podem ser puncionados normalmente.",b:"Deve ser realizada a antissepsia com álcool 70% ou clorexidina alcoólica.",c:"Deve-se preferir sempre a veia calibrosa da fossa antecubital no membro dominante em todas as infusões.",d:"O cateter periférico rígido deve ser trocado a cada 24 horas obrigatoriamente.",e:"Após duas tentativas sem sucesso pelo mesmo profissional, recomenda-se pedir ajuda a outro colega."},gabarito:"b",
   resolucao:"A antissepsia correta com fricção de álcool 70% ou clorexidina alcoólica previne infecções de corrente sanguínea. É proibido puncionar membro com fístula (A).",
   tags:["puncao_venosa"],fav:false},

  {id:"fun027",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Posicionamento",banca:"INSTITUTO AOCP",ano:2015,dific:2,tipo:"procedimento",
   enunciado:"Paciente internada na UTI em ventilação mecânica colherá líquor por punção lombar. Para abrir os espaços intervertebrais, a paciente deve ser colocada em:",
   alts:{a:"Posição supina plana.",b:"Trendelenburg invertido.",c:"Decúbito lateral em flexão máxima (posição fetal).",d:"Decúbito dorsal horizontal.",e:"Posição prona rígida."},gabarito:"c",
   resolucao:"O decúbito lateral com joelhos fletidos contra o abdômen e queixo no peito (posição fetal) abre os processos espinhosos das vértebras lombares, facilitando a agulha.",
   tags:["posicionamento"],fav:false},

  {id:"fun028",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Posicionamento",banca:"KLC",ano:2012,dific:2,tipo:"memorização",
   enunciado:"Associe as posições corporais:\n( ) Prevenção de choque, pés elevados a 45º.\n( ) Conforto, cabeceira elevada, melhora padrão respiratório.\n( ) Exame bimanual de tórax/abdômen.\n( ) Exames e cirurgias de períneo/vagina.",
   alts:{a:"Trendelenburg - Fowler - Decúbito Dorsal - Litotomia",b:"Fowler - Trendelenburg - Litotomia - Sims",c:"Sims - Fowler - Trendelenburg - Dorsal"},gabarito:"a",
   resolucao:"A elevação de pés em declive é Trendelenburg (choque). Elevação de cabeceira é Fowler (melhora respiratória). Posição ginecológica para exames pélvicos é Litotomia.",
   tags:["posicionamento"],fav:false},

  {id:"fun029",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Preparo do Corpo",banca:"COPEVE",ano:2016,dific:2,tipo:"procedimento",
   enunciado:"No preparo do corpo pós-morte (necrotécnico), quais ações estão corretas?\nI. Retirar imediatamente sondas, cateteres e drenos.\nII. Tamponar orifícios naturais com algodão.\nIII. Renovar curativos se houver vazamentos.",
   alts:{a:"I, II e III.",b:"I e II apenas.",c:"II e III apenas.",d:"I e III apenas."},gabarito:"a",
   resolucao:"O preparo do corpo exige a retirada de dispositivos invasivos, a limpeza e o tamponamento de orifícios naturais (narinas, ouvidos, boca, reto) para evitar a saída de fluidos corporais.",
   tags:["procedimentos"],fav:false},

  {id:"fun030",materia:"Fundamentos de Enfermagem",modulo:"Módulo 2: Fundamentos de Enfermagem",assunto:"Banho no Leito",banca:"CONSULPLAN",ano:2023,dific:2,tipo:"procedimento",
   enunciado:"Em relação ao banho no leito em pacientes críticos acamados, assinale a afirmativa correta:",
   alts:{a:"A higiene oral rigorosa minimiza o risco de pneumonia associada à ventilação (PAV).",b:"A higiene oral só precisa ser feita uma vez ao dia.",c:"Bolsas de estomas devem ser limpas antes do início do banho.",d:"A nutrição enteral deve continuar correndo normalmente em fluxo rápido durante o banho.",e:"A higiene íntima feminina deve ser feita de trás para frente."},gabarito:"a",
   resolucao:"A higiene oral regular com antisséptico reduz a carga bacteriana salivar que coloniza a orofaringe, reduzindo a incidência de infecção pulmonar por microaspiração. A higiene íntima feminina é sempre da frente para trás (E).",
   tags:["procedimentos"],fav:false},

  // ── MÓDULO: CÁLCULO DE MEDICAMENTOS ─────────────
  {id:"cal001",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Volume de Infusão",banca:"ESA",ano:2012,dific:3,tipo:"cálculo",
   enunciado:"Frasco de 500 ml de SG 5% + 10 ml de KCl + 20 ml de NaCl. Correu de 08h às 12h a 8 gotas/min. Qual o volume total administrado?",
   alts:{a:"26 ml.",b:"37 ml.",c:"48 ml.",d:"59 ml.",e:"96 ml."},gabarito:"e",
   resolucao:"Tempo = 4 horas (de 08h às 12h). Fórmula clássica: Gotas/min = Volume / (Tempo * 3). Substituindo: 8 = V / (4 * 3) -> 8 = V / 12 -> V = 8 * 12 = 96 ml.",
   tags:["calculo","gotejamento"],fav:false},

  {id:"cal002",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Tempo de Infusão",banca:"ESA",ano:2012,dific:3,tipo:"cálculo",
   enunciado:"Frasco de 500 ml de SG 5% + 10 ml de KCl + 30 ml de NaCl (Total = 540 ml). Correu metade do volume (270 ml) a 9 gotas/min. Quanto tempo durou a infusão?",
   alts:{a:"20 min.",b:"30 min.",c:"1 hora.",d:"10 horas.",e:"20 horas."},gabarito:"d",
   resolucao:"Volume infundido = 270 ml. Gotas = 9. Fórmula: Gotas = V / (T * 3) -> 9 = 270 / (T * 3) -> 27 * T = 270 -> T = 270 / 27 = 10 horas.",
   tags:["calculo","gotejamento"],fav:false},

  {id:"cal003",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Microgotas",banca:"ESA",ano:2014,dific:2,tipo:"cálculo",
   enunciado:"Prescrição de 60 ml de SG 5% para correr em 1h30min (1,5h). Quantas microgotas por minuto deverão ser programadas?",
   alts:{a:"40 microgotas/min.",b:"14 microgotas/min.",c:"13 microgotas/min.",d:"4 microgotas/min."},gabarito:"a",
   resolucao:"Fórmula de Microgotas por minuto = Volume / Tempo (em horas). Convertendo 1h30min = 1,5 horas. Microgotas = 60 / 1,5 = 40 microgotas/min.",
   tags:["calculo","gotejamento"],fav:false},

  {id:"cal004",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Regra de Três",banca:"ESA",ano:2019,dific:2,tipo:"cálculo",
   enunciado:"Prescrição: 150 mg de um fármaco. Disponível: Frasco com 1g (1000 mg). Diluído em 5 ml. Quantos ml aspirar?",
   alts:{a:"0,75 ml.",b:"1,5 ml.",c:"5 ml.",d:"0,05 ml."},gabarito:"a",
   resolucao:"Montando a regra de três direta: 1000 mg ── 5 ml | 150 mg ── X ml. X = (150 * 5) / 1000 = 750 / 1000 = 0,75 ml.",
   tags:["calculo"],fav:false},

  {id:"cal005",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Porcentagem",banca:"ESA",ano:2020,dific:2,tipo:"cálculo",
   enunciado:"Assinale a alternativa que corresponde à quantidade total pura de NaCl contida em um frasco de 1 Litro (1000 ml) de Soro Fisiológico 0,9%.",
   alts:{a:"0,9 mg.",b:"0,09 g.",c:"900 mg.",d:"9 g.",e:"90 mg."},gabarito:"d",
   resolucao:"0,9% significa que existem 0,9 gramas de soluto para cada 100 ml de solução. Se o frasco tem 1000 ml (10 vezes mais): 0,9 g * 10 = 9 gramas de NaCl puro.",
   tags:["calculo","porcentagem"],fav:false},

  {id:"cal006",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Porcentagem",banca:"FCC",ano:2014,dific:3,tipo:"cálculo",
   enunciado:"A dose prescrita de 60 mg do medicamento X disponível em solução a 2,4% corresponde a quantos mililitros?",
   alts:{a:"1,8 mL.",b:"3,5 mL.",c:"2,5 mL.",d:"2,8 mL."},gabarito:"c",
   resolucao:"A concentração de 2,4% equivale a 2,4 g em 100 mL, ou seja, 2400 mg em 100 mL, simplificando: 24 mg por mL. Regra de três: 24 mg ── 1 mL | 60 mg ── X mL. X = 60 / 24 = 2,5 mL.",
   tags:["calculo"],fav:false},

  {id:"cal007",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Gotejamento Soro",banca:"ESA",ano:2022,dific:2,tipo:"cálculo",
   enunciado:"O médico prescreveu 1500 ml de Soro Fisiológico para infundir em 24 horas. Qual o gotejamento por minuto por macrogotas?",
   alts:{a:"20 gotas/min.",b:"45 gotas/min.",c:"150 gotas/min.",d:"21 gotas/min."},gabarito:"d",
   resolucao:"Fórmula: Gotas/min = V / (T * 3). Substituindo: Gotas = 1500 / (24 * 3) = 1500 / 72 = 20,83. Arredondando comercialmente e por padrão técnico = 21 gotas/min.",
   tags:["calculo","gotejamento"],fav:false},

  {id:"cal008",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Concentração",banca:"FUNDATEC",ano:2021,dific:2,tipo:"cálculo",
   enunciado:"Prescrição: Tramadol 60 mg. Apresentação: Ampola de 3 ml com concentração informada de 25 mg/ml. Quanto deve ser aspirado?",
   alts:{a:"3,0 ml.",b:"6,4 ml.",c:"2,4 ml.",d:"2,0 ml."},gabarito:"c",
   resolucao:"Esqueça o volume total da ampola para a proporção base: a concentração fixa é 25 mg por 1 ml. Logo: 25 mg ── 1 ml | 60 mg ── X ml. X = 60 / 25 = 2,4 ml.",
   tags:["calculo"],fav:false},

  {id:"cal009",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Diluição",banca:"AMAUC",ano:2019,dific:1,tipo:"cálculo",
   enunciado:"Frasco de Cefalotina Sódica de 1g. Ao se diluir com solvente obtendo-se solução total de 5 ml, qual a concentração resultante por ml?",
   alts:{a:"200 mg.",b:"20 mg.",c:"150 mg.",d:"1 g."},gabarito:"a",
   resolucao:"1 grama equivale a 1000 mg. Se esses 1000 mg estão distribuídos igualmente em 5 ml: 1000 mg / 5 ml = 200 mg por ml.",
   tags:["calculo"],fav:false},

  {id:"cal010",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Digoxina",banca:"AMAUC",ano:2019,dific:2,tipo:"cálculo",
   enunciado:"Prescrição de 0,75 mg de digoxina EV. Na unidade há ampolas contendo 0,25 mg/mL. Quantos mL devem ser administrados?",
   alts:{a:"6 mL.",b:"0,75 mL.",c:"3 mL.",d:"1,5 mL."},gabarito:"c",
   resolucao:"Regra de três básica: 0,25 mg ── 1 mL | 0,75 mg ── X mL. X = 0,75 / 0,25 = 3 mL.",
   tags:["calculo"],fav:false},

  {id:"cal011",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Insulina total",banca:"Avança SP",ano:2023,dific:2,tipo:"cálculo",
   enunciado:"Paciente deve aplicar 40 UI de insulina regular a cada 8 horas. Em 24 horas, quantos mL totais do fármaco serão injetados? (Considere frasco padrão 100 UI/mL).",
   alts:{a:"1,2 mL.",b:"1,6 mL.",c:"2,0 mL.",d:"0,4 mL."},gabarito:"a",
   resolucao:"A cada 8h significa 3 vezes ao dia (24/8 = 3). Dose diária total = 40 UI * 3 = 120 UI. Se 100 UI equivalem a 1 mL: 120 UI / 100 = 1,2 mL.",
   tags:["calculo","insulina"],fav:false},

  {id:"cal012",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Gotas/ml",banca:"FUNDEP",ano:2023,dific:1,tipo:"memorização",
   enunciado:"Considerando a conversão padrão de volumes, 2 mL de uma solução oral correspondem a quantas gotas?",
   alts:{a:"20 gotas.",b:"30 gotas.",c:"40 gotas.",d:"60 gotas."},gabarito:"c",
   resolucao:"Por convenção internacional adotada na farmacologia hospitalar, 1 mL de solução aquosa equivale rigidamente a 20 gotas. Portanto, 2 mL * 20 = 40 gotas.",
   tags:["calculo"],fav:false},

  {id:"cal013",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Regra de Três",banca:"FCC",ano:2023,dific:2,tipo:"cálculo",
   enunciado:"Prescrição: 15 mg por via IM. Disponível: Ampola de 1 mL contendo 20 mg/mL. Quanto aspirar?",
   alts:{a:"0,30 mL.",b:"0,50 mL.",c:"0,25 mL.",d:"0,75 mL."},gabarito:"d",
   resolucao:"Proporção direta: 20 mg ── 1 mL | 15 mg ── X mL. X = 15 / 20 = 0,75 mL.",
   tags:["calculo"],fav:false},

  {id:"cal014",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Heparina SC",banca:"FUNDATEC",ano:2022,dific:2,tipo:"cálculo",
   enunciado:"Prescrição: 10.000 UI de heparina SC. Disponível: Frasco de heparina com 5.000 UI/ml. Quanto deve ser aspirado?",
   alts:{a:"5 ml.",b:"10 ml.",c:"1 ml.",d:"2 ml."},gabarito:"d",
   resolucao:"Concentração: 5000 UI em 1 ml. Queremos 10.000 UI (o dobro). Logo, deve-se aspirar o dobro do volume base: 2 ml.",
   tags:["calculo"],fav:false},

  {id:"cal015",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Insulina Seringa comum",banca:"IBADE",ano:2017,dific:4,tipo:"cálculo",
   enunciado:"Prescrição: 30 UI de insulina regular. Frasco de 100 UI/mL. Seringa comum disponível de 3 mL. Técnica: Diluir 1 mL de insulina em 1 mL de água destilada. Quanto aspirar da solução final?",
   alts:{a:"0,8 mL.",b:"0,5 mL.",c:"0,6 mL.",d:"0,3 mL."},gabarito:"c",
   resolucao:"Ao misturar 1 mL de insulina (100 UI) com 1 mL de água, você obtém uma solução total de 2 mL contendo as mesmas 100 UI (Concentração nova = 100 UI / 2 mL = 50 UI/mL). Regra de três: 50 UI ── 1 mL | 30 UI ── X mL. X = 30 / 50 = 0,6 mL.",
   tags:["calculo","insulina"],fav:false},

  {id:"cal016",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Penicilina Cristalina",banca:"FCC",ano:2018,dific:4,tipo:"cálculo",
   enunciado:"Frasco de Penicilina Cristalina de 5.000.000 UI. Injetados 8 mL de diluente. Para conseguir obter 4.800.000 UI, quanto deve ser aspirado?",
   alts:{a:"9,6 mL.",b:"9,8 mL.",c:"8,8 mL.",d:"9,2 mL."},gabarito:"a",
   resolucao:"Regra crucial da Penicilina de 5M UI: o pó seco ocupa um volume próprio de 2 mL no fundo do frasco. Ao adicionar 8 mL de diluente, o volume final líquido real é de 10 mL (8 + 2). Regra de três: 5.000.000 UI ── 10 mL | 4.800.000 UI ── X mL. X = (4.800.000 * 10) / 5.000.000 = 48 / 5 = 9,6 mL.",
   tags:["calculo","penicilina"],fav:false},

  {id:"cal017",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Penicilina + Gotejamento",banca:"IBFC",ano:2023,dific:4,tipo:"cálculo",
   enunciado:"Prescrição: Penicilina 2.400.000 UI EV em SF 100ml para correr em 1 hora. Disponível: Frasco de 5.000.000 UI (ocupa 2ml de pó) e diluído com 8ml (total = 10ml). Quanto aspirar do frasco e qual o gotejamento do soro?",
   alts:{a:"2,5ml; 33 gotas por minuto.",b:"4,8ml; 35 gotas por minuto.",c:"4,8ml; 33 gotas por minuto.",d:"3,2ml; 17 gotas por minuto."},gabarito:"c",
   resolucao:"Parte 1: Volume total do FA = 10ml. 5.000.000 UI ── 10ml | 2.400.000 UI ── X ml -> X = 24 / 5 = 4,8 ml. Parte 2 Gotejamento: V = 100 ml, T = 1 hora. Gotas = V / (T * 3) = 100 / 3 = 33,3 (33 gotas/min).",
   tags:["calculo","penicilina"],fav:false},

  {id:"cal018",materia:"Cálculo de Medicamentos",modulo:"Módulo 3: Cálculo de Medicamentos",assunto:"Penicilina Microgotas",banca:"VUNESP",ano:2018,dific:4,tipo:"cálculo",
   enunciado:"Prescrição: Penicilina 400.000 UI em SF 50 mL para correr em 30 minutos. Disponível: FA de 5.000.000 UI, adicionados 8 mL de água (total = 10 mL). Qual o volume (V) a aspirar e o gotejamento em microgotas (G)?",
   alts:{a:"V = 0,8 mL; G = 34.",b:"V = 0,8 mL; G = 101.",c:"V = 0,8 mL; G = 100.",d:"V = 6,5 mL; G = 34."},gabarito:"b",
   resolucao:"Volume Penicilina: 5.000.000 UI ── 10 mL | 400.000 UI ── X mL -> X = 4 / 5 = 0,8 mL. Gotejamento Microgotas: Volume total da solução = 50 mL + 0,8 mL = 50,8 mL. Tempo = 30 min (0,5 h). Microgotas/min = V / T = 50,8 / 0,5 = 101,6 -> ~101 microgotas/min.",
   tags:["calculo","penicilina"],fav:false},

  // ── MÓDULO: CLÍNICA CIRÚRGICA ───────────────────
  {id:"cir001",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Apendicite Contraindicação",banca:"ESA",ano:2011,dific:2,tipo:"clínico",
   enunciado:"Um homem foi atendido com apendicite aguda e foi realizada apendicectomia. Assinale qual cuidado é CONTRAINDICADO no pré-operatório:",
   alts:{a:"Administração de enema (lavagem intestinal).",b:"Infusão intravenosa de líquidos para suporte renal.",c:"Realização de antibioticoterapia profilática prescrita.",d:"Passagem de sonda nasogástrica se houver íleo paralítico.",e:"Colocação do paciente em posição de semi-fowler pós-cirurgia."},gabarito:"a",
   resolucao:"A administração de enemas ou laxantes aumenta a pressão intraluminal no ceco, gerando risco iminente de perfuração do apêndice inflamado e peritonite subsequente.",
   tags:["cirurgica","apendicite"],fav:false},

  {id:"cir002",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Infecção Hospitalar",banca:"ESA",ano:2012,dific:3,tipo:"memorização",
   enunciado:"Uma infecção hospitalar acresce ao período de internação de um paciente, em média:",
   alts:{a:"De 1 a 3 dias.",b:"De 11 a 15 dias.",c:"De 11 a 20 dias.",d:"De 15 a 30 dias.",e:"De 5 a 10 dias."},gabarito:"e",
   resolucao:"Segundo os indicadores históricos monitorados pelo Ministério da Saúde, a ocorrência de infecção estende a internação por uma média de 5 a 10 dias adicionais.",
   tags:["infecção"],fav:false},

  {id:"cir003",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Posições Cirúrgicas",banca:"ESA",ano:2012,dific:2,tipo:"memorização",
   enunciado:"A posição indicada para o procedimento cirúrgico de histerectomia abdominal é:",
   alts:{a:"Genupeitoral.",b:"Litotômica.",c:"Decúbito lateral esquerdo.",d:"Trendelenburg.",e:"Fowler."},gabarito:"d",
   resolucao:"A posição de Trendelenburg (declive) desloca as alças intestinais superiormente por gravidade, oferecendo excelente visualização do útero e órgãos pélvicos.",
   tags:["posicionamento"],fav:false},

  {id:"cir004",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Pós-operatório Craniotomia",banca:"ESA",ano:2013,dific:3,tipo:"clínico",
   enunciado:"Assinale a alternativa que constitui cuidado de enfermagem para o controle da Pressão Intracraniana (PIC) no pós-operatório de craniotomia:",
   alts:{a:"Trocar o cateter venoso a cada 24h.",b:"Manutenção da posição em Trendelenburg.",c:"Manter sonda de Foley permanente.",d:"Monitorar pruridos e sialorréia.",e:"Ficar atento e evitar ativamente obstipação e vômitos."},gabarito:"e",
   resolucao:"Esforço evacuatório (obstipação) e episódios de vômitos disparam a pressão intratorácica e intracraniana de forma perigosa, elevando o risco de sangramentos cerebrais.",
   tags:["craniotomia"],fav:false},

  {id:"cir005",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Pré-operatório Craniotomia",banca:"ESA",ano:2013,dific:3,tipo:"clínico",
   enunciado:"Assinale a ação CONTRAINDICADA no pré-operatório imediato de craniotomia:",
   alts:{a:"Posicionar manguito de PA de 2/2h.",b:"Posicionar o paciente em Fowler baixo.",c:"Fazer tricotomia ampla prévia no quarto.",d:"Manter jejum absoluto (NPVO).",e:"Administrar enemas de rotina para esvaziamento."},gabarito:"e",
   resolucao:"Assim como os vômitos, enemas causam cólicas e esforço abdominal que aumentam perigosamente a PIC em pacientes neurológicos.",
   tags:["craniotomia"],fav:false},

  {id:"cir006",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Queimaduras",banca:"ESA",ano:2014,dific:3,tipo:"cálculo",
   enunciado:"Pelo método da 'Regra dos Nove', qual o percentual estimado de área corporal queimada em um indivíduo com lesões na região anterior e posterior da cabeça + tórax anterior?",
   alts:{a:"36%.",b:"18%.",c:"27%.",d:"9%.",e:"13,5%"},gabarito:"b",
   resolucao:"Cabeça total (Anterior + Posterior) = 9%. Tórax anterior sozinho = 9% (Tronco anterior completo é 18%). Somando as áreas: 9% + 9% = 18%.",
   tags:["queimadura"],fav:false},

  {id:"cir007",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia",banca:"ESA",ano:2014,dific:2,tipo:"memorização",
   enunciado:"O termo técnico que caracteriza o 'deslocamento para baixo (protrusão) da bexiga para o interior do canal vaginal' é:",
   alts:{a:"Bexigoma.",b:"Uretrocele.",c:"Enterocele.",d:"Retocele.",e:"Cistocele."},gabarito:"e",
   resolucao:"Cistocele é a herniação da bexiga na parede vaginal. Retocele envolve o reto (D) e uretrocele a uretra (B). Bexigoma é retenção urinária palpável.",
   tags:["terminologia"],fav:false},

  {id:"cir008",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia Cirúrgica",banca:"ESA",ano:2015,dific:2,tipo:"memorização",
   enunciado:"A incisão cirúrgica realizada na membrana do tímpano com a finalidade de drenar secreções acumuladas e aliviar a pressão interna é chamada de:",
   alts:{a:"Miringotomia.",b:"Septoplastia.",c:"Facectomia.",d:"Simpatectomia.",e:"Timpanoplastia."},gabarito:"a",
   resolucao:"Miringotomia ou timpanocentese é a incisão direta no tímpano. Timpanoplastia (E) reconstrói a membrana se houver ruptura crônica.",
   tags:["terminologia"],fav:false},

  {id:"cir009",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Feridas",banca:"ESA",ano:2015,dific:2,tipo:"conceitual",
   enunciado:"Um rasgo na integridade da pele apresentando bordas irregulares e pontes de tecido fibroso venoso é definido como uma ferida de tipo:",
   alts:{a:"Laceração.",b:"Avulsão.",c:"Abrasão.",d:"Hematoma.",e:"Corte."},gabarito:"a",
   resolucao:"A laceração ocorre pelo estiramento ou rasgo de tecidos por força romba, preservando pontes teciduais internas e margens irregulares escoriadas.",
   tags:["feridas"],fav:false},

  {id:"cir010",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Coberturas Curativos",banca:"ESA",ano:2018,dific:3,tipo:"clínico",
   enunciado:"O Sr. Joaquim possui uma úlcera infectada na perna e risco de úlcera por pressão noutras partes do corpo. Quais coberturas são indicadas respectivamente para tratamento e prevenção?",
   alts:{a:"Alginato de cálcio e carvão ativado.",b:"Papaína e Filme transparente.",c:"Carvão ativado (absorção/odor) e Hidrocoloide (barreira/proteção).",d:"Hidrocoloide e Filme."},gabarito:"c",
   resolucao:"O carvão ativado com prata absorve exsudato e neutraliza o odor de feridas infectadas. O hidrocoloide protege áreas de proeminência óssea contra fricção e cisalhamento.",
   tags:["curativo"],fav:false},

  {id:"cir011",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Sufixos Cirúrgicos",banca:"IBADE",ano:2019,dific:2,tipo:"memorização",
   enunciado:"Assinale a alternativa que correlaciona CORRETAMENTE a terminologia cirúrgica com o procedimento executado:",
   alts:{a:"Apendicectomia: remoção do apêndice; Gastrectomia: remoção do estômago; Salpingectomia: correção de septo.",b:"Hepatorrafia: sutura do fígado; Cistopexia: fixação do rim; Esofagectomia: remoção do esôfago.",c:"Esplenectomia: remoção do baço; Orquiectomia: remoção do testículo; Histeropexia: fixação do útero.",d:"Gastrectomia: remoção do estômago; Colecistectomia: remoção do cólon."},gabarito:"c",
   resolucao:"Esplen (baço), Orqui (testículo), Histero (útero). O sufixo -ectomia significa retirada e -pexia significa fixação cirúrgica.",
   tags:["terminologia"],fav:false},

  {id:"cir012",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Instrumental",banca:"INSTITUTO AOCP",ano:2015,dific:2,tipo:"memorização",
   enunciado:"Ao organizar o instrumental cirúrgico, o técnico aponta como um exemplo de instrumento destinado especificamente para a DIÉRESE (corte) dos tecidos:",
   alts:{a:"A tesoura de Mayo curva.",b:"O afastador de Farabeuf.",c:"A pinça de Kocher.",d:"A pinça de Backaus.",e:"O porta agulhas de Hegar."},gabarito:"a",
   resolucao:"Diérese compreende os atos de corte ou dissecção. As tesouras (Mayo e Metzenbaum) e os cabos de bisturi são os instrumentos protótipos desse tempo.",
   tags:["instrumental"],fav:false},

  {id:"cir013",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia",banca:"FAUEL",ano:2021,dific:2,tipo:"memorização",
   enunciado:"Os significados etimológicos das terminologias 'Colecistectomia' e 'Cistopexia' referem-se, respectivamente, a:",
   alts:{a:"Abertura da vesícula biliar; Remoção de cisto.",b:"Remoção da vesícula biliar; Elevação e fixação da bexiga.",c:"Remoção de parte do cólon; Fixação da bexiga."},gabarito:"b",
   resolucao:"Colecisto é vesícula biliar, -ectomia é remoção. Cisto (neste contexto cirúrgico de pexia) refere-se à bexiga urinária, e -pexia à sua fixação anatômica.",
   tags:["terminologia"],fav:false},

  {id:"cir014",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Potencial de Contaminação",banca:"FEPESE",ano:2022,dific:3,tipo:"conceitual",
   enunciado:"Sobre a classificação das cirurgias por potencial de contaminação da incisão, assinale a afirmativa correta:",
   alts:{a:"Cirurgias limpas entram obrigatoriamente no trato digestivo aberto.",b:"Cirurgias infectadas ocorrem em tecidos com cicatrização primária sem inflamação.",c:"Cirurgias Potencialmente Contaminadas são realizadas em tecidos colonizados por flora microbiana pouco numerosa, na ausência de processo infeccioso e inflamatório agudo."},gabarito:"c",
   resolucao:"As potencialmente contaminadas entram em tratos colonizados (respiratório, digestivo baixo ou urinário) sob condições estritamente controladas e sem infecção ativa no momento.",
   tags:["classificacao"],fav:false},

  {id:"cir015",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Classificação Cirurgias",banca:"INSTITUTO AOCP",ano:2015,dific:1,tipo:"memorização",
   enunciado:"Paciente interna para realização de cirurgia de inserção de prótese mamária + lipoaspiração. Quanto à finalidade, essa cirurgia é classificada como:",
   alts:{a:"Paliativa.",b:"Reparadora.",c:"Reconstrutora.",d:"Necessária.",e:"Estética."},gabarito:"e",
   resolucao:"Cirurgias estéticas têm como propósito exclusivo a melhoria do aspecto estético ou corporal de acordo com o desejo subjetivo do indivíduo.",
   tags:["classificacao"],fav:false},

  {id:"cir016",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Antibioticoprofilaxia",banca:"FGV",ano:2021,dific:3,tipo:"memorização",
   enunciado:"O Ministério da Saúde recomenda, como forma de prevenção de infecção de sítio cirúrgico, que a profilaxia com antibiótico intravenoso seja feita em até:",
   alts:{a:"Uma hora antes da incisão cirúrgica (idealmente na indução anestésica).",b:"Doze horas antes do início da cirurgia.",c:"No pós-operatório imediato na sala de recuperação."},gabarito:"a",
   resolucao:"A infusão do antibiótico deve ocorrer nos 60 minutos que antecedem o corte cirúrgico para garantir o pico máximo de concentração tecidual bactericida na pele durante o ato.",
   tags:["profilaxia"],fav:false},

  {id:"cir017",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Dreno Torácico",banca:"MÁXIMA",ano:2021,dific:2,tipo:"procedimento",
   enunciado:"Ao auxiliar a deambulação de um paciente portador de sistema de drenagem torácica subaquática (selo d'água), o profissional deve orientá-lo a:",
   alts:{a:"Manter o frasco coletor permanentemente abaixo do nível do tórax.",b:"Manter o frasco acima do nível dos ombros.",c:"Deitar o frasco de lado na cama para facilitar a caminhada."},gabarito:"a",
   resolucao:"O frasco coletor deve estar sempre abaixo do nível de inserção torácica do dreno para que a força da gravidade e o selo d'água impeçam o refluxo de líquido ou ar para o espaço pleural.",
   tags:["drenos"],fav:false},

  {id:"cir018",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Períodos Perioperatórios",banca:"FGV",ano:2021,dific:2,tipo:"conceitual",
   enunciado:"A partir do momento em que o médico decide e informa ao paciente que a cirurgia é indicada até o momento da operação, compreende-se o período:",
   alts:{a:"Perioperatório geral.",b:"Pré-operatório completo.",c:"Intraoperatório imediato.",d:"Pré-operatório imediato.",e:"Pré-operatório mediato."},gabarito:"e",
   resolucao:"O pré-operatório mediato vai desde a indicação cirúrgica no ambulatório até as 24h que antecedem a cirurgia. As últimas 24h compreendem o pré-operatório imediato.",
   tags:["periodos"],fav:false},

  {id:"cir019",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia",banca:"ÁPICE",ano:2022,dific:1,tipo:"memorização",
   enunciado:"Assinale a alternativa correta quanto à definição de termos cirúrgicos:",
   alts:{a:"Mastectomia é a reconstrução estética da mama.",b:"Colecistectomia é a remoção cirúrgica da vesícula biliar.",c:"Nefrectomia é a fixação posicional do rim.",d:"Herniorrafia é a remoção de uma hérnia.",e:"Esplenectomia é a remoção do fígado."},gabarito:"b",
   resolucao:"Colecisto = vesícula biliar; -ectomia = extração/remoção completa. Herniorrafia é a sutura/fechamento do anel herniário (D). Esplenectomia é a retirada do baço (E).",
   tags:["terminologia"],fav:false},

  {id:"cir020",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Cuidados Cirúrgicos",banca:"FGV",ano:2021,dific:3,tipo:"conceitual",
   enunciado:"Classifique V ou F sobre segurança no centro cirúrgico:\n( ) Identidade e cirurgia devem ser checadas com o paciente antes da anestesia.\n( ) A placa de bisturi elétrico deve ser colocada o mais longe possível do sítio cirúrgico para evitar faíscas.\n( ) A conferência de contagem de compressas e materiais é feita antes do fechamento da incisão.",
   alts:{a:"V - F - V",b:"F - F - V",c:"V - V - V",d:"F - V - F"},gabarito:"a",
   resolucao:"A placa neutra dispersiva do bisturi elétrico deve ser fixada em área muscular limpa *próxima* ao sítio cirúrgico para reduzir o trajeto da corrente pelo corpo, tornando a segunda assertiva falsa.",
   tags:["seguranca"],fav:false},

  {id:"cir021",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Apendicite Cuidados",banca:"GUALIMP",ano:2019,dific:2,tipo:"clínico",
   enunciado:"São intervenções corretas da enfermagem na apendicite, EXCETO:",
   alts:{a:"Aliviar a dor e reduzir ansiedade.",b:"No pré-operatório, administrar enemas ou laxantes para limpar o cólon.",c:"No pós-operatório, posicionar o paciente em Fowler para reduzir tensão abdominal.",d:"Monitorar sinais de abscesso ou peritonite."},gabarito:"b",
   resolucao:"Idêntica à questão 1 da ESA da mesma folha: lavagens intestinais causam hiperperistaltismo e risco crítico de rompimento do apêndice cecal.",
   tags:["apendicite"],fav:false},

  {id:"cir022",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Apendicite Classificação",banca:"INSTITUTO AOCP",ano:2015,dific:2,tipo:"clínico",
   enunciado:"Paciente jovem com diagnóstico confirmado de apendicite aguda vai para o centro cirúrgico. Essa cirurgia, quanto ao potencial de contaminação, é classificada como:",
   alts:{a:"Contaminada.",b:"Limpa.",c:"Potencialmente contaminada.",d:"Infectada."},gabarito:"a",
   resolucao:"A apendicectomia por inflamação aguda sem perfuração macroscópica entra em tecido com processo inflamatório local em trato colonizado, sendo classificada como cirurgia contaminada. Se estivesse supurada/perfurada seria infectada.",
   tags:["classificacao"],fav:false},

  {id:"cir023",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Prevenção de ISC",banca:"IBADE",ano:2022,dific:3,tipo:"procedimento",
   enunciado:"Considerando as diretrizes de prevenção de Infecção de Sítio Cirúrgico (ISC), marque a afirmativa INCORRETA:",
   alts:{a:"É proibido o uso de unhas artificiais pela equipe cirúrgica.",b:"Remover adornos antes da escovação cirúrgica.",c:"Fornecer toalhas limpas para o banho pré-operatório.",d:"Recomendar banho pré-operatório obrigatório com antisséptico degermante (clorexidina) para TODOS os tipos de cirurgias eletivas, inclusive as limpas simples.",e:"Se necessário remover pelos, fazer a tricotomia imediatamente antes com tricotomizador elétrico."},gabarito:"d",
   resolucao:"O banho com antisséptico degermante não é recomendado de forma indiscriminada para absolutamente todas as cirurgias limpas de rotina; o banho com sabonete neutro comum na véspera é suficiente na maioria das cirurgias gerais de baixo risco.",
   tags:["prevencao"],fav:false},

  {id:"cir024",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia",banca:"IBFC",ano:2023,dific:2,tipo:"memorização",
   enunciado:"Assinale a alternativa que apresenta a descrição exata da terminologia DEISCÊNCIA:",
   alts:{a:"Separação ou abertura espontânea das bordas previamente suturadas de uma ferida.",b:"Corte cirúrgico desnecessário.",c:"Saída de vísceras por falha grave do cirurgião.",d:"Remoção de tecido vivo para biópsia."},gabarito:"a",
   resolucao:"Deiscência define a separação mecânica das linhas de sutura da ferida operatória. A saída de vísceras através da deiscência completa é chamada de evisceração (C).",
   tags:["terminologia"],fav:false},

  {id:"cir025",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Tempos Cirúrgicos",banca:"IBFC",ano:2018,dific:2,tipo:"memorização",
   enunciado:"É correto afirmar que a EXÉRESE, um dos tempos cirúrgicos fundamentais, consiste na:",
   alts:{a:"Abertura inicial da pele e tecidos com lâmina.",b:"Cirurgia propriamente dita, ocorrendo a remoção de uma parte ou totalidade de um órgão ou tecido com finalidade terapêutica.",c:"Prevenção e parada de sangramentos via pinças.",d:"Sutura final aproximando os bordos."},gabarito:"b",
   resolucao:"A exérese é o tempo cirúrgico central onde se realiza o objetivo principal da intervenção (remoção, biópsia ou correção). Diérese é abertura, Hemostasia é controle de sangramento e Síntese é o fechamento.",
   tags:["tempos_cirurgicos"],fav:false},

  {id:"cir026",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Termos de Controle",banca:"IBFC",ano:2013,dific:2,tipo:"memorização",
   enunciado:"Associe os conceitos de controle microbiano:\n( ) Destruição de todas as formas de vida, incluindo esporos.\n( ) Destruição de patógenos em objetos inanimados, exceto esporos.\n( ) Redução da microbiota em tecidos vivos (pele/mucosa).",
   alts:{a:"Esterilização - Desinfecção - Antissepsia",b:"Assepsia - Antissepsia - Desinfecção",c:"Esterilização - Antissepsia - Assepsia"},gabarito:"a",
   resolucao:"Esterilização elimina esporos. Desinfecção aplica-se a superfícies e artigos inanimados. Antissepsia aplica-se exclusivamente sobre tecidos vivos corporais.",
   tags:["biosseguranca"],fav:false},

  {id:"cir027",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Fases Cirúrgicas",banca:"IF-PE",ano:2019,dific:3,tipo:"memorização",
   enunciado:"Associe as fases perioperatórias:\n( ) Compreende as 24 horas que antecedem a cirurgia.\n( ) Período desde a recepção na sala cirúrgica até a admissão na RPA.\n( ) Da admissão na RPA até a alta definitiva.",
   alts:{a:"Pré-operatório imediato - Transoperatório - Pós-operatório",b:"Pré-operatório mediato - Intraoperatório - Pós-operatório"},gabarito:"a",
   resolucao:"As últimas 24h são o pré-operatório imediato. O transoperatório engloba o tempo de permanência total dentro da sala cirúrgica.",
   tags:["periodos"],fav:false},

  {id:"cir028",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Pré-operatório Mediato",banca:"INSTITUTO AOCP",ano:2016,dific:2,tipo:"procedimento",
   enunciado:"Durante o preparo físico do paciente no período pré-operatório MEDIATO, a equipe de enfermagem deverá realizar:",
   alts:{a:"Administração do pré-anestésico na unidade.",b:"Exame físico geral, anamnese, conferência de exames laboratoriais e jejum inicial.",c:"Posicionamento final na mesa cirúrgica.",d:"Contagem de compressas gastas."},gabarito:"b",
   resolucao:"O período mediato envolve a admissão prévia do paciente, coleta de histórico clínico e conferência de exames pré-operatórios de triagem de riscos.",
   tags:["periodos"],fav:false},

  {id:"cir029",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Posicionamento",banca:"CESGRANRIO",ano:2014,dific:1,tipo:"memorização",
   enunciado:"A posição cirúrgica indicada para a realização de exames ou cirurgias na região do períneo é a:",
   alts:{a:"Genupeitoral.",b:"Litotômica.",c:"Ortostática.",d:"Supina.",e:"Prona."},gabarito:"b",
   resolucao:"A posição litotômica (ginecológica com pernas suspensas em perneiras) deixa a região perineal e pélvica totalmente exposta para manipulação cirúrgica.",
   tags:["posicionamento"],fav:false},

  {id:"cir030",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Posicionamento Choque",banca:"VUNESP",ano:2018,dific:2,tipo:"memorização",
   enunciado:"O posicionamento da mesa cirúrgica colocada em declive com elevação dos pés em 45 graus favorece o manejo de choque circulatório. Essa posição chama-se:",
   alts:{a:"Supina.",b:"Trendelenburg.",c:"Litotômica.",d:"Genupeitoral.",e:"Proclive."},gabarito:"b",
   resolucao:"Trendelenburg aumenta o retorno venoso e a perfusão de órgãos nobres (cérebro e coração) em situações agudas de hipotensão grave ou choque.",
   tags:["posicionamento"],fav:false},

  {id:"cir031",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"PIC Cuidados",banca:"FUNDATEC",ano:2021,dific:3,tipo:"clínico",
   enunciado:"Paciente em pós-operatório de craniotomia monitorizada por cateter de PIC. Qual cuidado de enfermagem auxilia no controle da pressão intracraniana?",
   alts:{a:"Aspiração endotraqueal a cada 2 horas rigorosa de rotina.",b:"Manter curativo compressivo apertado o tempo todo.",c:"Manter a cabeceira do leito elevada a 30 graus e alinhamento mentoesternal.",d:"Manter flexão máxima de quadril."},gabarito:"c",
   resolucao:"Manter a cabeceira elevada a 30° facilita o retorno venoso cerebral pelos seios durais, diminuindo a pressão hidrostática intracraniana. Aspiração contínua (A) eleva a PIC e deve ser restrita.",
   tags:["craniotomia"],fav:false},

  {id:"cir032",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Posicionamento Varizes",banca:"CESPE",ano:2017,dific:2,tipo:"memorização",
   enunciado:"No período transoperatório de uma cirurgia de varizes de membros inferiores, o paciente deve ser mantido preferencialmente na posição de:",
   alts:{a:"Sims.",b:"Elliot.",c:"Fowler.",d:"Trendelenburg."},gabarito:"d",
   resolucao:"A elevação das pernas em Trendelenburg esvazia os plexos venosos superficiais dos membros inferiores por gravidade, reduzindo o sangramento local durante a safenectomia.",
   tags:["posicionamento"],fav:false},

  {id:"cir033",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Ostomias",banca:"PR-4 UFRJ",ano:2015,dific:2,tipo:"memorização",
   enunciado:"O termo técnico que define a abertura cirúrgica do cólon na parede abdominal e o nome do produto eliminado por ela são, respectivamente:",
   alts:{a:"Estoma e efluente.",b:"Colostomia e efluente fecal.",c:"Ileostomia e quimo líquido.",d:"Colostomia e urina."},gabarito:"b",
   resolucao:"Colostomia é a abertura exteriorizada do intestino grosso. O material drenado por qualquer estoma recebe o nome técnico genérico de efluente (ou efluente fecal).",
   tags:["estomas"],fav:false},

  {id:"cir034",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia Prefixos",banca:"IBFC",ano:2016,dific:2,tipo:"memorização",
   enunciado:"Assinale a alternativa que apresenta a correta definição do termo cirúrgico formador:",
   alts:{a:"Colostomia é a abertura exteriorizada do cólon na parede abdominal.",b:"Apendicectomia é a abertura do apêndice.",c:"Histeropexia é a retirada do útero.",d:"Gastrorrafia é a abertura do estômago."},gabarito:"a",
   resolucao:"Colo (intestino grosso) + -stomia (boca/abertura externa). Histeropexia é a fixação do útero (C). Gastrorrafia é a sutura da parede do estômago (D).",
   tags:["terminologia"],fav:false},

  {id:"cir035",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Terminologia Geral",banca:"QUADRIX",ano:2019,dific:3,tipo:"conceitual",
   enunciado:"Com relação às terminologias da clínica cirúrgica, assinale a correta:",
   alts:{a:"O período imediato começa 7 dias antes.",b:"Nefroxia é a extração do rim.",c:"A cirurgia de lábio leporino é classificada como reparadora.",d:"Pielolitotomia é a retirada de cálculos da vesícula."},gabarito:"c",
   resolucao:"A fenda palatina/lábio leporino exige cirurgia plástica reparadora funcional. Pielolitotomia é a retirada de cálculo da *pélvis renal* e não da vesícula (D).",
   tags:["terminologia"],fav:false},

  {id:"cir036",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Curativos",banca:"FCC",ano:2017,dific:2,tipo:"procedimento",
   enunciado:"Ao realizar a troca de um curativo cirúrgico, o profissional precisa garantir que a cobertura cumpra o seguinte requisito protetor:",
   alts:{a:"Manter o acúmulo de exsudação livre.",b:"Impedir trocas gasosas teciduais.",c:"Ser totalmente permeável a bactérias externas.",d:"Permitir a remoção segura sem causar novos traumas no leito da ferida."},gabarito:"d",
   resolucao:"O curativo ideal deve proteger o tecido de granulação neoformado, permitindo trocas e remoção atraumática sem arrancar as células novas.",
   tags:["curativo"],fav:false},

  {id:"cir037",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Infecção Ferida",banca:"UNIRIO",ano:2012,dific:2,tipo:"clínico",
   enunciado:"A infecção bacteriana ativa de uma ferida operatória manifesta-se clinicamente pelos sinais de:",
   alts:{a:"Hipertermia generalizada isolada sem alterações locais.",b:"Secreção purulenta associada a edema, eritema local e dor acentuada.",c:"Dispneia e edema pulmonar.",d:"Eczema descamativo seco."},gabarito:"b",
   resolucao:"Os sinais clássicos flogísticos locais de infecção de sítio cirúrgico incluem a tétrade de Celsus (dor, calor, rubor, tumor) acrescida de exsudato purulento.",
   tags:["infeccao"],fav:false},

  {id:"cir038",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Precauções",banca:"FCC",ano:2017,dific:3,tipo:"procedimento",
   enunciado:"Para fazer o curativo de um paciente com incisão infectada por bactéria multirresistente, o técnico deve adotar precaução por CONTATO, o que inclui:",
   alts:{a:"Usar máscara N95 obrigatoriamente.",b:"Uso de avental de mangas longas e luvas de procedimento, descartando-os logo após o término do procedimento no quarto.",c:"Isolamento em área privativa externa com pressão negativa."},gabarito:"b",
   resolucao:"Bactérias multirresistentes em feridas exigem precaução de contato rígida: paramentação protetora de barreira (luvas e avental) antes do toque e descarte imediato.",
   tags:["biosseguranca"],fav:false},

  {id:"cir039",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Cicatrização",banca:"AVANÇA SP",ano:2022,dific:1,tipo:"memorização",
   enunciado:"Uma ferida cirúrgica limpa cujas bordas lineares foram perfeitamente aproximadas por fios de sutura evolui por cicatrização de:",
   alts:{a:"Primeira intenção.",b:"Segunda intenção.",c:"Terceira intenção.",d:"Quarta intenção."},gabarito:"a",
   resolucao:"Primeira intenção ocorre quando há aproximação mecânica direta das bordas (sutura/grampo), gerando cicatriz fina e rápida com perda tecidual mínima.",
   tags:["feridas"],fav:false},

  {id:"cir040",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Curativo Exsudativo",banca:"FCC",ano:2019,dific:3,tipo:"clínico",
   enunciado:"Paciente com deiscência de esternotomia apresentando grande quantidade de exsudato purulento e forte odor fétido. Qual cobertura é a ideal para conter o líquido e o odor?",
   alts:{a:"Ácidos graxos essenciais (AGE).",b:"Carvão ativado com prata.",c:"Placa de hidrocoloide simples.",d:"Hidrogel amorfo."},gabarito:"b",
   resolucao:"O carvão ativado adsorve o mau odor volátil da ferida, enquanto a prata acoplada exerce ação bactericida direta destruindo a carga microbiana da infecção.",
   tags:["curativo"],fav:false},

  {id:"cir041",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Queimadura Tronco",banca:"CPCON",ano:2017,dific:2,tipo:"cálculo",
   enunciado:"Um paciente adulto sofreu queimadura térmica em todo o tronco posterior (costas completas). Baseado na regra dos nove, qual o percentual atingido?",
   alts:{a:"27%.",b:"9%.",c:"36%.",d:"18%."},gabarito:"d",
   resolucao:"Pela Regra dos Nove de Pulaski-Tennison, o tronco posterior completo (dorso/costas) equivale exatamente a 18% da superfície corporal.",
   tags:["queimadura"],fav:false},

  {id:"cir042",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Coberturas",banca:"CETAP",ano:2010,dific:3,tipo:"conceitual",
   enunciado:"Indique a alternativa INCORRETA relacionada à indicação de coberturas de curativos:",
   alts:{a:"Alginato de cálcio é indicado para feridas altamente exsudativas.",b:"Carvão ativado serve para feridas infectadas com odor.",c:"Hidrocoloide é indicado para feridas com exsudato abundante e purulento durando 7 dias.",d:"Papaína trata feridas com necrose de liquefação ou coagulação.",e:"O filme transparente não deve cobrir feridas infectadas."},gabarito:"c",
   resolucao:"O hidrocoloide satura e gelatiniza rapidamente na presença de pus ou exsudato abundante, sendo contraindicado em feridas altamente infectadas secretivas.",
   tags:["curativo"],fav:false},

  {id:"cir043",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"AGE Curativos",banca:"FCC",ano:2014,dific:2,tipo:"conceitual",
   enunciado:"O uso de Ácidos Graxos Essenciais (AGE/Áleo de Girassol) é indicado pela enfermagem quando a lesão apresenta-se:",
   alts:{a:"Com necrose seca dura.",b:"Altamente infectada secretiva.",c:"Pouco exsudativa, em fase de granulação/epitelização, para manter o leito hidratado.",d:"Com sangramento ativo severo."},gabarito:"c",
   resolucao:"O AGE promove a quimiotaxia, protege a integridade celular nascente e mantém a umidade fisiológica ideal para feridas limpas em fase de granulação.",
   tags:["curativo"],fav:false},

  {id:"cir044",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Estágio Úlceras",banca:"Prefeitura RJ",ano:2016,dific:2,tipo:"memorização",
   enunciado:"Na classificação de lesões por pressão quanto à profundidade, a ferida que apresenta perda total de tecido expondo diretamente músculo, tendão ou estruturas ósseas é de estágio:",
   alts:{a:"IV.",b:"III.",c:"II.",d:"I."},gabarito:"a",
   resolucao:"Estágio IV caracteriza-se pela perda total de tecido com exposição direta ou palpação de estruturas profundas (osso, tendão ou feixes musculares).",
   tags:["feridas"],fav:false},

  {id:"cir045",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Ferida Contusa",banca:"FCC",ano:2018,dific:2,tipo:"conceitual",
   enunciado:"Um homem sofreu ferimento por impacto de objeto rombo. A pele rompeu-se gerando ferida irregular, retraída e com bordas muito traumatizadas. Classifica-se como ferida:",
   alts:{a:"Incisa.",b:"Contusa.",c:"Perfurante.",d:"Penetrante."},gabarito:"b",
   resolucao:"Feridas causadas por objetos rombos (trauma por impacto mecânico sem corte limpo) que esmagam o tecido e rompem a pele são feridas contusas.",
   tags:["feridas"],fav:false},

  {id:"cir046",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Associação Feridas",banca:"FUNDEP",ano:2017,dific:3,tipo:"memorização",
   enunciado:"Associe as colunas de feridas:\n( ) Profundidade não estabelecida visualmente.\n( ) Linear, bordas regulares pouco traumatizadas.\n( ) Irregulares, retraídas bordas muito traumatizadas.",
   alts:{a:"3 - 2 - 4",b:"1 - 2 - 4",c:"4 - 3 - 2"},gabarito:"a",
   resolucao:"3 (Perfurante - profundidade cega), 2 (Incisa - lâmina/corte limpo linear), 4 (Contusa - trauma rombo irregular).",
   tags:["feridas"],fav:false},

  {id:"cir047",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Drenos Cuidados",banca:"IF-PE",ano:2016,dific:3,tipo:"conceitual",
   enunciado:"Sobre os sistemas de drenagem instalados, assinale a afirmativa CORRETA:",
   alts:{a:"Dreno de Penrose é o ideal para tratar pneumotórax.",b:"A troca do selo d'água do dreno de tórax exige pinçamento prévio do tubo para evitar entrada de ar na pleura.",c:"Dreno Penrose funciona por sucção ativa a vácuo."},gabarito:"b",
   resolucao:"Obrigatório pinçar/clampear o dreno de tórax temporariamente durante a troca do líquido do selo d'água para impedir que a pressão negativa intratorácica sugue ar ambiente para o pulmão.",
   tags:["drenos"],fav:false},

  {id:"cir048",materia:"Clínica Cirúrgica",modulo:"Módulo 4: Enfermagem Cirúrgica",assunto:"Identificação Drenos",banca:"IBFC",ano:2016,dific:3,tipo:"clínico",
   enunciado:"A Figura do dreno exibe três modelos: (A) dreno plano aberto com alfinete, (B) dreno em espiral transparente com bolsa de bulbo e (C) dreno tubular acoplado a um foles sanfonado rígido. Nomeie-os respectivamente:",
   alts:{a:"Penrose, Jackson-Pratt e Dreno de sucção sanfonado (Hemovac/Portovac).",b:"Peltzer, Circular e Jackson-Pratt.",c:"Penrose, Sanfonado e Tubular simples."},gabarito:"a",
   resolucao:"Dreno A é o Penrose (lates aberto passivo fixado com alfinete). Dreno B é o Jackson-Pratt (sucção por bulbo de pressão negativa). Dreno C é o Hemovac/Portovac (sanfona de grande volume para cirurgias ortopédicas).",
   tags:["drenos"],fav:false},

  // ── MÓDULO: CLÍNICA MÉDICA ──────────────────────
  {id:"med001",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Arteriosclerose",banca:"ESA",ano:2014,dific:2,tipo:"memorização",
   enunciado:"A arteriosclerose é uma doença manifestada pela perda de elasticidade vascular. Qual o tipo mais comum e prevalente de Arteriosclerose?",
