<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Questões — ESA Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #111318;
  --bg3: #181c24;
  --bg4: #1e2330;
  --border: #2a3040;
  --border2: #3a4255;
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #5a6275;
  --accent: #4f9cf9;
  --accent2: #3b82f6;
  --green: #34d399;
  --green2: #10b981;
  --red: #f87171;
  --red2: #ef4444;
  --amber: #fbbf24;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --r: 8px;
  --r2: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOP NAV */
#topnav {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  height: 52px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-right: 32px;
  white-space: nowrap;
}
.logo span { color: var(--accent); }

.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  border-radius: var(--r);
  transition: all 0.15s;
  font-family: var(--font);
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { color: var(--accent); background: rgba(79,156,249,0.1); }

.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.stat-pill {
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.stat-pill b { color: var(--text); font-weight: 600; }

/* MAIN LAYOUT */
#app { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.sidebar-section { padding: 0 12px 12px; }
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 4px 6px;
}

.filter-group { display: flex; flex-direction: column; gap: 2px; }
.filter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: var(--r);
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  transition: all 0.12s;
}
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: rgba(79,156,249,0.12); color: var(--accent); }
.filter-btn .count {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  background: var(--bg3);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 24px;
  text-align: center;
}
.filter-btn.active .count { background: rgba(79,156,249,0.2); color: var(--accent); }

.sidebar-divider { height: 1px; background: var(--border); margin: 4px 12px 8px; }

/* MAIN CONTENT */
#main { flex: 1; overflow-y: auto; }

/* PANEL: BROWSE */
#panel-browse {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
#search-input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text3); }

.select-filter {
  padding: 7px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text2);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  outline: none;
}
.select-filter:focus { border-color: var(--accent); }
.select-filter option { background: var(--bg3); }

.btn {
  padding: 7px 14px;
  border-radius: var(--r);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.btn-ghost { background: none; color: var(--text2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-green { background: var(--green2); border-color: var(--green2); color: #fff; }
.btn-green:hover { background: #059669; }

#results-info {
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

#questions-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* QUESTION CARD */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.q-card:hover { border-color: var(--border2); background: var(--bg3); }
.q-card.expanded { border-color: var(--accent); }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.q-num {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 2px;
  min-width: 38px;
}

.q-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.tag-banca { background: rgba(79,156,249,0.15); color: var(--accent); border: 1px solid rgba(79,156,249,0.3); }
.tag-ano { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.tag-materia { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
.tag-dif-1, .tag-dif-2 { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.tag-dif-3 { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.tag-dif-4, .tag-dif-5 { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

.q-actions { display: flex; gap: 4px; flex-shrink: 0; }
.q-action-btn {
  padding: 3px 7px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  border-radius: 4px;
  transition: background 0.12s;
  color: var(--text3);
}
.q-action-btn:hover { background: var(--bg4); color: var(--text); }
.q-action-btn.fav.active { color: var(--amber); }
.q-action-btn.errada.active { color: var(--red); }

.q-enunciado {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 0;
}

.q-alternativas {
  display: none;
  margin-top: 14px;
  flex-direction: column;
  gap: 6px;
}
.q-card.expanded .q-alternativas { display: flex; }

.alt-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  transition: all 0.15s;
  width: 100%;
}
.alt-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.alt-btn.selected-correct { background: rgba(52,211,153,0.1); border-color: var(--green); color: var(--green); }
.alt-btn.selected-wrong { background: rgba(248,113,113,0.1); border-color: var(--red); color: var(--red); }
.alt-btn.show-correct { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.4); color: var(--green); }
.alt-btn:disabled { cursor: default; }

.alt-letra {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  width: 18px;
  flex-shrink: 0;
  margin-top: 1px;
}

.q-gabarito {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.25);
  border-radius: var(--r);
  font-size: 12px;
  color: var(--green);
  font-family: var(--mono);
}
.q-card.revealed .q-gabarito { display: block; }

/* PANEL: SIMULADO */
#panel-simulado {
  padding: 24px;
  max-width: 800px;
}

.sim-config {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 24px;
  margin-bottom: 20px;
}

.sim-config h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
.sim-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.sim-label { font-size: 13px; color: var(--text2); min-width: 120px; }

.sim-active { display: flex; flex-direction: column; gap: 12px; }
.sim-progress-bar {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}
.sim-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.sim-counter { font-size: 12px; font-family: var(--mono); color: var(--text3); }
.sim-q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 20px;
}
.sim-q-enunciado { font-size: 15px; line-height: 1.65; margin-bottom: 16px; }
.sim-nav { display: flex; gap: 10px; margin-top: 16px; justify-content: space-between; align-items: center; }

/* PANEL: STATS */
#panel-stats { padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px;
}
.stat-card .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.stat-card .stat-value { font-size: 28px; font-weight: 600; font-family: var(--mono); color: var(--text); }
.stat-card .stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

.materia-stats { display: flex; flex-direction: column; gap: 8px; }
.materia-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; }
.materia-row-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
.materia-name { font-size: 13px; font-weight: 500; }
.materia-pct { font-family: var(--mono); font-size: 13px; }
.materia-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.materia-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* PANEL: ERROS */
#panel-erros { display: flex; flex-direction: column; height: 100%; }

/* EMPTY STATE */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  text-align: center;
  gap: 8px;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 680px) {
  #sidebar { display: none; }
  .toolbar { padding: 10px 12px; }
  #questions-list { padding: 10px 12px; }
}

/* Animations */
.q-card { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.panel { display: none; }
.panel.active { display: block; }
#panel-browse.active { display: flex; }
#panel-erros.active { display: flex; }
</style>
</head>
<body>

<nav id="topnav">
  <div class="logo">ESA <span>SAÚDE</span> · BANCO</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('browse')">Questões</button>
    <button class="nav-tab" onclick="showPanel('simulado')">Simulado</button>
    <button class="nav-tab" onclick="showPanel('erros')">Meus Erros</button>
    <button class="nav-tab" onclick="showPanel('stats')">Estatísticas</button>
  </div>
  <div class="nav-right">
    <div class="stat-pill" id="pill-total">Total: <b>0</b></div>
    <div class="stat-pill" id="pill-acerto" style="color: var(--green2)">Acertos: <b id="pct-acerto">—</b></div>
  </div>
</nav>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Matéria</div>
      <div class="filter-group" id="filter-materia">
        <button class="filter-btn active" data-materia="" onclick="setFilter('materia','',this)">
          Todas <span class="count" id="cnt-all">0</span>
        </button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Banca</div>
      <div class="filter-group" id="filter-banca">
        <button class="filter-btn active" data-banca="" onclick="setFilter('banca','',this)">
          Todas <span class="count">—</span>
        </button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Dificuldade</div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setFilter('dific','',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('dific','1',this)">⬤ Fácil</button>
        <button class="filter-btn" onclick="setFilter('dific','2',this)">⬤ Médio-fácil</button>
        <button class="filter-btn" onclick="setFilter('dific','3',this)">⬤ Médio</button>
        <button class="filter-btn" onclick="setFilter('dific','4',this)">⬤ Difícil</button>
        <button class="filter-btn" onclick="setFilter('dific','5',this)">⬤ Muito difícil</button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Coleções</div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setFilter('especial','favoritas',this)">⭐ Favoritas</button>
        <button class="filter-btn" onclick="setFilter('especial','erradas',this)">✗ Mais erradas</button>
        <button class="filter-btn" onclick="setFilter('especial','naorespond',this)">◯ Não respondidas</button>
      </div>
    </div>
  </div>

  <!-- PANELS -->
  <div id="main">

    <!-- BROWSE -->
    <div id="panel-browse" class="panel active">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Buscar no enunciado ou tags..." oninput="renderList()">
        </div>
        <select class="select-filter" id="sort-select" onchange="renderList()">
          <option value="default">Ordem padrão</option>
          <option value="banca">Por banca</option>
          <option value="ano">Mais recentes</option>
          <option value="dific">Por dificuldade</option>
          <option value="erros">Mais erradas</option>
        </select>
        <button class="btn btn-ghost" onclick="expandAll()">Expandir tudo</button>
        <button class="btn btn-green" onclick="startSimuladoRapido()">▶ Simulado rápido</button>
      </div>
      <div id="results-info">0 questões</div>
      <div id="questions-list"></div>
    </div>

    <!-- SIMULADO -->
    <div id="panel-simulado" class="panel">
      <div id="sim-setup">
        <div class="sim-config">
          <h2>⚡ Configurar Simulado</h2>
          <div class="sim-row">
            <span class="sim-label">Qtd. questões</span>
            <select class="select-filter" id="sim-qtd">
              <option value="5">5 questões</option>
              <option value="10" selected>10 questões</option>
              <option value="20">20 questões</option>
              <option value="30">30 questões</option>
              <option value="999">Todas</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Matéria</span>
            <select class="select-filter" id="sim-materia">
              <option value="">Todas as matérias</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Banca</span>
            <select class="select-filter" id="sim-banca">
              <option value="">Todas as bancas</option>
            </select>
          </div>
          <div class="sim-row">
            <span class="sim-label">Modo</span>
            <select class="select-filter" id="sim-modo">
              <option value="normal">Normal (gabarito ao final)</option>
              <option value="imediato">Imediato (corrige na hora)</option>
            </select>
          </div>
          <div class="sim-row" style="margin-top:16px;">
            <button class="btn btn-primary" onclick="startSimulado()" style="padding: 10px 24px; font-size: 14px;">Iniciar Simulado</button>
          </div>
        </div>
      </div>
      <div id="sim-running" style="display:none;" class="sim-active">
        <div class="sim-config" style="padding:16px;">
          <div class="sim-counter" id="sim-counter-text">Questão 1 de 10</div>
          <div class="sim-progress-bar" style="margin-top:8px;">
            <div class="sim-progress-fill" id="sim-progress-fill" style="width:10%"></div>
          </div>
        </div>
        <div class="sim-q-card" id="sim-q-display"></div>
        <div style="display:flex; gap:10px; padding: 0;">
          <button class="btn btn-ghost" onclick="simAnterior()" id="sim-btn-ant">← Anterior</button>
          <div style="flex:1;display:flex;gap:10px;justify-content:flex-end;">
            <button class="btn btn-ghost" onclick="simPularQ()" id="sim-btn-pular">Pular →</button>
            <button class="btn btn-primary" onclick="simProximo()" id="sim-btn-prox">Próxima →</button>
            <button class="btn btn-green" onclick="simFinalizar()" id="sim-btn-fin" style="display:none">Finalizar</button>
          </div>
        </div>
      </div>
      <div id="sim-resultado" style="display:none;"></div>
    </div>

    <!-- ERROS -->
    <div id="panel-erros" class="panel">
      <div class="toolbar">
        <span style="font-size:14px; color:var(--text2);">Questões que você mais erra</span>
        <button class="btn btn-ghost" style="margin-left:auto" onclick="clearHistory()">Limpar histórico</button>
      </div>
      <div id="results-info-erros" class="" style="padding:8px 20px; font-size:12px; color:var(--text3); font-family:var(--mono); border-bottom:1px solid var(--border);">0 questões com erros</div>
      <div id="erros-list" style="flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <!-- STATS -->
    <div id="panel-stats" class="panel">
      <div id="stats-content" style="padding:24px; max-width:800px;"></div>
    </div>

  </div>
</div>

<script>
// =====================================================
// BANCO DE DADOS — 60 questões reais dos PDFs
// =====================================================
const DB = [
  // ── ÉTICA PROFISSIONAL ──────────────────────────
  {id:"e001",materia:"Ética Profissional",assunto:"Princípios Bioéticos",banca:"IBFC",ano:2016,dific:2,tipo:"memorização",
   enunciado:"Não é um dos princípios fundamentais da Bioética a:",
   alts:{a:"Humanização",b:"Não maleficência",c:"Justiça",d:"Autonomia",e:"Beneficência"},gabarito:"a",
   tags:["bioetica","principios","cofen"],fav:false},

  {id:"e002",materia:"Ética Profissional",assunto:"Princípios Bioéticos",banca:"IBFC",ano:2013,dific:2,tipo:"conceitual",

let state = {
  filters: { materia: '', banca: '', dific: '', especial: '' },
  historico: JSON.parse(localStorage.getItem('hist') || '{}'),
  favoritas: JSON.parse(localStorage.getItem('favs') || '[]'),
  sim: { questions: [], current: 0, respostas: {}, modo: 'normal' },
  expandedAll: false
};

// =====================================================
// INIT
// =====================================================
function init() {
  buildSidebar();
  renderList();
  renderStats();
  renderErros();
  updatePills();
}

function buildSidebar() {
  const materias = [...new Set(DB.map(q => q.materia))];
  const bancas = [...new Set(DB.map(q => q.banca))];

  const fm = document.getElementById('filter-materia');
  document.getElementById('cnt-all').textContent = DB.length;
  materias.forEach(m => {
    const cnt = DB.filter(q => q.materia === m).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.materia = m;
    btn.innerHTML = `${m} <span class="count">${cnt}</span>`;
    btn.onclick = () => setFilter('materia', m, btn);
    fm.appendChild(btn);
  });

  const fb = document.getElementById('filter-banca');
  const fb2 = document.getElementById('sim-banca');
  const fm2 = document.getElementById('sim-materia');
  bancas.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerHTML = `${b} <span class="count">${DB.filter(q=>q.banca===b).length}</span>`;
    btn.onclick = () => setFilter('banca', b, btn);
    fb.appendChild(btn);
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    fb2.appendChild(opt);
  });
  materias.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    fm2.appendChild(opt);
  });
}

// =====================================================
// FILTER & RENDER
// =====================================================
function setFilter(type, val, el) {
  state.filters[type] = val;
  if (type === 'especial') {
    ['materia','banca','dific'].forEach(k => state.filters[k] = '');
  } else {
    state.filters.especial = '';
  }
  // update active buttons in sidebar
  const parent = el.closest('.filter-group, .sidebar-section');
  if (parent) parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function getFiltered() {
  let qs = [...DB];
  const {materia, banca, dific, especial} = state.filters;

  if (especial === 'favoritas') qs = qs.filter(q => state.favoritas.includes(q.id));
  else if (especial === 'erradas') qs = qs.filter(q => (state.historico[q.id]?.erros||0) > 0).sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));
  else if (especial === 'naorespond') qs = qs.filter(q => !state.historico[q.id]);
  else {
    if (materia) qs = qs.filter(q => q.materia === materia);
    if (banca) qs = qs.filter(q => q.banca === banca);
    if (dific) qs = qs.filter(q => q.dific == dific);
  }

  const search = document.getElementById('search-input').value.toLowerCase();
  if (search) qs = qs.filter(q => q.enunciado.toLowerCase().includes(search) || (q.tags||[]).join(' ').includes(search) || q.assunto.toLowerCase().includes(search));

  const sort = document.getElementById('sort-select')?.value || 'default';
  if (sort === 'banca') qs.sort((a,b) => a.banca.localeCompare(b.banca));
  else if (sort === 'ano') qs.sort((a,b) => b.ano - a.ano);
  else if (sort === 'dific') qs.sort((a,b) => b.dific - a.dific);
  else if (sort === 'erros') qs.sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));

  return qs;
}

let globalIndex = 0;
function renderList() {
  const qs = getFiltered();
  const list = document.getElementById('questions-list');
  const info = document.getElementById('results-info');
  info.textContent = `${qs.length} questão${qs.length !== 1 ? 'ões' : ''} encontrada${qs.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';
  globalIndex = 0;
  qs.forEach((q, i) => list.appendChild(buildCard(q, i+1)));
  updatePills();
}

function difLabel(d) {
  return ['','Fácil','Médio-Fácil','Médio','Difícil','Muito Difícil'][d] || '';
}

function buildCard(q, num) {
  const hist = state.historico[q.id] || {};
  const isFav = state.favoritas.includes(q.id);
  const hasErr = (hist.erros || 0) > 0;

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${q.id}`;

  const bancaClass = `tag tag-banca`;
  const difClass = `tag tag-dif-${q.dific}`;

  let statsHtml = '';
  if (hist.total) {
    const pct = Math.round((hist.acertos / hist.total) * 100);
    statsHtml = `<span class="tag" style="background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border)">${hist.acertos}/${hist.total} (${pct}%)</span>`;
  }

  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">#${String(num).padStart(3,'0')}</span>
      <div class="q-meta">
        <span class="${bancaClass}">${q.banca} ${q.ano}</span>
        <span class="tag tag-materia">${q.materia}</span>
        <span class="${difClass}">${difLabel(q.dific)}</span>
        ${statsHtml}
      </div>
      <div class="q-actions">
        <button class="q-action-btn fav ${isFav?'active':''}" title="Favoritar" onclick="toggleFav('${q.id}',event)">⭐</button>
        ${hasErr ? `<span class="q-action-btn errada active" title="Questão com erros">✗</span>` : ''}
      </div>
    </div>
    <div class="q-enunciado">${q.enunciado}</div>
    <div class="q-alternativas" id="alts-${q.id}">
      ${Object.entries(q.alts).map(([k,v]) => `
        <button class="alt-btn" id="alt-${q.id}-${k}" onclick="responder('${q.id}','${k}')">
          <span class="alt-letra">${k.toUpperCase()})</span>
          <span>${v}</span>
        </button>`).join('')}
    </div>
    <div class="q-gabarito" id="gab-${q.id}">✓ Resposta correta: <strong>${q.gabarito.toUpperCase()}) ${q.alts[q.gabarito]}</strong></div>
  `;

  card.addEventListener('click', (e) => {
    if (e.target.closest('.q-action-btn') || e.target.closest('.alt-btn')) return;
    card.classList.toggle('expanded');
  });

  return card;
}

function responder(qid, escolha) {
  const q = DB.find(x => x.id === qid);
  const card = document.getElementById(`card-${qid}`);
  card.classList.add('expanded', 'revealed');

  const alts = Object.keys(q.alts);
  alts.forEach(k => {
    const btn = document.getElementById(`alt-${qid}-${k}`);
    btn.disabled = true;
    if (k === q.gabarito) btn.classList.add('show-correct');
  });

  const escolhidoBtn = document.getElementById(`alt-${qid}-${escolha}`);
  if (escolha === q.gabarito) {
    escolhidoBtn.classList.add('selected-correct');
    registrarHistorico(qid, true);
  } else {
    escolhidoBtn.classList.add('selected-wrong');
    registrarHistorico(qid, false);
  }
  renderErros();
  updatePills();
}

// =====================================================
// HISTÓRICO
// =====================================================
function registrarHistorico(qid, acertou) {
  if (!state.historico[qid]) state.historico[qid] = {total:0, acertos:0, erros:0};
  state.historico[qid].total++;
  if (acertou) state.historico[qid].acertos++;
  else state.historico[qid].erros++;
  saveHistorico();
}

function saveHistorico() {
  try { localStorage.setItem('hist', JSON.stringify(state.historico)); } catch(e){}
}

function clearHistory() {
  if (!confirm('Limpar todo o histórico de respostas?')) return;
  state.historico = {};
  saveHistorico();
  renderErros();
  renderStats();
  updatePills();
}

function toggleFav(qid, e) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const idx = state.favoritas.indexOf(qid);
  if (idx === -1) { state.favoritas.push(qid); btn.classList.add('active'); }
  else { state.favoritas.splice(idx,1); btn.classList.remove('active'); }
  try { localStorage.setItem('favs', JSON.stringify(state.favoritas)); } catch(e){}
}

  const modo = document.getElementById('sim-modo').value;

  let pool = [...DB];
  if (mat) pool = pool.filter(q => q.materia === mat);
  if (ban) pool = pool.filter(q => q.banca === ban);

  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  state.sim.questions = pool.slice(0, Math.min(qtd, pool.length));
  state.sim.current = 0;
  state.sim.respostas = {};
  state.sim.modo = modo;

  document.getElementById('sim-setup').style.display = 'none';
  document.getElementById('sim-running').style.display = 'flex';
  document.getElementById('sim-resultado').style.display = 'none';
  renderSimQ();
}

function renderSimQ() {
  const {questions, current, respostas, modo} = state.sim;
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round(((current + 1) / total) * 100);

  document.getElementById('sim-counter-text').textContent = `Questão ${current+1} de ${total}`;
  document.getElementById('sim-progress-fill').style.width = pct + '%';

  const respostaAtual = respostas[q.id];
  const revealed = respostaAtual && modo === 'imediato';

  let altsHtml = Object.entries(q.alts).map(([k,v]) => {
    let cls = 'alt-btn';
    let dis = '';
    if (revealed) {
      dis = 'disabled';
      if (k === q.gabarito) cls += ' show-correct';
      if (k === respostaAtual && respostaAtual !== q.gabarito) cls += ' selected-wrong';
    } else if (k === respostaAtual) {
      cls += ' selected-correct';
    }
    return `<button class="${cls}" ${dis} onclick="simResponder('${q.id}','${k}')">
      <span class="alt-letra">${k.toUpperCase()})</span><span>${v}</span></button>`;
  }).join('');

  let gabHtml = '';
  if (revealed) {
    const acertou = respostaAtual === q.gabarito;
    gabHtml = `<div style="margin-top:12px;padding:10px 14px;border-radius:8px;font-size:12px;font-family:var(--mono);
      background:${acertou ? 'rgba(52,211,153,0.08)' : 'rgba(248,113,113,0.08)'};
      border:1px solid ${acertou ? 'rgba(52,211,153,0.3)' : 'rgba(248,113,113,0.3)'};
      color:${acertou ? 'var(--green)' : 'var(--red)'}">
      ${acertou ? '✓ Correto!' : `✗ Errou — Resposta: ${q.gabarito.toUpperCase()}) ${q.alts[q.gabarito]}`}
    </div>`;
  }

  document.getElementById('sim-q-display').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <span class="tag tag-banca">${q.banca} ${q.ano}</span>
      <span class="tag tag-materia">${q.materia}</span>
    </div>
    <div class="sim-q-enunciado">${q.enunciado}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">${altsHtml}</div>
    ${gabHtml}
  `;

  const isLast = current === total - 1;
  document.getElementById('sim-btn-ant').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('sim-btn-prox').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('sim-btn-fin').style.display = isLast ? 'inline-block' : 'none';
}

function simResponder(qid, escolha) {
  state.sim.respostas[qid] = escolha;
  const q = DB.find(x => x.id === qid);
  if (state.sim.modo === 'imediato') {
    registrarHistorico(qid, escolha === q.gabarito);
    renderSimQ();
  } else {
    renderSimQ();
  }
}

function simProximo() { state.sim.current++; renderSimQ(); }
function simAnterior() { state.sim.current--; renderSimQ(); }
function simPularQ() { state.sim.current = Math.min(state.sim.current + 1, state.sim.questions.length - 1); renderSimQ(); }

function simFinalizar() {
  const {questions, respostas, modo} = state.sim;
  let acertos = 0;
  questions.forEach(q => {
    const resp = respostas[q.id];
    if (resp) {
      const ok = resp === q.gabarito;
      if (ok) acertos++;
      if (modo !== 'imediato') registrarHistorico(q.id, ok);
    }
  });

  const total = questions.length;
  const respondidas = Object.keys(respostas).length;
  const pct = respondidas > 0 ? Math.round((acertos / respondidas) * 100) : 0;

  document.getElementById('sim-running').style.display = 'none';
  const res = document.getElementById('sim-resultado');
  res.style.display = 'block';

  let cor = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
  let msg = pct >= 70 ? '✓ Ótimo resultado!' : pct >= 50 ? '▲ Continue estudando!' : '✗ Precisa reforçar!';

  let gabaHtml = questions.map(q => {
    const resp = respostas[q.id];
    const ok = resp === q.gabarito;
    const cor = !resp ? 'var(--text3)' : ok ? 'var(--green)' : 'var(--red)';
    const icon = !resp ? '○' : ok ? '✓' : '✗';
    return `<div style="padding:8px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span style="color:${cor};font-size:14px;">${icon}</span>
        <span class="tag tag-banca" style="font-size:10px;">${q.banca} ${q.ano}</span>
        <span style="font-size:12px;color:var(--text3);">${q.materia}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">${q.enunciado.substring(0,100)}...</div>
      <div style="font-size:11px;font-family:var(--mono);color:${cor};">
        ${!resp ? 'Não respondida' : ok ? `Correto: ${q.gabarito.toUpperCase()})` : `Você: ${resp.toUpperCase()}) | Correto: ${q.gabarito.toUpperCase()})`}
      </div>
    </div>`;
  }).join('');

  res.innerHTML = `<div class="sim-config">
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:56px;font-family:var(--mono);font-weight:700;color:${cor};">${pct}%</div>
      <div style="font-size:18px;color:${cor};margin:4px 0;">${msg}</div>
      <div style="font-size:14px;color:var(--text2);margin-top:8px;">${acertos} acertos de ${respondidas} respondidas (${total} total)</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;">
      <button class="btn btn-primary" onclick="startSimulado()">Novo Simulado</button>
      <button class="btn btn-ghost" onclick="resetSimSetup()">Configurar</button>
    </div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;">Gabarito detalhado</div>
    ${gabaHtml}
  </div>`;

  renderStats();
  renderErros();
  updatePills();
}

function resetSimSetup() {
  document.getElementById('sim-setup').style.display = 'block';
  document.getElementById('sim-resultado').style.display = 'none';
}

// =====================================================
// ESTATÍSTICAS
// =====================================================
function renderStats() {
  const hist = state.historico;
  const qids = Object.keys(hist);
  const totalResp = qids.reduce((s,id) => s + (hist[id].total||0), 0);
  const totalAcertos = qids.reduce((s,id) => s + (hist[id].acertos||0), 0);
  const pctGeral = totalResp > 0 ? Math.round((totalAcertos/totalResp)*100) : 0;
  const respondidas = qids.length;

  const materias = [...new Set(DB.map(q => q.materia))];
  const matStats = materias.map(m => {
    const qsMat = DB.filter(q => q.materia === m);
    let tot = 0, ac = 0;
    qsMat.forEach(q => { if(hist[q.id]) { tot += hist[q.id].total; ac += hist[q.id].acertos; }});
    return { m, tot, ac, pct: tot > 0 ? Math.round((ac/tot)*100) : null, total_q: qsMat.length };
  }).filter(x => x.tot > 0).sort((a,b) => (a.pct||0)-(b.pct||0));

  const container = document.getElementById('stats-content');
  const cores = ['var(--red)','var(--amber)','var(--green)','var(--teal)'];

  container.innerHTML = `
    <h2 style="font-size:16px;font-weight:500;margin-bottom:16px;">Desempenho geral</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total de questões</div>
        <div class="stat-value">${DB.length}</div>
        <div class="stat-sub">${respondidas} respondidas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Taxa de acerto</div>
        <div class="stat-value" style="color:${pctGeral>=70?'var(--green)':pctGeral>=50?'var(--amber)':'var(--red)'};">${pctGeral}%</div>
        <div class="stat-sub">${totalAcertos} de ${totalResp} tentativas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Favoritas</div>
        <div class="stat-value" style="color:var(--amber);">${state.favoritas.length}</div>
        <div class="stat-sub">questões salvas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Com erros</div>
        <div class="stat-value" style="color:var(--red);">${qids.filter(id=>hist[id].erros>0).length}</div>
        <div class="stat-sub">precisam revisão</div>
      </div>
    </div>

    ${matStats.length > 0 ? `
    <h2 style="font-size:16px;font-weight:500;margin:20px 0 12px;">Por matéria</h2>
    <div class="materia-stats">
      ${matStats.map((s,i) => {
        const cor = s.pct < 50 ? cores[0] : s.pct < 70 ? cores[1] : cores[2];
        return `<div class="materia-row">
          <div class="materia-row-header">
            <span class="materia-name">${s.m}</span>
            <span class="materia-pct" style="color:${cor};">${s.pct}% (${s.ac}/${s.tot})</span>
          </div>
          <div class="materia-bar"><div class="materia-bar-fill" style="width:${s.pct}%;background:${cor};"></div></div>
        </div>`;
      }).join('')}
    </div>` : `<div class="empty-state"><div class="empty-icon">📊</div><p>Responda questões para ver suas estatísticas por matéria.</p></div>`}
  `;
}

// =====================================================
// ERROS
// =====================================================
function renderErros() {
  const erradas = DB.filter(q => (state.historico[q.id]?.erros||0) > 0)
    .sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));

  document.getElementById('results-info-erros').textContent = `${erradas.length} questões com erros`;
  const list = document.getElementById('erros-list');
  list.innerHTML = '';

  if (erradas.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div><p>Nenhum erro registrado ainda.<br>Responda questões para ver os erros aqui.</p></div>`;
    return;
  }
  erradas.forEach((q,i) => list.appendChild(buildCard(q, i+1)));
}

// =====================================================
// UTILS
// =====================================================
function updatePills() {
  const hist = state.historico;
  const qids = Object.keys(hist);
  const totalResp = qids.reduce((s,id) => s + (hist[id].total||0), 0);
  const totalAcertos = qids.reduce((s,id) => s + (hist[id].acertos||0), 0);
  const pct = totalResp > 0 ? Math.round((totalAcertos/totalResp)*100) : null;

  document.getElementById('pill-total').innerHTML = `Total: <b>${DB.length}</b>`;
  document.getElementById('pct-acerto').textContent = pct !== null ? `${pct}%` : '—';
}

function expandAll() {
  state.expandedAll = !state.expandedAll;
  document.querySelectorAll('.q-card').forEach(c => {
    if (state.expandedAll) c.classList.add('expanded');
    else c.classList.remove('expanded');
  });
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  const names = ['browse','simulado','erros','stats'];
  tabs[names.indexOf(name)]?.classList.add('active');

  if (name === 'stats') renderStats();
  if (name === 'erros') renderErros();
}

// Start
init();
</script>
</body>
</html>
