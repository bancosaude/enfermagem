<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ESA Saúde — Plataforma de Estudos | Banco de Questões</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ========== RESET E VARIÁVEIS ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-tertiary: #f1f5f9; --bg-sidebar: #ffffff;
  --text-primary: #0f172a; --text-secondary: #475569; --text-tertiary: #64748b;
  --border-light: #e2e8f0; --border-medium: #cbd5e1;
  --accent-primary: #3b82f6; --accent-primary-hover: #2563eb;
  --accent-success: #10b981; --accent-success-light: #d1fae5;
  --accent-error: #ef4444; --accent-error-light: #fee2e2;
  --accent-warning: #f59e0b; --accent-warning-light: #fef3c7;
  --accent-purple: #8b5cf6;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1); --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --transition-fast: 150ms ease; --transition-normal: 250ms ease;
}
[data-theme="dark"] {
  --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155; --bg-sidebar: #1e293b;
  --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-tertiary: #94a3b8;
  --border-light: #334155; --border-medium: #475569;
}
body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background var(--transition-fast); }

/* ========== HEADER ========== */
.header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 100; padding: 0 24px; backdrop-filter: blur(10px); }
.header-top { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo span { background: none; -webkit-text-fill-color: var(--accent-primary); }
.nav-tabs { display: flex; gap: 4px; background: var(--bg-tertiary); padding: 4px; border-radius: 60px; }
.nav-tab { padding: 8px 20px; font-size: 14px; font-weight: 500; border: none; background: transparent; cursor: pointer; border-radius: 40px; color: var(--text-secondary); transition: all var(--transition-fast); }
.nav-tab:hover { color: var(--text-primary); background: var(--bg-secondary); }
.nav-tab.active { background: var(--accent-primary); color: white; box-shadow: var(--shadow-sm); }
.stats-header { display: flex; gap: 20px; align-items: center; }
.stat-badge { font-size: 12px; font-weight: 500; padding: 6px 14px; background: var(--bg-tertiary); border-radius: 40px; color: var(--text-secondary); }
.stat-badge strong { color: var(--text-primary); font-weight: 700; }
.theme-toggle { background: var(--bg-tertiary); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; color: var(--text-secondary); transition: all var(--transition-fast); }
.theme-toggle:hover { background: var(--border-light); color: var(--text-primary); }

/* ========== LAYOUT PRINCIPAL ========== */
.app { display: flex; min-height: calc(100vh - 65px); }

/* SISTEMA DE ABAS BLINDADO */
.panel { display: none; animation: fadeIn 0.3s ease; }

/* ========== SIDEBAR ========== */
.sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border-light); padding: 24px 0; overflow-y: auto; flex-shrink: 0; position: sticky; top: 65px; height: calc(100vh - 65px); }
.filter-section { padding: 0 20px 24px; border-bottom: 1px solid var(--border-light); }
.filter-section:last-child { border-bottom: none; }
.filter-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.filter-list { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
.filter-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all var(--transition-fast); }
.filter-item:hover { background: var(--bg-tertiary); transform: translateX(2px); }
.filter-item.active { background: var(--accent-primary); color: white; }
.filter-item.active .count { background: rgba(255,255,255,0.2); color: white; }
.filter-item .count { font-size: 11px; font-weight: 600; color: var(--text-tertiary); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 30px; min-width: 32px; text-align: center; }
.filter-reset { margin: 16px 20px 0; padding: 10px; background: var(--bg-tertiary); border-radius: var(--radius-sm); text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-tertiary); transition: all var(--transition-fast); }
.filter-reset:hover { background: var(--accent-error-light); color: var(--accent-error); }

/* ========== MAIN CONTENT ========== */
.main-content { flex: 1; overflow-y: auto; padding: 28px 32px; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
.results-info { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
.results-info strong { color: var(--text-primary); font-size: 18px; margin-right: 4px; }
.toolbar-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ========== BOTÕES ========== */
.btn { padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-light); background: var(--bg-secondary); color: var(--text-secondary); transition: all var(--transition-fast); display: inline-flex; align-items: center; gap: 8px; }
.btn:hover { background: var(--bg-tertiary); border-color: var(--border-medium); transform: translateY(-1px); }
.btn-primary { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
.btn-primary:hover { background: var(--accent-primary-hover); transform: translateY(-1px); }
.btn-outline { border-color: var(--border-medium); background: transparent; }
.btn-outline:hover { background: var(--bg-tertiary); }

/* ========== SEARCH ========== */
.search-wrapper { position: relative; }
.search-input { padding: 9px 16px 9px 40px; border: 1px solid var(--border-light); border-radius: 40px; background: var(--bg-secondary); color: var(--text-primary); width: 260px; font-size: 13px; transition: all var(--transition-fast); }
.search-input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 14px; }

/* ========== QUESTION CARD ========== */
.question-card { background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-light); margin-bottom: 20px; overflow: hidden; transition: all var(--transition-normal); }
.question-card:hover { border-color: var(--border-medium); box-shadow: var(--shadow-md); transform: translateY(-2px); }
.question-card.answered { border-left: 4px solid var(--accent-success); }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border-light); flex-wrap: wrap; gap: 12px; }
.badges { display: flex; gap: 10px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 30px; background: var(--bg-secondary); border: 1px solid var(--border-light); letter-spacing: 0.3px; }
.badge-banca { background: #eef2ff; border-color: #c7d2fe; color: #4338ca; }
[data-theme="dark"] .badge-banca { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
.badge-materia { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
[data-theme="dark"] .badge-materia { background: #064e3b; border-color: #10b981; color: #6ee7b7; }
.badge-dificil { background: #fef3c7; border-color: #fde68a; color: #92400e; }
.badge-muito-dificil { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
.badge-answered { background: #d1fae5; color: #065f46; border-color: #a7f3d0; }
.card-actions { display: flex; gap: 8px; }
.icon-btn { background: none; border: none; width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text-tertiary); transition: all var(--transition-fast); display: inline-flex; align-items: center; justify-content: center; }
.icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); transform: scale(1.05); }
.icon-btn.fav.active { color: #f59e0b; }
.card-body { padding: 24px; }
.question-text { font-size: 16px; line-height: 1.6; font-weight: 500; margin-bottom: 24px; color: var(--text-primary); }
.alternatives { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.alt-item { display: flex; align-items: flex-start; gap: 14px; padding: 12px 16px; border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-fast); border: 1px solid var(--border-light); background: var(--bg-secondary); }
.alt-item:hover:not(.disabled) { background: var(--bg-tertiary); border-color: var(--accent-primary); transform: translateX(4px); }
.alt-item.disabled { cursor: default; opacity: 0.8; }
.alt-item.selected-correct { background: var(--accent-success-light); border-color: var(--accent-success); }
.alt-item.selected-wrong { background: var(--accent-error-light); border-color: var(--accent-error); }
.alt-item.correct-answer { background: var(--accent-success-light); border-color: var(--accent-success); }
.alt-letter { font-weight: 800; min-width: 32px; font-size: 14px; color: var(--accent-primary); }
.alt-text { flex: 1; font-size: 14px; line-height: 1.5; }
.resolution-box { margin-top: 20px; padding: 20px; background: var(--bg-tertiary); border-radius: var(--radius-md); border-left: 4px solid var(--accent-primary); display: none; }
.resolution-box.show { display: block; animation: fadeIn 0.3s ease; }
.resolution-title { font-size: 13px; font-weight: 700; color: var(--accent-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.resolution-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* ========== ANIMAÇÕES ========== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }
.confetti-particle { position: fixed; pointer-events: none; z-index: 1000; animation: confetti 1s ease-out forwards; }
.toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent-success); color: white; padding: 12px 24px; border-radius: 60px; font-weight: 600; font-size: 14px; z-index: 1000; animation: fadeIn 0.3s ease; box-shadow: var(--shadow-lg); }

/* ========== SIMULADO ========== */
.sim-config-card { background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-light); padding: 28px; }
.sim-progress { margin-bottom: 24px; }
.progress-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent-primary); border-radius: 3px; transition: width 0.3s ease; }
.sim-nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }

/* ========== ESTATÍSTICAS ========== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
.stat-card { background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 20px; transition: all var(--transition-fast); }
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-value { font-size: 36px; font-weight: 800; color: var(--text-primary); }
.stat-label { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; font-weight: 500; }

/* ========== PAGINAÇÃO ========== */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 28px; flex-wrap: wrap; padding-bottom: 20px;}
.pagination-btn { padding: 8px 14px; border: 1px solid var(--border-light); background: var(--bg-secondary); border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: all var(--transition-fast); }
.pagination-btn:hover { background: var(--bg-tertiary); transform: translateY(-1px); }
.pagination-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

/* ========== RESPONSIVIDADE ========== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { padding: 16px; }
  .header-top { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 12px; }
  .nav-tabs { order: 2; width: 100%; justify-content: center; flex-wrap: wrap;}
  .stats-header { order: 1; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar-actions { justify-content: center; }
  .search-input { width: 100%; }
}
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-tertiary); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">ESA <span>SAÚDE</span> · PLATAFORMA</div>
    <div class="stats-header">
      <div class="stat-badge">📚 Total: <strong id="stat-total">0</strong></div>
      <div class="stat-badge">✅ Acertos: <strong id="stat-acertos">—</strong></div>
      <div class="stat-badge">🔥 Sequência: <strong id="stat-streak">0</strong></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-questoes" onclick="showPanel('questoes')">📋 Questões</button>
    <button class="nav-tab" id="tab-simulado" onclick="showPanel('simulado')">🎯 Simulado</button>
    <button class="nav-tab" id="tab-estatisticas" onclick="showPanel('estatisticas')">📊 Estatísticas</button>
    <button class="nav-tab" id="tab-erros" onclick="showPanel('erros')">❌ Revisão</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title"><i class="fas fa-layer-group"></i> MATÉRIA</div>
      <div class="filter-list" id="filter-materias"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title"><i class="fas fa-building"></i> BANCA</div>
      <div class="filter-list" id="filter-bancas"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title"><i class="fas fa-calendar"></i> ANO</div>
      <div class="filter-list" id="filter-anos"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title"><i class="fas fa-chart-line"></i> DIFICULDADE</div>
      <div class="filter-list" id="filter-dificuldades"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title"><i class="fas fa-star"></i> ESPECIAIS</div>
      <div class="filter-list" id="filter-especiais"></div>
    </div>
    <div class="filter-reset" onclick="resetarTodosFiltros()"><i class="fas fa-trash-alt"></i> Limpar todos os filtros</div>
  </aside>

  <main class="main-content">
    
    <div id="panel-questoes" class="panel">
      <div class="toolbar">
        <div class="results-info"><strong id="result-count">0</strong> questões encontradas</div>
        <div class="toolbar-actions">
          <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" class="search-input" placeholder="Buscar questão..." oninput="debounceSearch()">
          </div>
          <button class="btn btn-outline" onclick="expandirTodas()"><i class="fas fa-expand-alt"></i> Expandir tudo</button>
          <button class="btn btn-primary" onclick="iniciarSimuladoRapido()"><i class="fas fa-bolt"></i> Simulado rápido</button>
        </div>
      </div>
      <div id="questions-container"></div>
      <div id="pagination" class="pagination"></div>
    </div>

    <div id="panel-simulado" class="panel">
      <div id="sim-setup">
        <div class="sim-config-card">
          <h3 style="margin-bottom: 24px;"><i class="fas fa-sliders-h"></i> Configurar Simulado</h3>
          <div style="margin-bottom: 15px;"><span style="display:inline-block; width:100px; font-weight:500; font-size:14px;">Quantidade:</span><select id="sim-qtd" style="padding:8px; border-radius:6px; border:1px solid var(--border-light); background:var(--bg-tertiary);"><option value="5">5 questões</option><option value="10" selected>10 questões</option><option value="20">20 questões</option><option value="30">30 questões</option><option value="50">50 questões</option></select></div>
          <div style="margin-bottom: 15px;"><span style="display:inline-block; width:100px; font-weight:500; font-size:14px;">Matéria:</span><select id="sim-materia" style="padding:8px; border-radius:6px; border:1px solid var(--border-light); background:var(--bg-tertiary);"><option value="">Todas</option></select></div>
          <div style="margin-bottom: 15px;"><span style="display:inline-block; width:100px; font-weight:500; font-size:14px;">Banca:</span><select id="sim-banca" style="padding:8px; border-radius:6px; border:1px solid var(--border-light); background:var(--bg-tertiary);"><option value="">Todas</option></select></div>
          <div style="margin-bottom: 15px;"><span style="display:inline-block; width:100px; font-weight:500; font-size:14px;">Correção:</span><select id="sim-modo" style="padding:8px; border-radius:6px; border:1px solid var(--border-light); background:var(--bg-tertiary);"><option value="imediato">Imediata</option><option value="final">Ao final</option></select></div>
          <div style="margin-top: 24px;"><button class="btn btn-primary" onclick="startSimulado()"><i class="fas fa-play"></i> Iniciar Simulado</button></div>
        </div>
      </div>
      <div id="sim-active" style="display:none;">
        <div class="sim-config-card">
          <div class="sim-progress"><div style="display:flex;justify-content:space-between;margin-bottom:12px;"><span id="sim-counter">Questão 1 de 10</span><span id="sim-status"></span></div><div class="progress-bar"><div class="progress-fill" id="sim-progress" style="width:10%"></div></div></div>
          <div id="sim-question"></div>
          <div class="sim-nav"><button class="btn btn-outline" onclick="simAnterior()" id="sim-prev"><i class="fas fa-chevron-left"></i> Anterior</button><div><button class="btn btn-outline" onclick="simPular()">Pular <i class="fas fa-forward"></i></button><button class="btn btn-primary" onclick="simProximo()" id="sim-next">Próxima <i class="fas fa-chevron-right"></i></button><button class="btn btn-primary" onclick="simFinalizar()" id="sim-finish" style="display:none;"><i class="fas fa-check"></i> Finalizar</button></div></div>
        </div>
      </div>
      <div id="sim-result" style="display:none;"></div>
    </div>

    <div id="panel-estatisticas" class="panel"><div id="stats-container"></div></div>
    
    <div id="panel-erros" class="panel"><div class="toolbar"><div class="results-info"><strong id="erros-count">0</strong> questões para revisão</div><button class="btn btn-outline" onclick="limparHistorico()"><i class="fas fa-trash-alt"></i> Limpar histórico</button></div><div id="erros-container"></div></div>
  </main>
</div>

<script>
// ========== CONTROLE DE ABAS (FOI CORRIGIDO AQUI) ==========
function showPanel(panelName) {
  // Esconde todas as abas
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  // Mostra apenas a aba clicada
  document.getElementById('panel-' + panelName).style.display = 'block';
  document.getElementById('tab-' + panelName).classList.add('active');
  
  // Atualiza as estatísticas se necessário
  if(panelName === 'estatisticas' || panelName === 'erros') atualizarStats();
}

// ========== BANCO DE DADOS ==========
const MATERIAS_CORRETAS = {
  "Ética Profissional": ["bioética"], "Imunização": ["vacina"], "Fundamentos de Enfermagem": ["pulso"],
  "Clínica Cirúrgica": ["pós-operatório"], "Programas de Saúde": ["paisc"], "Enfermagem Clínica": ["infarto"],
  "Vigilância Epidemiológica": ["notificação"], "Materno-Infantil": ["gestação"], "Legislação SUS/ECA": ["sus"],
  "Cálculo de Medicamentos": ["gotejamento"], "Farmacologia": ["medicamento"], "Saúde Mental": ["esquizofrenia"],
  "EPI e Biossegurança": ["epi"], "Diabetes e Hipertensão": ["diabetes"], "Urgência e Emergência": ["parada"],
  "Pediatria": ["criança"], "Animais Peçonhentos": ["serpente"], "DST/HIV": ["hiv"]
};

const QUESTOES_BASE = [
  {id:1, materia:"Ética Profissional", banca:"IBFC", ano:2016, dificuldade:2, enunciado:"Não é um dos princípios fundamentais da Bioética a:", alternativas:["Humanização","Não maleficência","Justiça","Autonomia","Beneficência"], correta:0, resolucao:"Os quatro princípios fundamentais da Bioética são: Autonomia, Beneficência, Não maleficência e Justiça. A Humanização, embora importante, não é um princípio bioético fundamental."},
  {id:2, materia:"Ética Profissional", banca:"IBFC", ano:2013, dificuldade:2, enunciado:"Sobre autonomia, um dos princípios da Bioética, assinale a alternativa correta.", alternativas:["Obrigação de não causar danos","Poder de tomar decisões sobre sua vida e saúde","Fazer o bem, cuidar da saúde","Distribuição igual dos direitos","Ausência de pressões externas"], correta:1, resolucao:"Autonomia é o respeito à capacidade do indivíduo de tomar decisões sobre sua própria vida e saúde, desde que devidamente informado."},
  {id:3, materia:"Ética Profissional", banca:"CRS", ano:2010, dificuldade:2, enunciado:"Considerando os princípios da beneficência e da não maleficência, o profissional deve:", alternativas:["Fazer o bem mesmo que cause dano","Priorizar benefícios e minimizar riscos","Agir conforme a vontade da família","Obedecer apenas às ordens médicas","Preservar a confidencialidade"], correta:1, resolucao:"Beneficência = fazer o bem; Não maleficência = não causar dano. O profissional deve equilibrar ambos, maximizando benefícios e minimizando riscos."},

];

let QUESTOES = [];
const BANCAS = ["ESA", "EsSA", "IBFC", "EAGS", "CRS", "EsFCEx", "CSM", "CAP", "IBADE", "ANVISA"];

// CÓDIGO DO BUG RESOLVIDO: O texto está vindo 100% íntegro sem .substring()
for (let i = 0; i < 530; i++) {
  const base = QUESTOES_BASE[i % QUESTOES_BASE.length];
  QUESTOES.push({
    ...base,
    id: i + 1,
    materia: base.materia,
    banca: BANCAS[i % BANCAS.length],
    ano: 2010 + (i % 14),
    dificuldade: 1 + (i % 5),
    enunciado: `[Questão ${i+1}] ` + base.enunciado 
  });
}

// ========== STATE ==========
let state = {
  filters: JSON.parse(localStorage.getItem('esa_filters') || '{"materia":null,"banca":null,"ano":null,"dificuldade":null,"especial":null}'),
  historico: JSON.parse(localStorage.getItem('hist_esa') || '{}'),
  favoritas: JSON.parse(localStorage.getItem('favs_esa') || '[]'),
  streak: parseInt(localStorage.getItem('streak_esa') || '0'),
  lastAnswerDate: localStorage.getItem('last_answer_date') || '',
  sim: { questoes: [], atual: 0, respostas: {}, modo: 'imediato' },
  pagination: { currentPage: 1, itemsPerPage: 20, totalPages: 1 },
  searchDebounceTimer: null,
  answering: false
};

// ========== UTILS ==========
function salvarFiltros() { localStorage.setItem('esa_filters', JSON.stringify(state.filters)); }
function atualizarStreak() {
  const today = new Date().toDateString();
  if (state.lastAnswerDate !== today) {
    if (state.lastAnswerDate === new Date(Date.now() - 86400000).toDateString()) { state.streak++; } 
    else { state.streak = 1; }
    state.lastAnswerDate = today;
    localStorage.setItem('streak_esa', state.streak);
    localStorage.setItem('last_answer_date', state.lastAnswerDate);
    document.getElementById('stat-streak').innerText = state.streak;
    if (state.streak % 5 === 0) mostrarToast(`🔥 Sequência de ${state.streak} dias! Continue assim!`);
  }
}

function mostrarToast(mensagem) {
  const toast = document.createElement('div');
  toast.className = 'toast-message';
  toast.innerHTML = `<i class="fas fa-check-circle"></i> ${mensagem}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function mostrarConfete() {
  const cores = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'];
  for (let i = 0; i < 50; i++) {
    const particle = document.createElement('div');
    particle.className = 'confetti-particle';
    particle.innerHTML = ['🎉', '✨', '⭐', '🌟', '🎊'][Math.floor(Math.random() * 5)];
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = '50%';
    particle.style.fontSize = (16 + Math.random() * 20) + 'px';
    particle.style.color = cores[Math.floor(Math.random() * cores.length)];
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
  }
}

// ========== RENDERIZAÇÃO COM PAGINAÇÃO ==========
function getQuestoesFiltradas() {
  let qs = [...QUESTOES];
  if (state.filters.materia) qs = qs.filter(q => q.materia === state.filters.materia);
  if (state.filters.banca) qs = qs.filter(q => q.banca === state.filters.banca);
  if (state.filters.ano) qs = qs.filter(q => q.ano == state.filters.ano);
  if (state.filters.dificuldade) qs = qs.filter(q => q.dificuldade === state.filters.dificuldade);
  if (state.filters.especial === 'favoritas') qs = qs.filter(q => state.favoritas.includes(q.id));
  if (state.filters.especial === 'nao-respondidas') qs = qs.filter(q => !state.historico[q.id]);
  if (state.filters.especial === 'erradas') qs = qs.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  const search = document.getElementById('search-input')?.value.toLowerCase() || '';
  if (search) qs = qs.filter(q => q.enunciado.toLowerCase().includes(search));
  return qs;
}

function renderizarQuestoes() {
  const qs = getQuestoesFiltradas();
  const { currentPage, itemsPerPage } = state.pagination;
  state.pagination.totalPages = Math.ceil(qs.length / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageQs = qs.slice(start, end);
  
  document.getElementById('result-count').innerText = qs.length;
  const container = document.getElementById('questions-container');
  const fragment = document.createDocumentFragment();
  pageQs.forEach((q) => fragment.appendChild(criarCardQuestao(q)));
  container.innerHTML = '';
  container.appendChild(fragment);
  renderizarPaginacao(qs.length);
  atualizarContadoresEspeciais();
}

function renderizarPaginacao(total) {
  const { currentPage, totalPages } = state.pagination;
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  let html = `<button class="pagination-btn" onclick="mudarPagina(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
      html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="mudarPagina(${i})">${i}</button>`;
    } else if (i === currentPage - 3 || i === currentPage + 3) {
      html += `<span style="padding: 8px;">...</span>`;
    }
  }
  html += `<button class="pagination-btn" onclick="mudarPagina(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
  container.innerHTML = html;
}

function mudarPagina(page) {
  state.pagination.currentPage = Math.max(1, Math.min(page, state.pagination.totalPages));
  renderizarQuestoes();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function debounceSearch() { clearTimeout(state.searchDebounceTimer); state.searchDebounceTimer = setTimeout(() => { state.pagination.currentPage = 1; renderizarQuestoes(); }, 300); }

function criarCardQuestao(q) {
  const hist = state.historico[q.id] || {};
  const isFav = state.favoritas.includes(q.id);
  const jaRespondeu = hist.escolha !== undefined;
  const dificuldadeTexto = ['','Fácil','Médio-fácil','Médio','Difícil','Muito difícil'][q.dificuldade];
  const card = document.createElement('div');
  card.className = `question-card ${jaRespondeu ? 'answered' : ''}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="badges"><span class="badge badge-banca"><i class="fas fa-building"></i> ${q.banca} ${q.ano}</span><span class="badge badge-materia"><i class="fas fa-book"></i> ${q.materia}</span><span class="badge ${q.dificuldade>=4?'badge-muito-dificil':q.dificuldade>=3?'badge-dificil':''}">${dificuldadeTexto}</span>${jaRespondeu ? '<span class="badge badge-answered"><i class="fas fa-check-circle"></i> Respondida</span>' : ''}</div>
      <div class="card-actions"><button class="icon-btn fav ${isFav?'active':''}" onclick="toggleFavorito(${q.id}, event)"><i class="fas fa-star"></i></button><button class="icon-btn" onclick="expandirCard(${q.id})"><i class="fas fa-comment-dots"></i></button></div>
    </div>
    <div class="card-body">
      <div class="question-text">${q.enunciado}</div>
      <div class="alternatives">${q.alternativas.map((alt, idx) => { let classe = 'alt-item'; if (jaRespondeu) classe += ' disabled'; if (jaRespondeu && idx === q.correta) classe += ' correct-answer'; if (jaRespondeu && idx === hist.escolha && idx !== q.correta) classe += ' selected-wrong'; if (jaRespondeu && idx === hist.escolha && idx === q.correta) classe += ' selected-correct'; return `<div class="${classe}" onclick="${!jaRespondeu ? `responder(${q.id}, ${idx})` : ''}"><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`; }).join('')}</div>
      <div class="resolution-box" id="resolucao-${q.id}"><div class="resolution-title"><i class="fas fa-lightbulb"></i> Resolução comentada</div><div class="resolution-text">${q.resolucao}<br><br><strong>✓ Resposta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>
    </div>
  `;
  if (jaRespondeu) setTimeout(() => document.getElementById(`resolucao-${q.id}`)?.classList.add('show'), 0);
  return card;
}

function responder(qid, escolha) {
  if (state.historico[qid]?.escolha !== undefined || state.answering) return;
  state.answering = true;
  const q = QUESTOES.find(x => x.id === qid);
  if (!q) { state.answering = false; return; }
  const acertou = escolha === q.correta;
  if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 };
  state.historico[qid].total++;
  if (acertou) { state.historico[qid].acertos++; atualizarStreak(); mostrarConfete(); mostrarToast("🚀 Acertou em cheio!"); }
  else state.historico[qid].erros++;
  state.historico[qid].escolha = escolha;
  localStorage.setItem('hist_esa', JSON.stringify(state.historico));
  renderizarQuestoes();
  atualizarStats();
  setTimeout(() => { state.answering = false; }, 500);
}

function toggleFavorito(qid, event) { event.stopPropagation(); const idx = state.favoritas.indexOf(qid); idx === -1 ? state.favoritas.push(qid) : state.favoritas.splice(idx,1); localStorage.setItem('favs_esa', JSON.stringify(state.favoritas)); renderizarQuestoes(); }
function expandirCard(qid) { document.getElementById(`resolucao-${qid}`)?.classList.toggle('show'); }
function expandirTodas() { document.querySelectorAll('.resolution-box').forEach(r => r.classList.add('show')); }

function atualizarContadoresEspeciais() {
  const totalFav = state.favoritas.length;
  const totalNaoResp = QUESTOES.filter(q => !state.historico[q.id]).length;
  const totalErradas = QUESTOES.filter(q => (state.historico[q.id]?.erros || 0) > 0).length;
  const especiais = document.querySelectorAll('#filter-especiais .filter-item');
  if (especiais[0]) especiais[0].querySelector('.count').innerText = totalFav;
  if (especiais[1]) especiais[1].querySelector('.count').innerText = totalNaoResp;
  if (especiais[2]) especiais[2].querySelector('.count').innerText = totalErradas;
}

// ========== FILTROS ==========
function renderizarFiltros() {
  const materias = [...new Set(QUESTOES.map(q => q.materia))].sort();
  document.getElementById('filter-materias').innerHTML = `<div class="filter-item ${!state.filters.materia ? 'active' : ''}" onclick="setFiltro('materia',null,this)"><span>📚 Todas</span><span class="count">${QUESTOES.length}</span></div>` + materias.map(m => `<div class="filter-item ${state.filters.materia === m ? 'active' : ''}" onclick="setFiltro('materia','${m}',this)"><span>📌 ${m}</span><span class="count">${QUESTOES.filter(q=>q.materia===m).length}</span></div>`).join('');
  const bancas = [...new Set(QUESTOES.map(q => q.banca))].sort();
  document.getElementById('filter-bancas').innerHTML = `<div class="filter-item ${!state.filters.banca ? 'active' : ''}" onclick="setFiltro('banca',null,this)"><span>🏛 Todas</span><span class="count">${QUESTOES.length}</span></div>` + bancas.map(b => `<div class="filter-item ${state.filters.banca === b ? 'active' : ''}" onclick="setFiltro('banca','${b}',this)"><span>🏛 ${b}</span><span class="count">${QUESTOES.filter(q=>q.banca===b).length}</span></div>`).join('');
  const anos = [...new Set(QUESTOES.map(q => q.ano))].sort((a,b)=>b-a);
  document.getElementById('filter-anos').innerHTML = `<div class="filter-item ${!state.filters.ano ? 'active' : ''}" onclick="setFiltro('ano',null,this)"><span>📅 Todos</span><span class="count">${QUESTOES.length}</span></div>` + anos.map(a => `<div class="filter-item ${state.filters.ano == a ? 'active' : ''}" onclick="setFiltro('ano','${a}',this)"><span>📅 ${a}</span><span class="count">${QUESTOES.filter(q=>q.ano===a).length}</span></div>`).join('');
  const dificuldades = [{v:null,n:"Todas"},{v:1,n:"🟢 Fácil"},{v:2,n:"🟢 Médio-fácil"},{v:3,n:"🟡 Médio"},{v:4,n:"🔴 Difícil"},{v:5,n:"🔴 Muito difícil"}];
  document.getElementById('filter-dificuldades').innerHTML = dificuldades.map(d => `<div class="filter-item ${state.filters.dificuldade === d.v ? 'active' : ''}" onclick="setFiltro('dificuldade',${d.v},this)"><span>${d.n}</span><span class="count">${d.v===null?QUESTOES.length:QUESTOES.filter(q=>q.dificuldade===d.v).length}</span></div>`).join('');
  const especiais = [{id:"favoritas",nome:"⭐ Favoritas"},{id:"nao-respondidas",nome:"◯ Não respondidas"},{id:"erradas",nome:"✗ Mais erradas"}];
  document.getElementById('filter-especiais').innerHTML = especiais.map(e => `<div class="filter-item ${state.filters.especial === e.id ? 'active' : ''}" onclick="setFiltroEspecial('${e.id}',this)"><span>${e.nome}</span><span class="count">0</span></div>`).join('');
}

function setFiltro(tipo, valor, el) { el.parentElement.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); state.filters[tipo] = valor; salvarFiltros(); state.pagination.currentPage = 1; renderizarQuestoes(); }
function setFiltroEspecial(tipo, el) { document.querySelectorAll('#filter-especiais .filter-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); state.filters.especial = state.filters.especial === tipo ? null : tipo; salvarFiltros(); state.pagination.currentPage = 1; renderizarQuestoes(); }
function resetarTodosFiltros() { state.filters = { materia: null, banca: null, ano: null, dificuldade: null, especial: null }; salvarFiltros(); renderizarFiltros(); state.pagination.currentPage = 1; renderizarQuestoes(); }

// ========== ESTATÍSTICAS ==========
function atualizarStats() {
  const totalRespondidas = Object.keys(state.historico).length;
  const totalAcertos = Object.values(state.historico).reduce((s, h) => s + (h.acertos || 0), 0);
  const totalTentativas = Object.values(state.historico).reduce((s, h) => s + (h.total || 0), 0);
  const perc = totalTentativas > 0 ? Math.round((totalAcertos / totalTentativas) * 100) : 0;
  document.getElementById('stat-total').innerText = QUESTOES.length;
  document.getElementById('stat-acertos').innerHTML = `${perc}%`;
  document.getElementById('stat-streak').innerText = state.streak;
  const erradas = QUESTOES.filter(q => (state.historico[q.id]?.erros || 0) > 0);
  document.getElementById('erros-count').innerText = erradas.length;
  const errosContainer = document.getElementById('erros-container');
  if (erradas.length === 0) errosContainer.innerHTML = '<div class="empty-state"><i class="fas fa-trophy" style="font-size: 48px; opacity: 0.5;"></i><p>🎉 Nenhum erro registrado! Continue assim!</p></div>';
  else { errosContainer.innerHTML = ''; erradas.forEach((q, idx) => errosContainer.appendChild(criarCardQuestao(q))); }
  const statsContainer = document.getElementById('stats-container');
  const materiasStats = [...new Set(QUESTOES.map(q => q.materia))].map(m => {
    const qs = QUESTOES.filter(q => q.materia === m);
    let acertos=0, total=0;
    qs.forEach(q => { if(state.historico[q.id]) { total += state.historico[q.id].total; acertos += state.historico[q.id].acertos || 0; } });
    return { materia: m, acertos, total, perc: total>0 ? Math.round((acertos/total)*100) : 0 };
  }).filter(m => m.total>0).sort((a,b) => b.perc - a.perc);
  statsContainer.innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-value">${QUESTOES.length}</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-value">${totalRespondidas}</div><div class="stat-label">Respondidas</div></div><div class="stat-card"><div class="stat-value">${totalAcertos}</div><div class="stat-label">Acertos</div></div><div class="stat-card"><div class="stat-value">${perc}%</div><div class="stat-label">Taxa de acerto</div></div></div><div class="sim-config-card"><h3><i class="fas fa-chart-pie"></i> Desempenho por matéria</h3>${materiasStats.length>0?materiasStats.map(m => `<div style="margin-bottom: 16px;"><div style="display:flex;justify-content:space-between;margin-bottom: 6px;"><span><strong>${m.materia}</strong></span><span>${m.perc}% (${m.acertos}/${m.total})</span></div><div class="progress-bar"><div class="progress-fill" style="width:${m.perc}%;background:${m.perc>=70?'#10b981':m.perc>=50?'#f59e0b':'#ef4444'}"></div></div></div>`).join(''):'<div class="empty-state">Responda questões para ver estatísticas</div>'}</div>`;
}

// ========== SIMULADO ==========
function preencherSelectsSimulado() {
  const materias = [...new Set(QUESTOES.map(q => q.materia))];
  const bancas = [...new Set(QUESTOES.map(q => q.banca))];
  document.getElementById('sim-materia').innerHTML = '<option value="">Todas</option>' + materias.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('sim-banca').innerHTML = '<option value="">Todas</option>' + bancas.map(b => `<option value="${b}">${b}</option>`).join('');
}
function iniciarSimuladoRapido() { showPanel('simulado'); startSimulado(); }
function startSimulado() {
  const qtd = parseInt(document.getElementById('sim-qtd').value);
  const materia = document.getElementById('sim-materia').value;
  const banca = document.getElementById('sim-banca').value;
  const modo = document.getElementById('sim-modo').value;
  let pool = [...QUESTOES];
  if (materia) pool = pool.filter(q => q.materia === materia);
  if (banca) pool = pool.filter(q => q.banca === banca);
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  state.sim = { questoes: pool.slice(0, Math.min(qtd, pool.length)), atual: 0, respostas: {}, modo: modo };
  document.getElementById('sim-setup').style.display = 'none';
  document.getElementById('sim-active').style.display = 'block';
  document.getElementById('sim-result').style.display = 'none';
  renderSimQuestao();
}
function renderSimQuestao() {
  const {questoes, atual, respostas, modo} = state.sim;
  const q = questoes[atual];
  const total = questoes.length;
  document.getElementById('sim-counter').innerHTML = `Questão ${atual+1} de ${total}`;
  document.getElementById('sim-progress').style.width = ((atual+1)/total)*100 + '%';
  const respostaAtual = respostas[q.id];
  const mostrarGabarito = respostaAtual !== undefined && modo === 'imediato';
  const jaRespondeu = respostaAtual !== undefined;
  
  // Aqui o texto também não será cortado
  document.getElementById('sim-question').innerHTML = `<div style="margin-bottom: 16px;"><span class="badge badge-banca">${q.banca} ${q.ano}</span> <span class="badge badge-materia">${q.materia}</span></div><div class="question-text">${q.enunciado}</div><div class="alternatives">${q.alternativas.map((alt, idx) => { let classe = 'alt-item'; if (jaRespondeu) classe += ' disabled'; if (mostrarGabarito && idx === q.correta) classe += ' correct-answer'; if (mostrarGabarito && idx === respostaAtual && respostaAtual !== q.correta) classe += ' selected-wrong'; if (!mostrarGabarito && idx === respostaAtual) classe += ' selected-correct'; return `<div class="${classe}" ${!jaRespondeu ? `onclick="responderSimulado(${q.id}, ${idx})"` : ''}><span class="alt-letter">${String.fromCharCode(65+idx)})</span><span class="alt-text">${alt}</span></div>`; }).join('')}</div>${mostrarGabarito ? `<div class="resolution-box show"><div class="resolution-title">${respostaAtual === q.correta ? '✅ Correto!' : '❌ Errou!'}</div><div class="resolution-text">${q.resolucao}<br><br><strong>Resposta: ${String.fromCharCode(65+q.correta)}) ${q.alternativas[q.correta]}</strong></div></div>` : ''}`;
  const isLast = atual === total - 1;
  document.getElementById('sim-prev').style.visibility = atual === 0 ? 'hidden' : 'visible';
  document.getElementById('sim-next').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('sim-finish').style.display = isLast ? 'inline-block' : 'none';
}
function responderSimulado(qid, escolha) { if (state.sim.respostas[qid] !== undefined) return; state.sim.respostas[qid] = escolha; if (state.sim.modo === 'imediato') { const q = QUESTOES.find(x => x.id === qid); if (!state.historico[qid]) state.historico[qid] = { total: 0, acertos: 0, erros: 0 }; state.historico[qid].total++; escolha === q.correta ? state.historico[qid].acertos++ : state.historico[qid].erros++; localStorage.setItem('hist_esa', JSON.stringify(state.historico)); renderSimQuestao(); atualizarStats(); } else renderSimQuestao(); }
function simProximo() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }
function simAnterior() { if (state.sim.atual > 0) { state.sim.atual--; renderSimQuestao(); } }
function simPular() { if (state.sim.atual < state.sim.questoes.length - 1) { state.sim.atual++; renderSimQuestao(); } }
function simFinalizar() { const {questoes, respostas, modo} = state.sim; let acertos = 0, respondidas = 0; questoes.forEach(q => { const resp = respostas[q.id]; if (resp !== undefined) { respondidas++; if (resp === q.correta) acertos++; if (modo !== 'imediato') { if (!state.historico[q.id]) state.historico[q.id] = { total: 0, acertos: 0, erros: 0 }; state.historico[q.id].total++; resp === q.correta ? state.historico[q.id].acertos++ : state.historico[q.id].erros++; } } }); if (modo !== 'imediato') localStorage.setItem('hist_esa', JSON.stringify(state.historico)); const perc = respondidas > 0 ? Math.round((acertos / respondidas) * 100) : 0; const cor = perc >= 70 ? '#10b981' : (perc >= 50 ? '#f59e0b' : '#ef4444'); document.getElementById('sim-active').style.display = 'none'; document.getElementById('sim-result').style.display = 'block'; 
  
  // CÓDIGO DO BUG RESOLVIDO NO GABARITO DO SIMULADO (TEXTO 100% VISÍVEL)
  document.getElementById('sim-result').innerHTML = `<div class="sim-config-card"><div style="text-align:center;padding: 24px;"><div style="font-size: 64px;font-weight:800;color:${cor};">${perc}%</div><div style="font-size: 20px;margin: 12px 0;">${perc >= 70 ? '🎉 Excelente!' : (perc >= 50 ? '📚 Continue estudando!' : '💪 Reforce os conteúdos!')}</div><div>${acertos} acertos de ${respondidas} respondidas (${questoes.length} total)</div><div style="margin-top: 8px;">🔥 Sequência atual: ${state.streak} dias</div></div><div style="display:flex;gap:12px;justify-content:center;margin-bottom: 24px;"><button class="btn btn-primary" onclick="startSimulado()"><i class="fas fa-redo-alt"></i> Novo simulado</button><button class="btn btn-outline" onclick="voltarConfigSimulado()"><i class="fas fa-cog"></i> Configurar</button></div><div><strong>📋 Gabarito detalhado</strong></div>${questoes.map(q => { const resp = respostas[q.id]; const acertou = resp === q.correta; return `<div style="padding: 12px;border-bottom: 1px solid var(--border-light);"><div>${q.enunciado}</div><div style="font-size: 13px;margin-top: 8px;color: ${!resp ? '#9ca3cf' : (acertou ? '#10b981' : '#ef4444')};">${!resp ? '⚪ Não respondida' : (acertou ? `✅ Correto: ${String.fromCharCode(65+q.correta)})` : `❌ Sua: ${String.fromCharCode(65+resp)}) | Correto: ${String.fromCharCode(65+q.correta)})`)}</div></div>`; }).join('')}</div>`; 
  atualizarStats(); 
}
function voltarConfigSimulado() { document.getElementById('sim-setup').style.display = 'block'; document.getElementById('sim-active').style.display = 'none'; document.getElementById('sim-result').style.display = 'none'; }
function limparHistorico() { if(confirm('⚠️ Atenção! Isso apagará todo seu progresso. Continuar?')){ state.historico = {}; localStorage.setItem('hist_esa', JSON.stringify(state.historico)); renderizarQuestoes(); atualizarStats(); } }
function toggleTheme() { const isDark = document.body.getAttribute('data-theme') === 'dark'; document.body.setAttribute('data-theme', isDark ? 'light' : 'dark'); localStorage.setItem('theme', isDark ? 'light' : 'dark'); document.getElementById('themeToggle').innerHTML = isDark ? '🌙' : '☀️'; }

// ========== INICIALIZAÇÃO ==========
function init() {
  if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
  
  // Garante que apenas a tela inicial de questões seja exibida no carregamento
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-questoes').style.display = 'block';

  renderizarFiltros();
  renderizarQuestoes();
  atualizarStats();
  preencherSelectsSimulado();
  document.getElementById('stat-streak').innerText = state.streak;
}
init();
</script>
</body>
</html>
