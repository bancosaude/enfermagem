   alts:{a:"Aneurisma sacular.",b:"Doença de Buerger.",c:"Doença Arterial Periférica Oclusiva.",d:"Aterosclerose."},gabarito:"d",
   resolucao:"A *aterosclerose* é a forma e tipo mais comum de arteriosclerose, caracterizada pelo acúmulo focal de placas de lipídeos (ateromas) na túnica íntima das artérias.",
   tags:["clinica","cardiovascular"],fav:false},

  {id:"med002",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Manejo IAM",banca:"ESA",ano:2015,dific:2,tipo:"clínico",
   enunciado:"A medicação analgésica de escolha prioritária utilizada para diminuir a dor severa e a ansiedade no infarto agudo do miocárdio (IAM) é:",
   alts:{a:"Morfina.",b:"Nitroglicerina.",c:"Betabloqueador.",d:"Ácido acetilsalicílico."},gabarito:"a",
   resolucao:"A morfina é o opioide padrão ouro no protocolo de dor isquêmica cardíaca refratária. Além de potente analgésico, promove venodilatação, reduzindo a pré-carga cardíaca.",
   tags:["iam","cardio"],fav:false},

  {id:"med003",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Sinais do Choque",banca:"ESA",ano:2014,dific:2,tipo:"clínico",
   enunciado:"São sinais clássicos e patognomônicos do choque hipovolêmico instalado:",
   alts:{a:"Rubor, calor, bradipneia e poliúria abundante.",b:"Pele fria e pegajosa, taquipneia, cianose de extremidades, pulso rápido, fraco e filiforme associado à hipotensão.",c:"Urina concentrada e hipertensão arterial severa."},gabarito:"b",
   resolucao:"A perda de volume intravascular dispara a resposta adrenérgica: vasoconstrição periférica (pele fria/palidez), taquicardia compensatória e pulso fino filiforme por baixo volume sistólico.",
   tags:["choque"],fav:false},

  {id:"med004",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Riscos DAC",banca:"ESA",ano:2015,dific:1,tipo:"memorização",
   enunciado:"Qual dos fatores de risco abaixo listados é classificado como um risco para doença arterial coronariana (DAC) NÃO MODIFICÁVEL?",
   alts:{a:"Hiperlipidemia.",b:"Tabagismo.",c:"Hipertensão arterial.",d:"Histórico familiar genético de doença coronariana.",e:"Inatividade física."},gabarito:"d",
   resolucao:"Fatores genéticos hereditários, idade e sexo biológico são imutáveis (não modificáveis). Tabagismo, dieta e sedentarismo podem ser ativamente alterados.",
   tags:["cardio"],fav:false},

  {id:"med005",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Posicionamento",banca:"ESA",ano:2017,dific:1,tipo:"memorização",
   enunciado:"'Esta posição facilita a respiração em caso de pacientes com problemas cardíacos e pulmonares, além de promover descanso e conforto'. Trata-se da:",
   alts:{a:"Posição de Sims.",b:"Posição de Fowler.",c:"Posição de Trendelenburg.",d:"Posição Litotômica."},gabarito:"b",
   resolucao:"A posição de Fowler (cabeceira a 45°-60°) reduz a pressão das vísceras abdominais sobre o diafragma, expandindo o volume pulmonar útil.",
   tags:["posicionamento"],fav:false},

  {id:"med006",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Sinais do Choque",banca:"FAURGS",ano:2022,dific:3,tipo:"clínico",
   enunciado:"Quais sinais e sintomas clínicos estão diretamente relacionados à síndrome do choque circulatório decompensado?",
   alts:{a:"Cefaleia e paralisia facial.",b:"Hematêmese isolada.",c:"Alterações neurológicas agudas por hipofluxo, pressão arterial sistólica inferior a 80 mmHg e taquipneia compensatória."},gabarito:"c",
   resolucao:"Hipotensão severa (PAS < 80 mmHg) associada a sofrimento celular cerebral (rebaixamento/confusão) e taquipneia definem o estado de choque de qualquer etiologia.",
   tags:["choque"],fav:false},

  {id:"med007",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"ECG Bradicardia",banca:"FUNDATEC",ano:2021,dific:3,tipo:"imagem-descritiva",
   enunciado:"No ECG, a imagem que exibe ondas P normais seguidas de complexo QRS regular, porém espaçadas de forma lenta com frequência cardíaca abaixo de 60 bpm caracteriza a:",
   alts:{a:"Fibrilação atrial.",b:"Bradicardia sinusal.",c:"Taquicardia ventricular.",d:"Bloqueio atrioventricular total."},gabarito:"b",
   resolucao:"Ritmo sinusal implica onda P comandando o QRS. Se a frequência está abaixo do limiar fisiológico (<60 bpm), denomina-se bradicardia sinusal.",
   tags:["ecg"],fav:false},

  {id:"med008",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Ondas ECG",banca:"FUNDATEC",ano:2021,dific:2,tipo:"memorização",
   enunciado:"A onda do eletrocardiograma (ECG) que corresponde especificamente à despolarização elétrica dos átrios (contração atrial) é a:",
   alts:{a:"Onda P.",b:"Onda Q.",c:"Onda R.",d:"Onda S.",e:"Onda T."},gabarito:"a",
   resolucao:"Onda P = despolarização/contarção atrial. Complexo QRS = despolarização/contração dos ventrículos. Onda T = repolarização ventricular.",
   tags:["ecg"],fav:false},

  {id:"med009",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Insuficiência Venosa",banca:"UNICAMP",ano:2019,dific:2,tipo:"clínico",
   enunciado:"Indivíduos com diagnóstico de insuficiência venosa crônica periférica devem ser orientados a adotar qual medida preventiva contra úlceras?",
   alts:{a:"Repousar as pernas mantendo-as abaixo do nível do coração.",b:"Evitar caminhadas de qualquer tipo.",c:"Evitar ficar de pé estático (parado) por períodos prolongados.",d:"Suspender o uso de meias elásticas."},gabarito:"c",
   resolucao:"Ficar de pé parado sabota a bomba muscular da panturrilha, elevando a pressão venosa retrógrada e gerando estase/edema que evolui para úlcera venosa.",
   tags:["vascular"],fav:false},

  {id:"med010",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Pericardite",banca:"AMEOSC",ano:2021,dific:2,tipo:"clínico",
   enunciado:"No tratamento e assistência ao paciente com pericardite aguda, o repouso deve ser feito preferencialmente em qual posição para aliviar a dor precordial compressiva?",
   alts:{a:"Posição de Fowler alta inclinado para frente.",b:"Decúbito ventral (prona).",c:"Posição de Trendelenburg.",d:"Decúbito dorsal horizontal plano."},gabarito:"a",
   resolucao:"Fowler alto com inclinação anterior do tronco (posição genupeitoral ou preces maometana adaptada no leito) afasta o pericárdio inflamado da pleura parietal, reduzindo drasticamente a dor torácica.",
   tags:["pericardite"],fav:false},

  {id:"med011",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Parâmetros SBC",banca:"MÉTODO SOLUÇÕES",ano:2019,dific:3,tipo:"memorização",
   enunciado:"De acordo com as Diretrizes da Sociedade Brasileira de Cardiologia, os valores normais limites ideais de pressão arterial em paciente adulto são:",
   alts:{a:"PAS < 120 mmHg e PAD < 80 mmHg.",b:"PAS entre 130-139 mmHg.",c:"PAS > 140 mmHg fixa."},gabarito:"a",
   resolucao:"A classificação ótima/normal rígida define níveis de pressão sistólica abaixo de 120 mmHg e diastólica estritamente abaixo de 80 mmHg.",
   tags:["hipertensao"],fav:false},

  {id:"med012",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Condutas IAM",banca:"IDIB",ano:2020,dific:3,tipo:"clínico",
   enunciado:"Fazem parte das condutas iniciais de suporte executadas pela equipe de enfermagem ao receber um paciente com suspeita de IAM:",
   alts:{a:"Puncionar acesso venoso calibroso, realizar ECG imediato (tempo porta-eletro < 10min) e administrar AAS/Clopidogrel conforme protocolo.",b:"Puncionar acesso e infundir Ringer com fluxo rápido sem controle.",c:"Administrar Atropina em bolus de rotina imediata."},gabarito:"a",
   resolucao:"O tempo porta-ECG ideal na suspeita de IAM com supra é de no máximo 10 minutos. O uso de antiagregantes plaquetários (AAS) mastigáveis reduz a progressão do trombo coronariano.",
   tags:["iam"],fav:false},

  {id:"med013",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Aterosclerose",banca:"IDHTEC",ano:2019,dific:1,tipo:"memorização",
   enunciado:"O processo patológico da aterosclerose caracteriza-se essencialmente pelo(a):",
   alts:{a:"Amolecimento de veias superficiais.",b:"Estreitamento e oclusão do lúmen arterial pelo acúmulo de placas de ateroma (gordura/fibrose).",c:"Queda abrupta da pressão sistêmica."},gabarito:"b",
   resolucao:"A aterosclerose obstrui cronicamente as artérias, reduzindo o fluxo sanguíneo local para tecidos periféricos ou miocárdio.",
   tags:["cardio"],fav:false},

  {id:"med014",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Tabagismo Riscos",banca:"CONTEMAX",ano:2019,dific:2,tipo:"conceitual",
   enunciado:"Considere a alternativa INCORRETA com relação ao tabagismo e a doença cardiovascular:",
   alts:{a:"O tabagismo é um poderoso fator de risco cardiovascular modificável.",b:"Fumantes hipertensos devem receber apoio terapêutico para cessação do hábito.",c:"O tabagismo é classificado como o mais importante fator de risco NÃO MODIFICÁVEL para infarto.",d:"Fumar mais de 20 cigarros por dia eleva drasticamente o risco de morte súbita."},gabarito:"c",
   resolucao:"O tabagismo é um fator de risco comportamental totalmente *modificável* através da cessação do tabaco pelo indivíduo.",
   tags:["fatores_risco"],fav:false},

  {id:"med015",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Terminologia",banca:"FDC",ano:2019,dific:2,tipo:"memorização",
   enunciado:"Assinale a alternativa que apresenta a definição terminológica cardiovascular CORRETA:",
   alts:{a:"Angina pectoris: coágulo nas veias profundas da perna.",b:"AVC: Acidente Vascular Central periférico.",c:"Doença coronariana: processo patológico que acomete os vasos sanguíneos que irrigam diretamente o músculo cardíaco (miocárdio)."},gabarito:"c",
   resolucao:"Doença arterial coronariana (DAC) afeta as artérias coronárias que nutrem o coração. Angina é a dor isquêmica e AVC significa Acidente Vascular Cerebral.",
   tags:["terminologia"],fav:false},

  {id:"med016",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"IAM Definição",banca:"IBFC",ano:2016,dific:2,tipo:"memorização",
   enunciado:"O processo agudo que leva à morte celular (necrose) do miocárdio por isquemia prolongada decorrente da oclusão de artéria coronária chama-se:",
   alts:{a:"Acidente vascular cerebral.",b:"Endocardite infecciosa crônica.",c:"Infarto agudo do miocárdio.",d:"Aneurisma de aorta dissecante."},gabarito:"c",
   resolucao:"O IAM é a necrose tecidual cardíaca por falta crônica ou oclusiva de oxigenação suprida pelas artérias coronárias.",
   tags:["iam"],fav:false},

  {id:"med017",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Asma Alvos",banca:"AMEOSC",ano:2018,dific:2,tipo:"clínico",
   enunciado:"Na crise de asma, o manejo de oxigenoterapia visa manter o alvo estável de saturação periférica acima de:",
   alts:{a:"98%.",b:"85%.",c:"90% (idealmente entre 93-95% em adultos saudáveis).",d:"80%."},gabarito:"c",
   resolucao:"O protocolo de manejo agudo de asma preconiza manter a SpO2 estável acima de 90-92% para evitar hipoxemia tecidual sem hiperóxia descontrolada.",
   tags:["asma"],fav:false},

  {id:"med018",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Edema Agudo Pulmão",banca:"FUNDATEC",ano:2022,dific:3,tipo:"clínico",
   enunciado:"Em relação ao Edema Agudo de Pulmão (EAP), assinale a afirmativa INCORRETA:",
   alts:{a:"Apresenta dispneia grave, diaforese e ortopneia.",b:"O tratamento envolve diuréticos de alça (furosemida) e nitratos.",c:"O aspecto rosáceo espumoso clássico da expectoração ocorre devido ao aumento drástico da pressão capilar pulmonar com transudação de plasma e hemácias para os alvéolos.",d:"A principal causa de origem não-cardiogênica é a insuficiência ventricular esquerda."},gabarito:"d",
   resolucao:"A insuficiência ventricular esquerda causa EAP de origem *cardiogênica* (falha mecânica de bomba cardíaca retrógrada), tornando a assertiva D incorreta.",
   tags:["pulmao"],fav:false},

  {id:"med019",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Hipoxemia",banca:"UFMT",ano:2021,dific:2,tipo:"clínico",
   enunciado:"São sinais clínicos neurológicos e respiratórios francos indicativos de disfunção respiratória aguda severa com hipoxemia:",
   alts:{a:"Uso acentuado de musculatura acessória (tiragem) e confusão mental aguda por hipóxia cerebral.",b:"Bradipneia estável e sono fisiológico calmo.",c:"Intolerância a decúbito sem esforço."},gabarito:"a",
   resolucao:"O sofrimento cerebral por falta de oxigênio gera confusão mental e agitação psicomotora, enquanto a mecânica pulmonar exibe tiragem intercostal e batimento de asa de nariz.",
   tags:["respiratorio"],fav:false},

  {id:"med020",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"DPOC Enfisema",banca:"CPCON",ano:2020,dific:2,tipo:"memorização",
   enunciado:"A doença pulmonar obstrutiva crônica caracterizada pela destruição das paredes alveolares com perda definitiva da elasticidade e hiperinsuflação permanente é o:",
   alts:{a:"Empiema pleural.",b:"Enfisema pulmonar.",c:"Edema agudo.",d:"Atelectasia lobar."},gabarito:"b",
   resolucao:"O enfisema é caracterizado pela destruição anatômica dos septos alveolares, colapsando as pequenas vias aéreas durante a expiração (aprisionamento de ar).",
   tags:["dpoc"],fav:false},

  {id:"med021",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Dispneia Intervenção",banca:"VUNESP",ano:2020,dific:1,tipo:"clínico",
   enunciado:"Paciente refere 'falta de ar' severa e exibe esforço respiratório em repouso. O quadro sugere qual sintoma e respectiva conduta imediata de conforto?",
   alts:{a:"Dispneia; elevar imediatamente a cabeceira do leito (Fowler alta).",b:"Bradicardia; aplicar compressas frias.",c:"Desidratação; deitar em plano reto."},gabarito:"a",
   resolucao:"Falta de ar é dispneia. A primeira conduta imediata de enfermagem de caráter posicional é elevar a cabeceira do leito para otimizar a mecânica ventilatória.",
   tags:["respiratorio"],fav:false},

  {id:"med022",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Anemia Falciforme",banca:"AMEOSC",ano:2018,dific:2,tipo:"memorização",
   enunciado:"A anemia falciforme é uma patologia genética recessiva que deforma a estrutura anatômica de quais células sanguíneas?",
   alts:{a:"Plaquetas.",b:"Leucócitos (células brancas).",c:"Hemácias (glóbulos vermelhos).",d:"Linfócitos T."},gabarito:"c",
   resolucao:"A mutação substitui o ácido glutâmico por valina na cadeia beta da hemoglobina (HbS), fazendo com que as hemácias se cristalizem em formato de foice sob baixa tensão de oxigênio.",
   tags:["hematologia"],fav:false},

  {id:"med023",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Anemia Aplástica",banca:"Prefeitura RJ",ano:2019,dific:3,tipo:"memorização",
   enunciado:"A anemia caracterizada pela hipoplasia ou aplasia severa da medula óssea, resultando na queda global de todas as linhagens celulares (pancitopenia) chama-se anemia:",
   alts:{a:"Aplástica.",b:"Ferropriva.",c:"Falciforme.",d:"Megaloblástica."},gabarito:"a",
   resolucao:"A anemia aplástica ocorre pela falência funcional da medula óssea em produzir hemácias, leucócitos e plaquetas simultaneamente.",
   tags:["hematologia"],fav:false},

  {id:"med024",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"TVP Parâmetros",banca:"FUNDATEC",ano:2019,dific:3,tipo:"conceitual",
   enunciado:"Sobre a Trombose Venosa Profunda (TVP), assinale a afirmativa CORRETA:",
   alts:{a:"A TVP ocorre única e exclusivamente nos membros inferiores.",b:"A complicação aguda mais temida da TVP é o desprendimento do trombo evoluindo para Embolia Pulmonar (TEP).",c:"Apenas pacientes em uso de anticoagulantes correm risco de TVP."},gabarito:"b",
   resolucao:"O maior risco da TVP instalada é a fragmentação do coágulo. Ele viaja pela veia cava até o átrio e ventrículo direito, sendo ejetado e ocluindo a artéria pulmonar (TEP).",
   tags:["vascular"],fav:false},

  {id:"med025",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"ICC Sinais",banca:"IF-RJ",ano:2010,dific:2,tipo:"clínico",
   enunciado:"Doença caracterizada pela incapacidade do coração em bombear sangue com eficácia, cursando com dispneia paroxística, ascite, edema maleolar em MMII e pulso periférico filiforme:",
   alts:{a:"Insuficiência cardíaca congestiva (ICC).",b:"Trombose venosa isolada.",c:"Infarto agudo do miocárdio agudo.",d:"Pericardite constritiva."},gabarito:"a",
   resolucao:"A ICC gera congestão sistêmica retrógrada (edema em membros inferiores, hepatomegalia e ascite) combinada com baixo débito cardíaco anterógrado.",
   tags:["cardio"],fav:false},

  {id:"med026",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Hemofilia Contraindicação",banca:"ESA",ano:2016,dific:3,tipo:"clínico",
   enunciado:"Indivíduos portadores de Hemofilia possuem distúrbios de coagulação e NÃO devem receber sob nenhuma hipótese qual classe de fármacos?",
   alts:{a:"Vitamina K.",b:"Vitamina B12.",c:"AAS (Ácido Acetilsalicílico) e Heparina.",d:"Vitamina C.",e:"Complexos de cálcio."},gabarito:"c",
   resolucao:"O AAS possui efeito antiagregante plaquetário irreversível que, somado à deficiência inata de fatores de coagulação da hemofilia, induz sangramentos massivos fatais.",
   tags:["hemofilia"],fav:false},

  {id:"med027",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Complicação TVP",banca:"FCC",ano:2018,dific:2,tipo:"clínico",
   enunciado:"Paciente no pós-operatório com sinais francos de tromboflebite em perna direita. O profissional deve monitorar de perto o aparecimento de sinais de qual complicação fatal?",
   alts:{a:"Aneurisma de aorta.",b:"Embolia pulmonar, observando dispneia súbita, dor torácica, cianose e taquicardia.",c:"Atelectasia alveolar por trombo.",d:"Crises convulsivas focais."},gabarito:"b",
   resolucao:"Idêntica à questão 24: o trombo venoso solta-se e obstrui a árvore vascular pulmonar, gerando dispneia súbita grave, dor pleurítica e queda da saturação.",
   tags:["vascular"],fav:false},

  {id:"med028",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Hemofilia",banca:"ASSCONPP",ano:2015,dific:2,tipo:"memorização",
   enunciado:"Distúrbio genético e hereditário ligado ao cromossomo X que afeta a cascata de coagulação gerando sangramentos prolongados musculares e articulares (hemartroses):",
   alts:{a:"Diabetes tipo 1.",b:"Dislipidemia familiar.",c:"Hemofilia.",d:"Anemia ferropriva."},gabarito:"c",
   resolucao:"A hemofilia (A ou B) caracteriza-se pela deficiência dos fatores VIII ou IX da coagulação, predispondo a hemorragias severas pós-traumas mínimos.",
   tags:["hemofilia"],fav:false},

  {id:"med029",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Choque Distributivo",banca:"FGV",ano:2021,dific:2,tipo:"memorização",
   enunciado:"O choque distributivo é caracterizado pela vasodilatação sistêmica excessiva com má distribuição do fluxo de sangue. Qual alternativa apresenta um exemplo clássico desse tipo?",
   alts:{a:"Choque séptico.",b:"Choque obstrutivo.",c:"Choque cardiogênico.",d:"Choque hipovolêmico."},gabarito:"a",
   resolucao:"O choque séptico, anafilático e neurogênico são as três formas clássicas de choque distributivo, onde o volume absoluto está normal, mas o continente vascular expandiu excessivamente.",
   tags:["choque"],fav:false},

  {id:"med030",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Etiologia Choque",banca:"IBFC",ano:2016,dific:2,tipo:"memorização",
   enunciado:"Complete as lacunas: No choque ________ o volume intravascular está diminuído. No choque ________ temos uma reação alérgica grave. E no choque ________ há infecção disseminada.",
   alts:{a:"Hipovolêmico, Anafilático e Séptico.",b:"Cardiogênico, Distributivo e Anafilático.",c:"Hipovolêmico, Neurogênico e Anafilático."},gabarito:"a",
   resolucao:"Sequência direta clássica das etiologias de choque: perda de volume (hipovolêmico), alérgeno (anafilático) e foco infeccioso sistêmico (séptico).",
   tags:["choque"],fav:false},

  {id:"med031",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Terapias Substitutivas",banca:"ESA",ano:2019,dific:2,tipo:"memorização",
   enunciado:"As terapias de substituição renal são necessárias quando os rins perdem a capacidade funcional. Assinale a alternativa que apresenta apenas exemplos destas modalidades técnicas:",
   alts:{a:"Transplante renal, hemodiálise e diálise peritoneal.",b:"Urodiálise, transplante e quimioterapia.",c:"Hemodiálise e uso de diuréticos de alça orais."},gabarito:"a",
   resolucao:"As três terapias consagradas de substituição renal na DRC terminal são a hemodiálise extracorpórea, a diálise peritoneal e o transplante renal.",
   tags:["renal"],fav:false},

  {id:"med032",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"Hemodiálise",banca:"FUNDEP",ano:2018,dific:3,tipo:"procedimento",
   enunciado:"Considerando as técnicas de substituição da função renal, assinale a afirmativa INCORRETA:",
   alts:{a:"A hemodiálise filtra o sangue através de uma membrana artificial dialisadora.",b:"O principal parâmetro para definir insuficiência renal crônica é a taxa de filtração glomerular.",c:"Para a realização de sessões de hemodiálise regular de longo prazo, o técnico punciona veias periféricas finas comuns com agulha comum flexível a cada plantão.",d:"Na diálise peritoneal, o peritônio funciona como membrana natural."},gabarito:"c",
   resolucao:"A hemodiálise regular exige fluxos de sangue altíssimos. É obrigatória a confecção cirúrgica prévia de uma Fístula Arteriovenosa (FAV) estável ou cateter central de alto fluxo (Duplo Lúmen/Permcath), tornando a C incorreta.",
   tags:["renal"],fav:false},

  {id:"med033",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"DRC Causas",banca:"IBFC",ano:2016,dific:2,tipo:"memorização",
   enunciado:"Sabemos que a Doença Renal Crônica (DRC) pode ser causada por patologias sistêmicas crônicas. Quais são as duas principais causas no Brasil?",
   alts:{a:"Diabetes mellitus e Hipertensão Arterial Sistêmica.",b:"Obstrução por cálculos e infecções urinárias de repetição.",c:"Rins policísticos familiares e nefrites agudas."},gabarito:"a",
   resolucao:"A Hipertensão (que causa nefroesclerose hipertensiva) e a Diabetes (que gera nefropatia diabética glomeruloesclerótica) respondem pela imensa maioria dos pacientes em diálise.",
   tags:["renal"],fav:false},

  {id:"med034",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"IRA Pré-renal",banca:"FUNDATEC",ano:2021,dific:3,tipo:"conceitual",
   enunciado:"A Insuficiência Renal Aguda (IRA) pode ser pré-renal, renal intrínseca ou pós-renal. São consideradas causas de padrão PRÉ-RENAL clássicas, EXCETO:",
   alts:{a:"Desidratação severa.",b:"Choque hemorrágico hipovolêmico.",c:"Choque séptico.",d:"Queimaduras graves corporais.",e:"Glomerulonefrites agudas parenquimatosas."},gabarito:"e",
   resolucao:"Causas pré-renais estão ligadas à hipoperfusão do rim antes dele (choque, desidratação). As nefrites e glomerulonefrites (E) são lesões diretas do parênquima, sendo classificadas como renais intrínsecas.",
   tags:["renal"],fav:false},

  {id:"med035",materia:"Enf. Clínica",modulo:"Módulo 5: Enfermagem em Clínica Médica",assunto:"IRA Definição",banca:"ITAME",ano:2019,dific:1,tipo:"conceitual",
   enunciado:"Entende-se e define-se por Insuficiência Renal Aguda (IRA):",
   alts:{a:"A perda súbita, rápida e potencialmente reversível da capacidade dos rins de filtrarem resíduos metabólicos, sais e líquidos do sangue.",b:"Perda crônica irreversível de depuração.",c:"Formação crônica de cálculos renais calcificados."},gabarito:"a",

// STATE MANAGEMENT
// =====================================================
let state = {
  filters: { modulo: '', materia: '', banca: '', dific: '', especial: '' },
  historico: JSON.parse(localStorage.getItem('hist') || '{}'),
  favoritas: JSON.parse(localStorage.getItem('favs') || '[]'),
  sim: { questions: [], current: 0, respostas: {}, modo: 'normal', modulo: '' },
  expandedAll: false
};

// =====================================================
// INITIALIZATION
// =====================================================
function init() {
  buildSidebar();
  renderList();
  renderStats();
  renderErros();
  updatePills();
}

function buildSidebar() {
  const modulos = [...new Set(DB.map(q => q.modulo || 'Sem Módulo'))].sort();
  const materias = [...new Set(DB.map(q => q.materia))].sort();
  const bancas = [...new Set(DB.map(q => q.banca))].sort();

  // Modulos Sidebar
  const fmod = document.getElementById('filter-modulo');
  const fmod2 = document.getElementById('sim-modulo');
  document.getElementById('cnt-mod-all').textContent = DB.length;
  modulos.forEach(m => {
    const cnt = DB.filter(q => q.modulo === m).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerHTML = `${m} <span class="count">${cnt}</span>`;
    btn.onclick = () => setFilter('modulo', m, btn);
    fmod.appendChild(btn);

    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    fmod2.appendChild(opt);
  });

  // Materias Sidebar
  const fm = document.getElementById('filter-materia');
  const fm2 = document.getElementById('sim-materia');
  document.getElementById('cnt-all').textContent = DB.length;
  materias.forEach(m => {
    const cnt = DB.filter(q => q.materia === m).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.materia = m;
    btn.innerHTML = `${m} <span class="count">${cnt}</span>`;
    btn.onclick = () => setFilter('materia', m, btn);
    fm.appendChild(btn);

    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    fm2.appendChild(opt);
  });

  // Bancas Sidebar
  const fb = document.getElementById('filter-banca');
  const fb2 = document.getElementById('sim-banca');
  bancas.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerHTML = `${b} <span class="count">${DB.filter(q=>q.banca===b).length}</span>`;
    btn.onclick = () => setFilter('banca', b, btn);
    fb.appendChild(btn);
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    fb2.appendChild(opt);
  });
}

// =====================================================
// FILTERS AND RENDER ENGINE
// =====================================================
function setFilter(type, val, el) {
  state.filters[type] = val;
  if (type === 'especial') {
    ['modulo','materia','banca','dific'].forEach(k => state.filters[k] = '');
  } else {
    state.filters.especial = '';
    if(type === 'modulo') { state.filters.materia = ''; state.filters.banca = ''; }
    if(type === 'materia') { state.filters.modulo = ''; state.filters.banca = ''; }
  }
  
  const allSections = el.closest('#sidebar').querySelectorAll('.sidebar-section');
  allSections.forEach(sec => {
    if (!sec.contains(el)) {
      sec.querySelectorAll('.filter-btn').forEach(b => {
        if(b.textContent.includes('Todas') || b.textContent.includes('Todos')) b.classList.add('active');
        else b.classList.remove('active');
      });
    }
  });

  const parent = el.closest('.filter-group');
  if (parent) parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function getFiltered() {
  let qs = [...DB];
  const {modulo, materia, banca, dific, especial} = state.filters;

  if (especial === 'favoritas') qs = qs.filter(q => state.favoritas.includes(q.id));
  else if (especial === 'erradas') qs = qs.filter(q => (state.historico[q.id]?.erros||0) > 0).sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));
  else if (especial === 'naorespond') qs = qs.filter(q => !state.historico[q.id]);
  else {
    if (modulo) qs = qs.filter(q => q.modulo === modulo);
    if (materia) qs = qs.filter(q => q.materia === materia);
    if (banca) qs = qs.filter(q => q.banca === banca);
    if (dific) qs = qs.filter(q => q.dific == dific);
  }

  const search = document.getElementById('search-input').value.toLowerCase();
  if (search) qs = qs.filter(q => q.enunciado.toLowerCase().includes(search) || (q.tags||[]).join(' ').includes(search) || q.assunto.toLowerCase().includes(search) || (q.modulo && q.modulo.toLowerCase().includes(search)));

  const sort = document.getElementById('sort-select')?.value || 'default';
  if (sort === 'banca') qs.sort((a,b) => a.banca.localeCompare(b.banca));
  else if (sort === 'ano') qs.sort((a,b) => b.ano - a.ano);
  else if (sort === 'dific') qs.sort((a,b) => b.dific - a.dific);
  else if (sort === 'erros') qs.sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));

  return qs;
}

function renderList() {
  const qs = getFiltered();
  const list = document.getElementById('questions-list');
  const info = document.getElementById('results-info');
  info.textContent = `${qs.length} questão${qs.length !== 1 ? 'ões' : ''} encontrada${qs.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';
  qs.forEach((q, i) => list.appendChild(buildCard(q, i+1)));
  updatePills();
}

function difLabel(d) {
  return ['','Fácil','Médio-Fácil','Médio','Difícil','Muito Difícil'][d] || '';
}

function buildCard(q, num) {
  const hist = state.historico[q.id] || {};
  const isFav = state.favoritas.includes(q.id);
  const hasErr = (hist.erros || 0) > 0;

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${q.id}`;

  const bancaClass = `tag tag-banca`;
  const difClass = `tag tag-dif-${q.dific}`;
  const modHtml = q.modulo ? `<span class="tag tag-modulo">${q.modulo}</span>` : '';

  let statsHtml = '';
  if (hist.total) {
    const pct = Math.round((hist.acertos / hist.total) * 100);
    statsHtml = `<span class="tag" style="background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border)">${hist.acertos}/${hist.total} (${pct}%)</span>`;
  }

  const resolucaoTexto = q.resolucao ? q.resolucao : "Nenhuma resolução detalhada cadastrada para esta questão ainda.";

  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">#${String(num).padStart(3,'0')}</span>
      <div class="q-meta">
        <span class="${bancaClass}">${q.banca} ${q.ano}</span>
        <span class="tag tag-materia">${q.materia}</span>
        ${modHtml}
        <span class="${difClass}">${difLabel(q.dific)}</span>
        ${statsHtml}
      </div>
      <div class="q-actions">
        <button class="q-action-btn fav ${isFav?'active':''}" title="Favoritar" onclick="toggleFav('${q.id}',event)">⭐</button>
        ${hasErr ? `<span class="q-action-btn errada active" title="Questão com erros">✗</span>` : ''}
      </div>
    </div>
    <div class="q-enunciado">${q.enunciado}</div>
    <div class="q-alternativas" id="alts-${q.id}">
      ${Object.entries(q.alts).map(([k,v]) => `
        <button class="alt-btn" id="alt-${q.id}-${k}" onclick="responder('${q.id}','${k}')">
          <span class="alt-letra">${k.toUpperCase()})</span>
          <span>${v}</span>
        </button>`).join('')}
    </div>
    <div class="q-gabarito" id="gab-${q.id}">
       <div class="gab-headline">✓ Resposta correta: ${q.gabarito.toUpperCase()})</div>
       <div style="color: var(--green); margin-bottom:4px;">${q.alts[q.gabarito]}</div>
       <div class="gab-resolucao"><strong>Explicação/Gabarito Comentado:</strong><br>${resolucaoTexto}</div>
    </div>
  `;

  card.addEventListener('click', (e) => {
    if (e.target.closest('.q-action-btn') || e.target.closest('.alt-btn')) return;
    card.classList.toggle('expanded');
  });

  return card;
}

function responder(qid, escolha) {
  const q = DB.find(x => x.id === qid);
  const card = document.getElementById(`card-${qid}`);
  card.classList.add('expanded', 'revealed');

  const alts = Object.keys(q.alts);
  alts.forEach(k => {
    const btn = document.getElementById(`alt-${qid}-${k}`);
    btn.disabled = true;
    if (k === q.gabarito) btn.classList.add('show-correct');
  });

  const escolhidoBtn = document.getElementById(`alt-${qid}-${escolha}`);
  if (escolha === q.gabarito) {
    escolhidoBtn.classList.add('selected-correct');
    registrarHistorico(qid, true);
  } else {
    escolhidoBtn.classList.add('selected-wrong');
    registrarHistorico(qid, false);
  }
  renderErros();
  updatePills();
}

// =====================================================
// HISTORIC AND LOCALSTORAGE MANAGEMENT
// =====================================================
function registrarHistorico(qid, acertou) {
  if (!state.historico[qid]) state.historico[qid] = {total:0, acertos:0, erros:0};
  state.historico[qid].total++;
  if (acertou) state.historico[qid].acertos++;
  else state.historico[qid].erros++;
  saveHistorico();
}

function saveHistorico() {
  try { localStorage.setItem('hist', JSON.stringify(state.historico)); } catch(e){}
}

function clearHistory() {
  if (!confirm('Limpar todo o histórico de respostas?')) return;
  state.historico = {};
  saveHistorico();
  renderErros();
  renderStats();
  updatePills();
}

function toggleFav(qid, e) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const idx = state.favoritas.indexOf(qid);
  if (idx === -1) { state.favoritas.push(qid); btn.classList.add('active'); }
  else { state.favoritas.splice(idx,1); btn.classList.remove('active'); }
  try { localStorage.setItem('favs', JSON.stringify(state.favoritas)); } catch(e){}
}

// =====================================================
// SIMULATED TEST SYSTEM
// =====================================================
function startSimuladoRapido() {
  showPanel('simulado');
  document.getElementById('sim-qtd').value = '10';
  document.getElementById('sim-modulo').value = '';
  document.getElementById('sim-materia').value = '';
  document.getElementById('sim-banca').value = '';
  startSimulado();
}

function startSimulado() {
  const qtd = parseInt(document.getElementById('sim-qtd').value);
  const mod = document.getElementById('sim-modulo').value;
  const mat = document.getElementById('sim-materia').value;
  const ban = document.getElementById('sim-banca').value;
  const modo = document.getElementById('sim-modo').value;

  let pool = [...DB];
  if (mod) pool = pool.filter(q => q.modulo === mod);
  if (mat) pool = pool.filter(q => q.materia === mat);
  if (ban) pool = pool.filter(q => q.banca === ban);

  // Shuffle Fisher-Yates
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  state.sim.questions = pool.slice(0, Math.min(qtd, pool.length));
  state.sim.current = 0;
  state.sim.respostas = {};
  state.sim.modo = modo;

  if(state.sim.questions.length === 0) {
     alert("Nenhuma questão localizada para esse cruzamento de filtros.");
     return;
  }

  document.getElementById('sim-setup').style.display = 'none';
  document.getElementById('sim-running').style.display = 'flex';
  document.getElementById('sim-resultado').style.display = 'none';
  renderSimQ();
}

function renderSimQ() {
  const {questions, current, respostas, modo} = state.sim;
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round(((current + 1) / total) * 100);

  document.getElementById('sim-counter-text').textContent = `Questão ${current+1} de ${total}`;
  document.getElementById('sim-progress-fill').style.width = pct + '%';

  const respostaAtual = respostas[q.id];
  const revealed = respostaAtual && modo === 'imediato';

  let altsHtml = Object.entries(q.alts).map(([k,v]) => {
    let cls = 'alt-btn';
    let dis = '';
    if (revealed) {
      dis = 'disabled';
      if (k === q.gabarito) cls += ' show-correct';
      if (k === respostaAtual && respostaAtual !== q.gabarito) cls += ' selected-wrong';
    } else if (k === respostaAtual) {
      cls += ' selected-correct';
    }
    return `<button class="${cls}" ${dis} onclick="simResponder('${q.id}','${k}')">
      <span class="alt-letra">${k.toUpperCase()})</span><span>${v}</span></button>`;
  }).join('');

  let gabHtml = '';
  if (revealed) {
    const acertou = respostaAtual === q.gabarito;
    const resTexto = q.resolucao ? q.resolucao : "Nenhuma resolução comentada disponível.";
    gabHtml = `<div style="margin-top:12px;padding:14px;border-radius:8px;font-size:13px;line-height:1.6;
      background:${acertou ? 'rgba(52,211,153,0.05)' : 'rgba(248,113,113,0.05)'};
      border:1px solid ${acertou ? 'rgba(52,211,153,0.25)' : 'rgba(248,113,113,0.25)'};
      color: var(--text);">
      <span style="color:${acertou ? 'var(--green)' : 'var(--red)'}; font-weight:600; font-family:var(--mono);">
        ${acertou ? '✓ Correto!' : `✗ Errou — Resposta: ${q.gabarito.toUpperCase()})`}
      </span>
      <div style="margin-top:8px; border-top:1px solid var(--border); padding-top:8px; color:var(--text2);">
         <strong>Explicação:</strong><br>${resTexto}
      </div>
    </div>`;
  }

  document.getElementById('sim-q-display').innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <span class="tag tag-banca">${q.banca} ${q.ano}</span>
      <span class="tag tag-materia">${q.materia}</span>
      ${q.modulo ? `<span class="tag tag-modulo">${q.modulo}</span>` : ''}
    </div>
    <div class="sim-q-enunciado">${q.enunciado}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">${altsHtml}</div>
    ${gabHtml}
  `;

  const isLast = current === total - 1;
  document.getElementById('sim-btn-ant').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('sim-btn-prox').style.display = isLast ? 'none' : 'inline-block';
  document.getElementById('sim-btn-fin').style.display = isLast ? 'inline-block' : 'none';
}

function simResponder(qid, escolha) {
  state.sim.respostas[qid] = escolha;
  const q = DB.find(x => x.id === qid);
  if (state.sim.modo === 'imediato') {
    registrarHistorico(qid, escolha === q.gabarito);
    renderSimQ();
  } else {
    renderSimQ();
  }
}

function simProximo() { state.sim.current++; renderSimQ(); }
function simAnterior() { state.sim.current--; renderSimQ(); }
function simPularQ() { state.sim.current = Math.min(state.sim.current + 1, state.sim.questions.length - 1); renderSimQ(); }

function simFinalizar() {
  const {questions, respostas, modo} = state.sim;
  let acertos = 0;
  questions.forEach(q => {
    const resp = respostas[q.id];
    if (resp) {
      const ok = resp === q.gabarito;
      if (ok) acertos++;
      if (modo !== 'imediato') registrarHistorico(q.id, ok);
    }
  });

  const total = questions.length;
  const respondidas = Object.keys(respostas).length;
  const pct = respondidas > 0 ? Math.round((acertos / respondidas) * 100) : 0;

  document.getElementById('sim-running').style.display = 'none';
  const res = document.getElementById('sim-resultado');
  res.style.display = 'block';

  let cor = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
  let msg = pct >= 70 ? '✓ Ótimo resultado!' : pct >= 50 ? '▲ Continue estudando!' : '✗ Precisa reforçar!';

  let gabaHtml = questions.map(q => {
    const resp = respostas[q.id];
    const ok = resp === q.gabarito;
    const cor = !resp ? 'var(--text3)' : ok ? 'var(--green)' : 'var(--red)';
    const icon = !resp ? '○' : ok ? '✓' : '✗';
    return `<div style="padding:8px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span style="color:${cor};font-size:14px;">${icon}</span>
        <span class="tag tag-banca" style="font-size:10px;">${q.banca} ${q.ano}</span>
        <span style="font-size:12px;color:var(--text3);">${q.materia}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">${q.enunciado.substring(0,100)}...</div>
      <div style="font-size:11px;font-family:var(--mono);color:${cor};">
        ${!resp ? 'Não respondida' : ok ? `Correto: ${q.gabarito.toUpperCase()})` : `Você: ${resp.toUpperCase()}) | Correto: ${q.gabarito.toUpperCase()})`}
      </div>
    </div>`;
  }).join('');

  res.innerHTML = `<div class="sim-config">
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:56px;font-family:var(--mono);font-weight:700;color:${cor};">${pct}%</div>
      <div style="font-size:18px;color:${cor};margin:4px 0;">${msg}</div>
      <div style="font-size:14px;color:var(--text2);margin-top:8px;">${acertos} acertos de ${respondidas} respondidas (${total} total)</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;">
      <button class="btn btn-primary" onclick="startSimulado()">Novo Simulado</button>
      <button class="btn btn-ghost" onclick="resetSimSetup()">Configurar</button>
    </div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;">Gabarito detalhado</div>
    ${gabaHtml}
  </div>`;

  renderStats();
  renderErros();
  updatePills();
}

function resetSimSetup() {
  document.getElementById('sim-setup').style.display = 'block';
  document.getElementById('sim-resultado').style.display = 'none';
}

// =====================================================
// ANALYTICS AND PERFORMANCE REPORT
// =====================================================
function renderStats() {
  const hist = state.historico;
  const qids = Object.keys(hist);
  const totalResp = qids.reduce((s,id) => s + (hist[id].total||0), 0);
  const totalAcertos = qids.reduce((s,id) => s + (hist[id].acertos||0), 0);
  const pctGeral = totalResp > 0 ? Math.round((totalAcertos/totalResp)*100) : 0;
  const respondidas = qids.length;

  const materias = [...new Set(DB.map(q => q.materia))];
  const matStats = materias.map(m => {
    const qsMat = DB.filter(q => q.materia === m);
    let tot = 0, ac = 0;
    qsMat.forEach(q => { if(hist[q.id]) { tot += hist[q.id].total; ac += hist[q.id].acertos; }});
    return { m, tot, ac, pct: tot > 0 ? Math.round((ac/tot)*100) : null, total_q: qsMat.length };
  }).filter(x => x.tot > 0).sort((a,b) => (a.pct||0)-(b.pct||0));

  const container = document.getElementById('stats-content');
  const cores = ['var(--red)','var(--amber)','var(--green)','var(--teal)'];

  container.innerHTML = `
    <h2 style="font-size:16px;font-weight:500;margin-bottom:16px;">Desempenho geral</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total de questões</div>
        <div class="stat-value">${DB.length}</div>
        <div class="stat-sub">${respondidas} respondidas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Taxa de acerto</div>
        <div class="stat-value" style="color:${pctGeral>=70?'var(--green)':pctGeral>=50?'var(--amber)':'var(--red)'};">${pctGeral}%</div>
        <div class="stat-sub">${totalAcertos} de ${totalResp} tentativas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Favoritas</div>
        <div class="stat-value" style="color:var(--amber);">${state.favoritas.length}</div>
        <div class="stat-sub">questões salvas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Com erros</div>
        <div class="stat-value" style="color:var(--red);">${qids.filter(id=>hist[id].erros>0).length}</div>
        <div class="stat-sub">precisam revisão</div>
      </div>
    </div>

    ${matStats.length > 0 ? `
    <h2 style="font-size:16px;font-weight:500;margin:20px 0 12px;">Por matéria</h2>
    <div class="materia-stats">
      ${matStats.map((s,i) => {
        const cor = s.pct < 50 ? cores[0] : s.pct < 70 ? cores[1] : cores[2];
        return `<div class="materia-row">
          <div class="materia-row-header">
            <span class="materia-name">${s.m}</span>
            <span class="materia-pct" style="color:${cor};">${s.pct}% (${s.ac}/${s.tot})</span>
          </div>
          <div class="materia-bar"><div class="materia-bar-fill" style="width:${s.pct}%;background:${cor};"></div></div>
        </div>`;
      }).join('')}
    </div>` : `<div class="empty-state"><div class="empty-icon">📊</div><p>Responda questões para ver suas estatísticas por matéria.</p></div>`}
  `;
}

// =====================================================
// INCORRECT ANSWERS MANAGEMENT
// =====================================================
function renderErros() {
  const erradas = DB.filter(q => (state.historico[q.id]?.erros||0) > 0)
    .sort((a,b) => (state.historico[b.id]?.erros||0)-(state.historico[a.id]?.erros||0));

  document.getElementById('results-info-erros').textContent = `${erradas.length} questões com erros`;
  const list = document.getElementById('erros-list');
  list.innerHTML = '';

  if (erradas.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎯</div><p>Nenhum erro registrado ainda.<br>Responda questões para ver os erros aqui.</p></div>`;
    return;
  }
  erradas.forEach((q,i) => list.appendChild(buildCard(q, i+1)));
}

// =====================================================
// UTILS AND LAYOUT
// =====================================================
function updatePills() {
  const hist = state.historico;
  const qids = Object.keys(hist);
  const totalResp = qids.reduce((s,id) => s + (hist[id].total||0), 0);
  const totalAcertos = qids.reduce((s,id) => s + (hist[id].acertos||0), 0);
  const pct = totalResp > 0 ? Math.round((totalAcertos/totalResp)*100) : null;

  document.getElementById('pill-total').innerHTML = `Total: <b>${DB.length}</b>`;
  document.getElementById('pct-acerto').textContent = pct !== null ? `${pct}%` : '—';
}

function expandAll() {
  state.expandedAll = !state.expandedAll;
  document.querySelectorAll('.q-card').forEach(c => {
    if (state.expandedAll) c.classList.add('expanded');
    else c.classList.remove('expanded');
  });
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  const names = ['browse','simulado','erros','stats'];
  tabs[names.indexOf(name)]?.classList.add('active');

  if (name === 'stats') renderStats();
  if (name === 'erros') renderErros();
}

// Boot
init();
</script>
</body>
</html>
