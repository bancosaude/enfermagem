<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENFERMAGEM - ESA SAÚDE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0c10; --bg2: #111318; --bg3: #181c24; --bg4: #1e2330; --border: #2a3040; --border2: #3a4255; --text: #e8eaf0; --text2: #8892a4; --text3: #5a6275; --accent: #4f9cf9; --accent2: #3b82f6; --green: #34d399; --green2: #10b981; --red: #f87171; --red2: #ef4444; --amber: #fbbf24; --purple: #a78bfa; --teal: #2dd4bf; --font: 'Space Grotesk', sans-serif; --mono: 'IBM Plex Mono', monospace; --r: 8px; --r2: 12px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
#topnav { display: flex; align-items: center; padding: 0 24px; background: var(--bg2); border-bottom: 1px solid var(--border); height: 52px; }
.logo { font-size: 14px; font-weight: 600; color: var(--text); margin-right: 32px; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { padding: 6px 14px; font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; border-radius: var(--r); }
.nav-tab.active { color: var(--accent); background: rgba(79,156,249,0.1); }
#app { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 260px; background: var(--bg2); border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
.sidebar-section { padding: 0 12px 12px; }
.sidebar-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--text3); padding: 8px 4px; }
.filter-btn { display: flex; justify-content: space-between; padding: 6px 10px; border-radius: var(--r); border: none; cursor: pointer; font-size: 13px; color: var(--text2); background: none; width: 100%; text-align: left; }
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: rgba(79,156,249,0.12); color: var(--accent); }
#main { flex: 1; overflow-y: auto; }
.q-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin: 10px 20px; cursor: pointer; }
.q-card.expanded { border-color: var(--accent); }
.alt-btn { display: block; padding: 10px; background: var(--bg3); border: 1px solid var(--border); margin: 5px 0; border-radius: var(--r); cursor: pointer; color: var(--text2); width: 100%; text-align: left; }
.alt-btn:hover { border-color: var(--accent); }
.q-gabarito { display: none; margin-top: 10px; padding: 10px; background: var(--bg4); border-radius: var(--r); }
.q-card.revealed .q-gabarito { display: block; }
.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>
<nav id="topnav">
  <div class="logo">ESA <span>SAÚDE</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('browse')">Questões</button>
  </div>
</nav>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Módulo</div>
      <div id="filter-modulo"></div>
    </div>
  </div>
  <div id="main">
    <div id="panel-browse" class="panel active">
      <div id="questions-list"></div>
    </div>
  </div>
</div>

<script>
// AQUI ESTÃO AS SUAS QUESTÕES
const DB = [
  {id:"001",materia:"Clínica",modulo:"Módulo 1",assunto:"Geral",banca:"ESA",ano:2011,dific:2,enunciado:"Um homem foi atendido com apendicite aguda e foi realizada apendicectomia. Assinale qual cuidado é CONTRAINDICADO:",alts:{a:"Enema.",b:"Líquidos.",c:"Antibiótico.",d:"Sonda.",e:"Fowler."},gabarito:"a",resolucao:"Enemas causam perfuração.",tags:["cirurgia"]}
];

function renderList() {
  const list = document.getElementById('questions-list');
  list.innerHTML = DB.map((q,i) => `
    <div class="q-card" onclick="this.classList.toggle('expanded')">
      <p>${i+1}. ${q.enunciado}</p>
      <div class="q-alternativas">${Object.entries(q.alts).map(([k,v]) => `<button class="alt-btn" onclick="revelar('${q.id}')">${k.toUpperCase()}) ${v}</button>`).join('')}</div>
      <div class="q-gabarito" id="gab-${q.id}"><b>Resposta:</b> ${q.gabarito.toUpperCase()}<br><b>Explicação:</b> ${q.resolucao}</div>
    </div>
  `).join('');
}
function revelar(id) { document.getElementById('card-'+id)?.classList.add('revealed'); }
function showPanel(n) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById('panel-'+n).classList.add('active'); }
renderList();
</script>
</body>
</html>
